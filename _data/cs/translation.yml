    description: Kimai je nejlepší dostupnou open source aplikací pro sledování času, a to nejen pro týmy pracující na projektech. Podívejte se, jak Kimai porovnává s alternativními řešeními sledování času, abyste mohli vybrat to správné pro vaši organizaci.
feature:
    mobile-ready:
        name: "Optimalizováno pro mobily"
        description: "Program je plně responzivní a je vytvořen pro používání na stolních počítačích i na mobilních zařízeních. Každý uživatel si může nastavit sloupce dat, které se mají zobrazovat, aby se například zabránilo horizontálnímu scrollování na malých zařízeních."
    plugins:
        name: "Pluginy"
        description: "Kimai byl vytvořen tak, aby jej bylo možné rozšiřovat, a funkce do něj lze přidávat pomocí pluginů. Vývojáři, kteří chtějí pluginy vytvořit, mohou využít mnoha rozšíření."
    multi-user:
        name: "Pro více uživatelů"
        description: "Kimai může používat libovolný počet uživatelů: každá instalace podporuje neomezený počet uživatelů s různými rolemi (viz oprávnění)."
    multi-language:
        name: "Víčejazykové"
        description: "Kimai lze převést do libovolného jazyka. Již je přeložen do více než 30 jazyků."
    teams:
        name: "Týmy"
        description: "Týmy lze vytvořit tak, že uživatele seskupíte do logických skupin jako jsou oddělení, nebo skupiny kolegů pracující na jednotlivých projektech. Do těchto týmů lze přiřadit zákazníky a projekty, což omezí viditelnost a přístup ostatních uživatelů."
    customers:
        name: "Zákazníci"
        description: "Spravujte své zákazníky a přiřaďte k nim adresu, kontakt, zemi, měnu, viditelnost (pro archivaci) a mnoho dalších polí."
    projects:
        name: "Projekty"
        description: "Spravujte projekty pro každého zákazníka číslem zakázky, rozpočtem a viditelností (pro archivaci)."
    activities:
        name: "Aktivity"
        description: "Aktivity se používají k přiřazení jednotky práce k záznamům v timesheetech. Spravujte aktivity pro každý projekt s číslem zakázky, rozpočtem a viditelností (pro archivaci). Aktivity mohou být globální, není je již třeba duplikovat, pokud několik projektů sdílí stejnou pracovní oblast."
    invoices:
        name: "Fakturace"
        description: "Různé šablony faktur, možnosti seskupení položek, konfigurovatelná čísla faktur a možnost přidání vlastních šablon ve formátu PDF, DOCX, HTML, XLSX a ODS."
    export:
        name: "Exportovat data"
        description: "Data z timesheetů lze exportovat do jiných programů, nebo je lze sdílet s různými odděleními ve formátech XLSX (Excel), PDF, CSV a HTML. Exportované záznamy lze navíc uzamknout a chránit proti dalším změnám."
    expenses:
        name: "Náklady"
        description: "Zakupte si tento plugin a sledujte výdaje podle zákazníků, projektů a aktivit - pro kategorizaci a zahrnutí do vašich faktur."
    saml:
        name: "SAML"
        description: "Přihlaste a registrujte uživatele prostřednictvím SAML (jednotné přihlášení alias SSO) a využijte vašeho stávajícího poskytovatele identit, jako například Google Workspace, Authentik nebo Azure Active Directory."
    api:
        name: "JSON API"
        description: "Obsahuje rozsáhlé rozhraní JSON API pro čtení a zápis dat, takže externí aplikace a vaše vlastní nástroje mohou komunikovat s vaším oblíbeným sledovačem času."
    ldap:
        name: "LDAP"
        description: "Propojte Kimai s adresářovým serverem vaší společnosti (LDAP nebo Active directory) a použijte vaši stávající infrastrukturu."
    statistics:
        name: "Statistiky"
        description: "Váš ovládací panel zobrazí několik statistik o zaznamenaných časech a množství shromážděných dat. A my vám vždy můžeme přidat víc grafů!"
    docker:
        name: "Docker"
        description: "Máme obrazy Docker za účelem vývoje a několik variant nastavení Docker-Compose pro produkční použití."
    migrate-v1:
        name: "Migrace"
        description: "Data z Kimai v1 lze importovat pro bezproblémovou migraci vašeho systému sledování času."
    active-entries:
        name: "Množství aktivních záznamů"
        description: "Nahrávejte paralelně tolikrát, kolikrát chcete, nebo to omezte na jeden záznam."
    am-pm-format:
        name: "AM/PM formát"
        description: "Kimai používá lokalizovanou verzi 24hodinového formátu. Pokud jste však zvyklí na formát AM/PM, můžete si jej nastavit."
    time-clock:
        name: "Časové hodiny"
        description: "Nechcete, aby si vaši uživatelé zapisovali co chtějí v časových výkazech? Přepněte na režim časových hodin, který umožňuje pouze záznamy \"punch in\" a \"punch out\". Už žádné ručně zadávané časy začátku a konce."
    duration-only:
        name: "Pouze doba trvání"
        description: "Pokud místní zákony vyžadují, aby se místo počátečního a koncového data zobrazovala pouze doba trvání, můžete tento režim aktivovat globálně."
    rates:
        name: "Výpočet sazeb"
        description: "Sazby lze vypočítat na základě hodinových a fixních částek, konfigurovatelných pro zákazníky, projekty, činnosti a každý záznam timesheetu zvlášť."
    timesheet-filter:
        name: "Timesheet filtr"
        description: "Všechny časové záznamy můžete filtrovat podle uživatele, zákazníka, projektu, činnosti a data."
    permissions:
        name: "Povolení"
        description: "Přizpůsobitelná struktura oprávnění. Přiřaďte uživatelům různé role, např. uživatelé mohou zaznamenávat časy, vedoucí týmů mohou tisknout faktury a konfigurovat projekty/aktivity, administrátoři mohou konfigurovat uživatele a zákazníky."
    user-profile:
        name: "Uživatelský profil"
        description: "Osobní statistiky a nastavení pro jednotlivé uživatele pro hodinovou sazbu, vzhled Kimai, heslo a avatara."
    password-reset:
        name: "Obnovení hesla"
        description: "Zapomněli jste heslo? Kimai vám ho pomůže obnovit e-mailem."
    2fa:
        name: Dvoufázové ověření (2FA)
        description: 'Kimai podporuje dvoufázové ověření pomocí TOTP tokenů: Zabezpečte své uživatelské účty dnes!'
    auth:
        description: Kimai podporuje externí poskytovatele identity a přihlášení pomocí LDAP a SAML od více poskytovatelů (jako je Google Workspace, Azure AD nebo Authentik). Kromě toho lze povolit dvoufázové ověření pomocí TOTP tokenů.
        name: Autentizace a zabezpečení
    reporting:
        description: Analýza zaznamenaných časů, zákazníků, projektů a aktivit. Hodnocení podle uživatelů, zákazníků, projektů, aktivit, značek, časových období a mnoho dalšího.
        name: Zprávy a analýzy
    dark-mode:
        name: Tmavý režim
        description: Protože každá aplikace potřebuje tmavý režim, který pomáhá snížit únavu očí večer nebo v tmavém prostředí.
    customer-portal:
        description: Sdílejte statistiky klientů a projektů a výkazy práce s kýmkoli pomocí tajné URL adresy, volitelně chráněné heslem.
        name: Zákaznický portál
    no-limits:
        description: "Váš SaaS software vždy obsahuje omezení? Kimai ne: nejsou tu žádné limity. Platíte pouze za počet aktivních uživatelů. Neomezuji vás a neúčtuji za neaktivní uživatele. Můžete vytvořit neomezený počet uživatelů, zákazníků, projektů, aktivit, výkazů práce a dalších."
        name: Nezná hranice
    privacy:
        name: Soukromí na prvním místě
        description: Respektuji vaše soukromí i soukromí vašich uživatelů a vaše data. Ne, tohle není další nudný úvod do zásad ochrany soukromí — takhle prostě svůj podnik vedu. Neprodávám data. Dodržuji GDPR a rád zodpovím jakoukoli otázku ohledně zapojených zpracovatelů.
    security:
        name: Bezpečnost v Kimai
        points:
            security_6: Automatizované testy kódu s pokrytím nad 90 %
            security_4: Continuous integration s tisíci kontrolami
            security_5: Důkladné code review
            security_1: Bezpečné hašování hesel pomocí Argon2 nebo Sodium
            security_2: Granulární uživatelské role omezující přístup
            security_3: Ochrana proti CSRF a XSS
        description: Kimai implements best-practices in application design to prevent common attacks. Automated security controls are critical to any software development workflow to reduce the amount of time from defect creation to defect detection. These scans run on every code change, every time.
    security-cloud:
        name: Bezpečnost platformy
        points:
            security_1: Všechna spojení jsou zabezpečena pomocí TLS (SSL)
            security_2: Osvědčené bezpečnostní postupy, firewally a ochrana proti útokům hrubou silou
            security_6: Kód běží v přísně omezených doménových prostředích
            security_3: Žádná multi-tenancy — každý zákazník má vlastní databázi
            security_4: Servery jsou hostovány v datovém centru v EU
            security_5: Kritické služby nejsou přístupné z internetu
        description: Software je jen tak bezpečný jako systém, na kterém běží. K serverové a síťové infrastruktuře přistupuji metodou defense-in-depth. Zákazníci hostované platformy jsou chráněni více vrstvami zabezpečení.
    electronic-invoicing:
        name: E-faktury
        description: Vytvářejte e-faktury ve formátech XML i PDF/A, v souladu s EN 16931, XRechnung 3.0, Zugferd/Factur-X a se syntaxí CII a UBL
    eu-hosting:
        description: Nezávislé a evropské 🇪🇺 – vyvinuté v Rakousku 🇦🇹 a hostované v Německu 🇩🇪
        name: Hosting v EU
install:
    alert-vps: V této fázi není možné nainstalovat Kimai stažením souboru ZIP a nahráním souborů na webový server. Je to proto, že program Composer musí být spuštěn z příkazového řádku. To nutně neznamená, že potřebujete VPS. Někteří hostitelé poskytují přístup SSH, přes který byste měli být schopni nainstalovat Composer a Kimai v pořádku.
    ssh: Tato metoda nainstaluje Kimai přímo na váš server.
    cloud: Nemusíte instalovat Kimai, můžete ho začít používat ihned.
    docker: Použijte náš obraz Dockeru pro snadnou instalaci a aktualizaci Kimai kontejneru.
    kubernetes: Kimai můžete nasadit do Kubernetes pomocí našich Helm-Charts.
    caddy-docker: Použití Docker-Compose a Caddy jako reverzní proxy s podporou SSL.
developer:
    kevinpapst:
        intro: 'Vždy bylo mým snem živit se open source produktem. S Kimai jsem byl schopen vyvinout software, který poskytuje velkou hodnotu mým zákazníkům a jehož vývoj mě pohání každý den.


            Mé zvláštní poděkování patří skvělé komunitě za jejich věrnost v průběhu let, těším se na dalších 10 let Kimai 🚀'
full-documentation: Celá dokumentace v angličtině
contact-developer: V případě dotazů se obraťte přímo na vývojáře pomocí těchto kontaktních údajů.
homepage:
    title: Sledování času pro týmy orientované na projekty
    intro: Naše open-source platforma je navržena pro sledování a analýzu časových dat vaší společnosti, což ji činí ideální pro firmy všech velikostí. Kimai vám pomáhá udržovat kontrolu nad časem a penězi.
