    controlling-bundle2:
        description: Pro každého uživatele lze pro každý den v týdnu uložit cílový počet hodin. Navíc lze nastavit skupinu svátků, první pracovní den a počet dnů dovolené.
    controlling-bundle3:
        description: Souhrn zobrazuje cílové a skutečné hodiny za měsíc a rok, včetně samostatného řádku pro ruční zápisy
    controlling-bundle4:
        description: Ruční zápisy umožňují úpravu konta hodin, např. převod hodin z předchozího roku nebo odepsání proplacených hodin
    controlling-bundle5:
        description: Denní vyhodnocení odpracovaných a dlužných hodin, včetně zobrazení všech absencí (dovolená, nemoc atd.), s možností uzavření měsíce
