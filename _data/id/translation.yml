industries:
    name: Industri
    agency:
        features:
            introduction: Tidak semua alat pelacakan waktu diciptakan sama. Solusi terbaik untuk agensi menawarkan serangkaian fitur khusus untuk menyederhanakan alur kerja Anda.
            title: Fitur Kimai yang paling banyak digunakan oleh agensi
        testimonials:
            tag: Agensi
            introduction: Di Kimai, kami telah merancang platform pelacakan waktu kami untuk memenuhi kebutuhan agensi, tim, dan pekerja lepas. Antarmuka kami yang intuitif dan fitur-fitur canggih membantu agensi seperti Anda bekerja lebih cerdas dan lebih menguntungkan. Kini Anda dapat "mendengar" ulasan dari pengguna nyata.
            title: Apa yang dikatakan agensi tentang pelacakan waktu
        about:
            title: Langkah pertama menuju pelacakan waktu yang lebih baik
            introduction: |
                Anda telah mengambil langkah pertama dan kami yakin Anda dapat membuat pilihan yang tepat. Apa lagi yang perlu Anda pertimbangkan untuk memilih perangkat lunak pelacakan waktu terbaik? Beberapa penyedia solusi menawarkan versi gratis yang mungkin memiliki keterbatasan, sementara yang lain menyediakan demo gratis, uji coba, atau opsi harga berdasarkan ukuran bisnis atau jumlah pengguna.

                Di Kimai, kami menawarkan uji coba gratis sehingga Anda dapat menjelajahi solusi kami sebelum memutuskan apakah pengguna, fitur, atau plugin tambahan diperlukan. Coba gratis hari ini, dan miliki hari kerja yang lebih terorganisir!
        title: Pelacakan Waktu untuk Agensi
        cta:
            title: |
                Siap mulai
                melacak waktu di agensi Anda?
        name: Agensi
        introduction: |
            Apakah Anda menjalankan sebuah agensi — baik di bidang pemasaran, PR, desain, konsultasi, SDM, atau arsitektur? Maka Anda tahu betapa pentingnya pelacakan waktu bagi bisnis Anda. Melacak jam kerja karyawan dan waktu proyek klien sangat penting untuk penagihan yang akurat, memahami profitabilitas, dan mengelola tim Anda yang terus berkembang.

            Namun mengelola pelacakan waktu melalui spreadsheet dan alat yang tidak terhubung bisa dengan cepat menjadi kekacauan, terutama seiring berkembangnya agensi Anda. Di sinilah solusi pelacakan waktu khusus bisa menjadi pengubah permainan.

            Mari kita jelajahi mengapa agensi-agensi sukses mengandalkan perangkat lunak pelacakan waktu dan fitur-fitur penting apa yang perlu dicari. Kami akan menggunakan Kimai sebagai contoh solusi yang mudah digunakan dan dirancang dengan mempertimbangkan kebutuhan agensi.
        intro: Buka potensi profitabilitas di agensi yang berkembang pesat dengan sistem pelacakan waktu yang skalabel
        subtitle: Kunci menuju profitabilitas
    lawyer:
        about:
            title: Langkah pertama menuju pelacakan waktu yang lebih baik dalam praktik hukum Anda
            introduction: |
                Kami memahami bahwa mencoba perangkat lunak baru dalam bisnis hukum bisa terasa menakutkan. Itulah mengapa kami menawarkan uji coba gratis tanpa kewajiban, orientasi yang mudah, serangkaian fitur fleksibel yang berkembang bersama praktik atau tim Anda, serta dukungan yang berdedikasi.

                Kami percaya bahwa bahkan selama uji coba gratis pun Anda dapat mencoba cara untuk berhenti bergulat dengan lembar waktu. Coba Kimai hari ini dan nikmati hari yang terorganisir!
        features:
            title: Fitur Kimai yang disukai firma hukum
            introduction: Kimai dirancang khusus dengan mempertimbangkan para profesional hukum. Kami telah menciptakan alat pelacakan waktu yang berbicara dalam bahasa Anda — sederhana, andal, patuh GDPR, dan berfokus pada membuat hari kerja Anda lebih lancar.
        testimonials:
            introduction: Di Kimai, para profesional hukum dan konsultan selalu menjadi fokus kami. Kini Anda dapat membaca tentang pengalaman nyata pengguna kami.
            title: Wawasan tentang pelacakan waktu dari pelanggan kami
        title: Pelacakan Waktu untuk Pengacara
        intro: Tinggalkan lembar waktu yang rumit dan fokus pada pemberian layanan hukum yang luar biasa dengan solusi pelacakan waktu modern
        subtitle: Fokus pada jam yang dapat ditagih, bukan lembar waktu yang rumit
        name: Pengacara
        introduction: |
            Dalam dunia layanan hukum yang serba cepat, waktu adalah aset Anda yang paling berharga. Firma hukum, pengacara independen, dan tim legal membutuhkan solusi pelacakan waktu yang disesuaikan dengan tuntutan unik profesi mereka. Di Kimai, kami memahami bahwa fokus Anda seharusnya pada pemberian layanan hukum yang luar biasa — bukan pada pergulatan dengan lembar waktu yang rumit.

            Pencatatan jam kerja manual, spreadsheet yang tak ada habisnya, dan proses ekspor yang rumit menghabiskan waktu berharga yang seharusnya digunakan untuk memberikan konsultasi hukum ahli. Temukan bagaimana pelacakan waktu yang efisien dapat membantu Anda fokus pada hal yang benar-benar penting.
        cta:
            title: |
                Siap merevolusi
                pelacakan waktu dalam praktik Anda?
    software-developers:
        features:
            title: Fitur Kimai yang digunakan oleh insinyur perangkat lunak
            introduction: Temukan rangkaian fitur sempurna yang disesuaikan dengan tugas dan tujuan Anda. Bagaimana jika tim TI Anda tidak hanya membutuhkan pelacak waktu sederhana, tetapi solusi yang tangguh dengan berbagai opsi integrasi serta fitur penagihan dan analitik tingkat lanjut?
        title: Pelacakan Waktu untuk Pengembang Perangkat Lunak
        about:
            introduction: |
                Memilih pelacak waktu yang tepat sering kali dimulai dengan memutuskan antara versi gratis atau demo. Harga juga merupakan faktor kunci, jadi carilah opsi yang berkembang seiring pertumbuhan tim Anda.

                Di Kimai, kami menawarkan uji coba gratis sehingga Anda dapat menjelajahi solusi kami sebelum memutuskan apakah fitur atau plugin tambahan diperlukan. Dengan harga mulai dari hanya €0,99 per pengguna untuk beberapa industri, ini adalah pilihan yang terjangkau. Coba gratis hari ini dan bawa lebih banyak keteraturan ke hari kerja Anda!
            title: Langkah pertama menuju pelacakan waktu yang lebih baik
        subtitle: Maksimalkan Produktivitas Anda
        cta:
            title: |
                Siap mencoba cara baru
                melacak waktu di tim TI Anda?
        testimonials:
            title: Para profesional TI berbicara tentang pelacakan waktu
            introduction: Di Kimai, kami merancang platform pelacakan waktu kami dengan mempertimbangkan kebutuhan pengembang individu, tim pengembang, dan departemen TI. Pendekatan kami berfokus pada pembangunan solusi sumber terbuka untuk tim teknologi dari semua ukuran dan di berbagai sektor. Anda dapat melihat jenis umpan balik yang kami terima dari pengguna kami di bidang teknologi.
        name: Pengembang Perangkat Lunak
        intro: Maksimalkan produktivitas tim dan capai keseimbangan kerja-kehidupan dengan pelacakan waktu yang cerdas
        introduction: |
            Kami sangat memahami rasa sakitnya — lembur tanpa henti, tenggat waktu yang menegangkan, bug yang memakan waktu, dan perjuangan terus-menerus untuk membuat manajer proyek dan klien menghargai upaya nyata di balik kode Anda. Ini adalah siklus yang melelahkan yang dapat dengan cepat menyebabkan kelelahan dan mengganggu keseimbangan kerja-kehidupan Anda. Ini adalah tantangan umum yang dihadapi oleh pengembang perangkat lunak, pemrogram, insinyur, dan profesional teknologi lainnya.

            Namun ada cara untuk membebaskan diri dari siklus ini dan mendapatkan kembali kendali atas waktu dan tugas Anda. Dengan menggunakan alat yang tepat, Anda dapat memaksimalkan produktivitas dan mendapatkan wawasan berharga tentang proyek-proyek Anda. Baik Anda seorang pemrogram lepas, bagian dari tim startup, atau mengelola seluruh departemen TI, menemukan solusi yang skalabel dengan fitur yang tepat sangatlah penting. Mari kita jelajahi Kimai — perangkat lunak pelacakan waktu yang mudah digunakan dan andal — sebagai contoh.
    consultants:
        features:
            title: Fitur Kimai yang paling banyak digunakan oleh konsultan
            introduction: Baik Anda seorang pekerja lepas maupun bagian dari departemen konsultasi besar, Kimai menawarkan alat untuk membantu Anda berkembang seiring pertumbuhan bisnis Anda.
        about:
            title: Langkah pertama menuju pelacakan waktu yang lebih baik dalam konsultasi
            introduction: |
                Untuk mendapatkan hasil maksimal dari perangkat lunak pelacakan waktu Anda, mulailah dengan menjelajahi semua fitur melalui demo atau uji coba gratis. Sebagai konsultan, Anda mungkin ingin mempertimbangkan opsi harga dengan cermat dan memikirkan ke depan tentang fitur apa yang mungkin Anda butuhkan seiring berkembangnya bisnis Anda.

                Di Kimai, kami memahami perjalanan ini. Itulah mengapa kami menawarkan uji coba gratis yang memungkinkan Anda mencoba solusi kami sebelum memutuskan fitur atau plugin tambahan mana yang paling cocok untuk Anda. Aplikasi all-in-one kami berkembang bersama bisnis Anda — Anda dapat dengan mudah menambahkan ekstensi kapan pun dibutuhkan. Coba gratis hari ini dan nikmati hari yang terorganisir!
        subtitle: Maksimalkan jam yang dapat ditagih & efisiensi
        name: Konsultan
        title: Pelacakan Waktu untuk Konsultan
        testimonials:
            introduction: Di Kimai, kami telah membangun platform kami untuk melayani kebutuhan konsultan individu maupun tim besar. Sebagai solusi all-in-one, Kimai dipercaya oleh perusahaan dari berbagai ukuran di berbagai sektor. Inilah yang dikatakan pengguna kami di bidang konsultasi.
            title: Wawasan tentang pelacakan waktu dari para profesional konsultasi
        intro: Tingkatkan profitabilitas dan penyampaian nilai klien melalui pelacakan waktu yang strategis untuk keunggulan konsultasi
        introduction: |
            Dalam lanskap konsultasi yang dinamis saat ini, baik Anda bergerak di bidang konsultasi manajemen, penasihat keuangan, layanan TI, ilmu data, konsultasi hukum, layanan psikologi, atau konsultasi SDM — satu kebenaran tetap konstan: waktu adalah aset Anda yang paling berharga. Pelacakan waktu yang akurat bukan sekadar mencatat jam kerja. Ini tentang memaksimalkan profitabilitas dan memberikan nilai kepada klien Anda.

            Mari kita jujur — mengelola proyek konsultasi tidaklah mudah. Anggota tim Anda mungkin bekerja dari New York, London, dan Singapura sekaligus. Itu banyak yang harus dilacak! Selain itu, Anda perlu mengetahui dengan tepat siapa yang mengerjakan apa untuk menagih klien Anda dengan benar. Tanpa pelacakan waktu yang tepat, segalanya bisa menjadi kacau dengan cepat. Anda perlu mengendalikan biaya proyek, mematuhi peraturan, dan memastikan waktu tim Anda digunakan dengan bijak.

            Itulah mengapa alat pelacakan waktu all-in-one telah menjadi kebutuhan bagi para konsultan. Alat-alat ini mengubah semua potensi kekacauan ini menjadi data yang jelas dan terorganisir yang membantu bisnis Anda berkembang. Mari kita jelajahi bagaimana solusi komprehensif seperti Kimai dapat mengubah bisnis konsultasi Anda.
