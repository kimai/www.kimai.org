controlling:
    name: Employment contract
    configurations:
        - title: "Absence: Comment is a mandatory field"
          description: Whether users have to enter a comment with their absence requests
        - title: "Allow half days for holidays"
          description: Whether users can request half-day absences
my_company:
    name: My company
    before: Kimai offers some configuration settings to adapt the branding to your company
    after: If you don't set a `Logo URL` but use a value in `Company name`, this will be used in the login screen.
    configurations:
        - title: "Logo URL"
          description: "an absolute URL to an image, replacing the company name in login screen"
        - title: "Company name"
          description: "replace the application name with your `company` name (approx. 15-20 character)"
        - title: "Financial year"
          description: "starts on **first of January** by default"
calendar:
    name: Calendar
    configurations:
        - title: "Display week numbers"
          description: "whether week numbers should be displayed in the monthly view (default: true)"
        - title: "Display weekends"
          description: "whether weekends should be displayed (default: true)"
        - title: "Start of normal business hours"
          description: "the start time of your working day, which will be highlighted in the weekly and daily view (default: 08:00)"
        - title: "End of normal business hours"
          description: "the end time of your working day, which will be highlighted in the weekly and daily view (default: 18:00)"
        - title: "Start of visible time range"
          description: "the start time of the calendars week and day view (default: 00:00)"
        - title: "End of visible time range"
          description: "the end time of the calendars week and day view (default: 24:00)"
        - title: "Slot duration for week- and day view"
          description: "defines the duration for each calendar slot (row) in the week and day views, format: hh:mm:ss (default: 00:30:00 = 30 minutes)"
        - title: "Amount of entries for drag&drop"
          description: "amount of rows per drag & drop box (0 = deactivated)"
        - title: "Copies data when adding via drag and drop"
          description: "when activated, form details will be populated from last entry"
        - title: "Display of the titles of calendar entries"
          description: "which data should be displayed in the title of each calendar entry"
kiosk:
    name: Kiosk
    configurations:
        - title: "Login mode"
          description: "Which mode scans the Kiosk code (external scanner for NFC and other e.g. USB scanners, which act as a keyboard)"
        - title: "Activity"
          description: "You can only choose 'non-global' activities here. If you see an empty dropdown, you need to create a customer/project/activity combination for Kiosk timesheets. The activity needs to be assigned to the Kiosk project."
        - title: "Placeholder for input field"
          description: "A short info text that is shown as placeholder in the input field (like: 'enter your code' or 'scan your NFC token')"
        - title: "Duration of confirmation dialog"
          description: "The confirmation dialog (both coming and going) is shown for the selected amount of seconds"
        - title: "Screensaver"
          description: "Days of the week, when the screensaver should be activated. Between 6 a.m. and 10 p.m., the logo and time are displayed; otherwise, the screen is black."
        - title: "Hide entered/scanned code (the browsers password manager needs to be disabled)"
          description: "Transforms the text field into a password field. To prevent the browser from asking to store the passwords (codes), you need to disable the password manager."
        - title: "Grouped week view when clocking in and out"
          description: ""
        - title: "Hide logo"
          description: "Hides the company logo (see System > Preferences > My Company) from the Kiosk screen "
        - title: "Show 'not logged in' users on login screen"
          description: "Show avatars of all user that do not have a running timesheet on the log-in screen"
        - title: "Show 'logged in' users on login screen"
          description: "Show avatars of all user that have a running timesheet on the log-in screen"
        - title: "Save client IP for new timesheets"
          description: "Save the client IP in a timesheet custom-field (can be exported)"
        - title: "Play a short sound for logins and logouts"
          description: "Choose between silence, an audio sound and simple beeps"
        - title: "Prevent page reload in login process"
          description: ""
        - title: "Stop only kiosk activities when clocking out"
          description: 'If enabled, all "non-kiosk activities" will not be stopped for the user when clocking out'
