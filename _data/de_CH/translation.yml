    agency:
        features:
            introduction: Not all time tracking tools are created equal. The best solutions for agencies offer a specialized set of features to streamline your workflows.
            title: Kimai features most used by agencies
        testimonials:
            tag: Agency
            introduction: At Kimai, we've designed our time tracking platform to meet the needs of agencies, teams, and freelancers. Our intuitive interface and powerful features help agencies like yours work smarter and more profitably. You can now “listen” to the reviews of the real users.
            title: What agencies say about time tracking
        about:
            title: First steps for a better time tracking
            introduction: |
                You've already taken your first steps and we're sure you can make an informed choice. What else should you consider to choose the best time tracking software? Some solution providers offer free versions, which may have limitations, while others provide free demos, trials, or pricing options based on business size or number of users.

                At Kimai, we offer a free trial so you can explore our solution before deciding if additional users, features, or plugins are needed. Try it for free today, and have a more organized workday!
        title: Time Tracking For Agencies
        cta:
            title: Ready to start tracking time in your agency?
        name: Agencies
        introduction: |
            Are you running an agency - whether it's in marketing, PR, design, consulting, HR, or architecture? Then you know how critical time tracking is to your business. Tracking employee hours and client project time is essential for billing accurately, understanding profitability, and managing your growing team.

            But managing time tracking through spreadsheets and disconnected tools can quickly become a mess, especially as your agency scales. That's where a dedicated time tracking solution can be a game-changer.

            Let's explore why successful agencies rely on time tracking software and what essential features to look for. We’ll use Kimai as an example of a user-friendly solution built with agencies in mind.
        intro: Unlock profitability potential in fast-growing agencies with scalable time tracking system
        subtitle: The key to profitability
    lawyer:
        about:
            title: First steps for a better time tracking in your law practice
            introduction: |
                We understand that trying new software in law business can feel daunting. That's why we offer a free, no-obligation trial, easy onboarding, flexible set of features that grow with your practice or team, and dedicated support.

                We believe that even during a free trial you can try a way to stop wrestling with timesheets. Try Kimai for today and have a nice organized day!
        features:
            title: Kimai features loved by law firms
            introduction: Kimai is designed specifically with legal professionals in mind. We've created a time tracking tool that speaks your language – simple, reliable, GDPR compliant, and focused on making your workday smoother.
        testimonials:
            introduction: At Kimai, legal professionals and consultants have always been our focus. Now you can read about the real experience of our users.
            title: Insights on time tracking from our customers
        title: Time Tracking for Lawyer
        intro: Ditch complex timesheets and focus on delivering exceptional legal services with modern time tracking solutions
        subtitle: Focus on billable hours, not complicated timesheets
        name: Lawyers
        introduction: |
            In the fast-paced world of legal services, time is your most valuable asset. Law firms, independent attorneys, and legal teams need a time tracking solution tailored to the unique demands of their profession. At Kimai, we understand that your focus should be on delivering exceptional legal services — not on battling complex timesheets.

            Manual hour logging, endless spreadsheets, and complicated export processes take valuable time away from providing expert legal counsel. Discover how efficient time tracking can help you focus on what truly matters.
        cta:
            title: Ready to revolutionize time tracking in your practice?
    software-developers:
        features:
            title: Kimai features used by software engineers
            introduction: Discover the perfect set of features tailored to your tasks and goals. What if your IT team needs not just a simple time tracker but a robust solution with different integration options and advanced invoicing and analytics features?
        title: Time Tracking For Software Developers
        about:
            introduction: |
                Choosing the right time tracker often starts with deciding between a free version or a demo. Pricing is also a key factor, so look for options that scale with your team’s growth.

                At Kimai, we offer a free trial so you can explore our solution before deciding if additional features or plugins are needed. With pricing starting at just €0.99 per user for some industries, it’s an affordable choice. Try it for free today and bring more organization to your workday!
            title: First steps for a better time tracking
        subtitle: Maximize Your Productivity
        cta:
            title: |
                Ready to try a new way
                to track time in your IT team?
        testimonials:
            title: IT pros speak about time tracking
            introduction: At Kimai, we designed our time tracking platform with the needs of individual developers, dev teams, and IT departments in mind. Our approach focuses on building open-source solutions for tech teams of all sizes and across various sectors. You can see what kind of feedback we receive from our users from the tech.
        name: Software Developers
        intro: Maximize team productivity and achieve work-life balance with smart time tracking
        introduction: |
            We understand the pain all too well -  endless overtime, stressful deadlines, time-consuming bugs, and the constant struggle to make project managers and clients appreciate the true effort behind your code. It's a vicious cycle that can quickly lead to burnout and disrupt your work-life balance. This is a common challenge faced by software developers, programmers, engineers, and other tech professionals.

            But there's a way to break free from this cycle and regain control over your time and tasks. By using the right tools, you can maximize your productivity and gain valuable insights into your projects. Whether you're a freelance programmer, part of a startup team, or managing an entire IT department, finding a scalable solution with the right features is essential. Let’s explore Kimai - a user-friendly and powerful time tracking software - as an example.
    consultants:
        features:
            title: Kimai features most used by consultants
            introduction: Whether you are a freelancer or part of a large consulting department, Kimai offers tools to help you scale as your business grows.
        about:
            title: First steps for better time tracking in consulting
            introduction: |
                To get the most out of your time tracking software, start with exploring all the features through a demo or free trial. As a consultant, you will probably want to carefully consider the pricing options and think ahead about what features you might need as your business expands.

                At Kimai, we understand this journey. That's why we offer a free trial that lets you test-drive our solution before deciding which additional features or plugins would work best for you. Our all-in-one app grows with your business - you can easily add extensions whenever needed. Try it for free today and have a nice organized day!
        subtitle: Maximize billable hours & efficiency
        name: Consultants
        title: Time Tracking For Consultants
        testimonials:
            introduction: At Kimai, we’ve built our platform to cater to the needs of individual consultants and large teams alike. As an all-in-one solution, Kimai is trusted by companies of all sizes across various sectors. Here’s what our users in the consulting field have to say.
            title: Insights on time tracking from consulting professionals
        intro: Boost profitability and client value delivery through strategic time tracking for consultancy excellence
        introduction: |
            In today's dynamic consulting landscape, whether you're in management consulting, financial advisory, IT services, data science, legal counsel, psychological services, or HR consulting - one truth remains constant: time is your most valuable asset. Accurate time tracking isn't just about logging hours. It's about maximizing profitability and delivering value to your clients.

            Let's be honest - managing consulting projects isn't easy. Your team members might be working from New York, London, and Singapore all at once. That's a lot to keep track of! Plus, you need to know exactly who worked on what to bill your clients correctly. Without proper time tracking, things can get messy fast. You need to control your project costs, stay compliant with regulations, and make sure your team's time is used wisely.

            That's why all-in-one time tracking tools have become a must-have for consultants. They turn all this potential chaos into clear, organized data that helps your business thrive. Let's explore how a comprehensive solution like Kimai can transform your consulting business.
        cta:
            title: |
                Ready to try a new way
                to track time in your practice?
