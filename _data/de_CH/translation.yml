feature:
    auth:
        name: "Authentifizierung und Sicherheit"
        description: "Kimai unterstützt externe Identitätsanbieter und Anmeldung via LDAP und SAML über mehrere Provider (wie Google Workspace, Azure AD oder Authentik). Zwei-Faktor-Authentifizierung über TOTP-Tokens ist optional möglich."
    reporting:
        name: "Berichte und Auswertungen"
        description: "Analyse der erfassten Zeiten anhand von Benutzern, Kunden, Projekten, Aktivitäten, Tags, Zeiträumen und mehr."
    mobile-ready:
        name: "Mobil einsetzbar"
        description: "Das Layout ist vollständig responsiv und für den Desktop und mobilen Einsatz konzipiert. Jeder Benutzer kann die anzuzeigenden Datenspalten konfigurieren, z. B. um horizontales Scrollen auf kleinen Geräten zu verhindern."
    plugins:
        name: "Plugins"
        description: "Kimai wurde mit Fokus auf Erweiterbarkeit entwickelt, um Funktionen per Plugins hinzufügen zu können. Entwickler, die eigene Plugins für Kimai erstellen möchten, können auf eine umfangreiche API zugreifen."
    multi-user:
        name: "Mehrere Benutzer"
        description: "Kimai kann von beliebig vielen Benutzern verwendet werden: Jede Installation unterstützt eine unbegrenzte Anzahl von Benutzern mit unterschiedlichen Rollen (siehe Berechtigungen)."
    multi-language:
        name: "Sprachen"
        description: "Kimai kann in jede Sprache lokalisiert werden und ist bereits in mehr als 30 Sprachen übersetzt."
    teams:
        name: "Teams"
        description: "Teams teilen Ihre Benutzer in Gruppen ein. Schränken Sie den Zugriff auf Daten ein, indem Sie Ihren Teams Kunden und Projekte zuweisen."
    customers:
        name: "Kunden"
        description: "Verwalten Sie Ihre Kunden und legen Sie Adresse, Kontakte, Land, Währung, Sichtbarkeit (zur Archivierung) und viele weitere Felder fest."
    projects:
        name: "Projekte"
        description: "Verwalten Sie Projekte für jeden Kunden mit Auftragsnummer, Budget und Sichtbarkeit (zur Archivierung)."
    activities:
        name: "Tätigkeiten"
        description: "Tätigkeiten werden Zeiteinträgen zugewiesen und können zur Auswertung und Filterung verwendet werden. Tätigkeiten können global sein, keine Duplikate notwendig, wenn mehrere Projekte dieselbe Tätigkeit nutzen."
    invoices:
        name: "Rechnungen"
        description: "Verschiedene Rechnungsvorlagen, Möglichkeiten zur Gruppierung von Einträgen, konfigurierbare Rechnungsnummern und verschiedene Formate wie PDF und DOCX."
    export:
        name: "Daten Export"
        description: "Stundenzettel können in verschiedenen Formaten exportiert werden. Exportierte Datensätze werden gesperrt und vor weiteren Änderungen geschützt."
    expenses:
        name: "Ausgaben"
        description: "Behalten Sie den Überblick über Ihre Ausgaben basierend auf Kunde, Projekt und Aktivität. Diese Ausgaben können kategorisiert und in Ihre Rechnungen aufgenommen werden. Die Spesen- und Ausgabenverwaltung ist als kostenpflichtiges Plugin verfügbar."
    2fa:
        name: "Zwei-Faktor Anmeldung (2FA)"
        description: "Kimai unterstützt die Zwei-Faktor-Authentifizierung mit TOTP-Tokens: sichern Sie Ihre Benutzerkonten noch heute ab!"
    saml:
        name: "SAML"
        description: "Benutzer können sich mit SAML anmelden bzw. registrieren und dafür Ihren vorhandenen Identitätsanbieter wie Google Workspace, Authentik oder Azure Active Directory nutzen."
    api:
        name: "JSON API"
        description: "Mit einer umfangreichen JSON API zum Lesen und Schreiben von Daten, so dass externe Anwendungen mit Ihrem bevorzugten Time-Tracker kommunizieren können."
    ldap:
        name: "LDAP"
        description: "Verbinden Sie Kimai mit Ihrem Unternehmensverzeichnisserver (LDAP oder Active Directory) und nutzen Sie Ihre vorhandene Authentifizierungsinfrastruktur."
    statistics:
        name: "Statistiken"
        description: "Ihr Dashboard zeigt Ihnen mehrere Statistiken über aufgezeichnete Zeiten und die Menge der gesammelten Daten. Und wir können jederzeit weitere Diagramme hinzufügen!"
    docker:
        name: "Docker"
        description: "Wir haben Docker-Images für die Entwicklung und es gibt mehrere Docker-Compose Varianten für den Produktionsbetrieb."
    migrate-v1:
        name: "Migration"
        description: "Daten aus Kimai v1 können für eine nahtlose Migration Ihrer Zeiterfassung importiert werden."
    active-entries:
        name: "Anzahl laufender Einträge"
        description: "Sie können beliebig viele Zeiten gleichzeitig aufzeichnen, oder Sie limitieren die Anzahl paralleler Aufzeichnungen auf eine."
    am-pm-format:
        name: "AM/PM Format"
        description: "Kimai verwendet eine lokalisierte Version des 24-Stunden-Formats. Aber wenn Sie an das AM/PM-Format gewöhnt sind, können Sie das konfigurieren."
    time-clock:
        name: "Stechuhr"
        description: "Wollen Sie verhindern, das Ihre Benutzer manuelle Zeiteinträge erstellen? Wechseln Sie in den Stechuhr Modus, der nur „Punch-In“- und „Punch-Out“-Aufnahmen zulässt."
    duration-only:
        name: "Nur Dauer"
        description: "Wenn Ihre lokalen Gesetze verlangen, dass Sie nur die Dauer anstelle von Start- und Enddatum und Uhrzeit anzeigen, können Sie diesen Modus global aktivieren."
    rates:
        name: "Stundensatz Berechnung"
        description: "Tarife können basierend auf Stunden- und Festbeträgen berechnet werden, individuell konfigurierbar für Kunden, Projekte, Aktivitäten und jeden Stundenzettel-Datensatz ."
    timesheet-filter:
        name: "Suche nach Zeiten"
        description: "Sie können alle Zeiterfassungen nach Benutzer, Kunde, Projekt, Aktivität und Datum filtern."
    permissions:
        name: "Berechtigungen"
        description: "Anpassbare Berechtigungsstruktur. Weisen Sie Ihrem Benutzer verschiedene Rollen zu, z. B. können Benutzer Zeiten erfassen, Teamleiter können Rechnungen drucken und Projekte/Aktivitäten konfigurieren, Administratoren können Benutzer und Kunden konfigurieren."
    user-profile:
        name: "Benutzerprofil"
        description: "Persönliche Statistiken und Benutzereinstellungen für Stundensatz, Kimai-Design, Passwort und Avatar."
    user-registration:
        name: "Benutzer Registrierung"
        description: "Kimai unterstützt die Selbstregistrierung von Benutzern mit E-Mail-Aktivierung."
    password-reset:
        name: "Passwort vergessen"
        description: "Passwort vergessen? Kein Problem, Kimai hat eine Funktion zum Zurücksetzen des Passworts per E-Mail."
    dark-mode:
        name: Dunkelmodus
        description: Jede App benötigt einen dunklen Modus. Und dieser hilft auch dabei, die Augen am Abend oder in dunklen Umgebungen zu entlasten.
    customer-portal:
        name: Kundenportal
        description: Geben Sie Kunden- und Projektstatistiken sowie Zeiterfassungsbögen über eine geheime, optional passwortgeschützte URL an andere weiter.
    no-limits:
        description: "Your SaaS software always includes limits? Not Kimai: there are no limits. You only pay for the amount of active users. I don't limit you, and I do not charge for inactive users. You can create an unlimited amount of users, customers, projects, activities, timesheets and more."
        name: Kennt keine Limits
    privacy:
        name: Privacy comes first
        description: I respect your and your users privacy and data. No, this is not yet another boring introduction into a Privacy policy - that's how I run this business. I don't sell data. I follow the GDPR and will answer any question about involved sub-processors.
    security:
        name: Security in Kimai
        points:
            security_1: Secure password hashing with Argon2 or Sodium
            security_2: Granular user-roles restricting access
            security_3: CSRF and XSS protection
            security_6: Automated code test with a code coverage above 90%
            security_4: Continuous integration with thousands of checks
            security_5: In-depth code reviews
        description: Kimai implements best-practices in application design to prevent common attacks. Automated security controls are critical to any software development workflow to reduce the amount of time from defect creation to defect detection. These scans run on every code change, every time.
    security-cloud:
        points:
            security_1: All connections secured via TLS (SSL)
            security_2: Best-practice security, firewalls and brute-force prevention
            security_6: Code runs in tightly restricted domain environments
            security_3: No multi-tenancy, each customer has their own database
            security_4: Servers are hosted in a data center in the EU
            security_5: Critical services are not accessible to the outside world
        name: Security in the platform
        description: Software is only as secure as the system it runs on. I take a defense-in-depth approach with server and network infrastructure. Customers on the hosted platform are secured through multiple layers of protection.
install:
    ssh: Die empfohlene Methode installiert Kimai direkt auf Ihrem Server.
    docker: Verwenden Sie unser Docker-Image, um den Kimai-Container zu installieren.
    kubernetes: Sie können Kimai mit unseren Helm-Charts auf Kubernetes bereitstellen.
    cloud: Sie können Kimai sofort und ohne Installation verwenden.
    alert-vps: Zu diesem Zeitpunkt ist es nicht möglich, Kimai durch Herunterladen einer ZIP-Datei und Hochladen der Dateien auf Ihren Webserver zu installieren. Sie benötigen einen SSH-Zugang, um die erforderlichen Befehle auszuführen. Das bedeutet nicht unbedingt, dass Sie einen VPS benötigen. Einige Shared Hosts bieten Ihnen SSH-Zugang, über den Sie Composer und Kimai problemlos installieren können.
    caddy-docker: Using Docker-Compose and Caddy as reverse-proxy with SSL support.
developer:
    kevinpapst:
        intro: "Es war schon immer mein Traum, meinen Lebensunterhalt mit einem Open Source Produkt zu verdienen. Mit Kimai konnte ich eine Software entwickeln, die meinen Kunden einen hohen Mehrwert bietet und deren Weiterentwicklung mich jeden Tag aufs Neue motiviert.\n\nMein besonderer Dank gilt der tollen Community für die langjährige Treue, ich freue mich auf die nächsten 10 Jahre Kimai 🚀\n"
history:
    intro: "Was als Hobbyprojekt begann, ist jetzt die führende Open-Source-Zeiterfassungsanwendung der Welt. Tauchen wir in seine Geschichte ein."
    early-days-subtitle: "Kimai hat eine lange Geschichte und ist seit 2006 dabei, hier ist ein kurzer Überblick, wie alles begann."
    early-days-title: "Wie alles begann"
    year-2006: "Die erste Version von Kimai wird veröffentlicht und gewinnt schnell eine wachsende Benutzerbasis."
    year-2009: "Torsten, der ursprüngliche Entwickler, möchte Kimai schließen. Kevin übernimmt und wird zum Maintainer."
    year-2014: "Nach der letzten Veröffentlichung von Kimai 1 stockt die Entwicklung und es gibt kaum noch Aktivität."
    year-2018: "Die Neufassung von Kimai findet ihren Weg in die Gemeinschaft, die Datenmigration funktioniert."
    year-2019: "Erste Plugins werden erstellt, um das Interesse an kostenpflichtiger Open-Source Software zu validieren."
    year-2020: "Kimai wird als SaaS angeboten, mit einem kostenlosen und zwei kostenpflichtigen Abonnements."
    year-2023: "Die harte Arbeit zahlt sich endlich aus und Kimai ist jetzt mein 100% Vollzeitjob. Danke!"
    current: "Kimai is a time tracking app with a long history. The first version was released in 2006. Why do I mention that? Because I have seen so many services come and go since then - trust me when I say: I'm sticking around. I didn't make a living from Kimai for many years, it was the fun that kept me motivated to improve Kimai. I believe that fun is one of the main reasons for Kimai's success.\n\nI build Kimai for one purpose: to track your working hours. Kimai supports an unlimited number of users and timesheet entries, so you can manage all your teams/departments in one easy to use installation. Kimai is web based, so all you need is a PHP enabled web server. It's built with a responsive design, so you can even track times on your mobile device when you're on the go. Kimai is translated into multiple languages and missing translations can be easily added using the open translation standard Xliff.\n\nOh, and did I mention that you can create invoices from your timesheets in your browser? Not only does it have customisable Kimai can be easily extended in many ways. It's built on the most popular and modern frameworks and has an active community which produces a lot of plugins that extend the core functionality of Kimai.\n\nI could write so much more about the features and benefits that Kimai can bring to you - whether you are a freelancer, a small organisation a small organisation or a company with hundreds of employees - but I think that giving you the opportunity to try it directly is even better than a thousand words from me.\n"
    past: "Kimai has a long history and was way ahead of its time when Torsten Höltge and his team started developing it in 2006. It had a responsive design (thanks to a lot of Javascript magic) before the word had even been officially invented.\n\nHe was about to shut it down for personal reasons when Kevin stepped in as maintainer in 2009. With the help of other open source volunteers, he was able to keep it alive and expand it for several years.\n\nIn the meantime, the PHP community had made great strides forward, and Kimai felt left behind due to its technical history - built around a lot of individual PHP scripts, all of which had to be publicly available. It also had some major drawbacks, such as limited extensibility and a problematic database design. After many years of development, the codebase had become difficult to maintain and the logic was scattered across scripts, classes and the frontend layer.\n\nTherefore, the idea of rewriting Kimai with modern frameworks has been around for a long time, also driven by community requests, but there wasn't time to push these ideas forward. At the end of 2017, Symfony 4.0 was released together with a nice frontend stack. That's when I took the opportunity to start developing the next evolutionary step: the Kimai (v2) was born.\n\nThe original Kimai was first released in 2006 and has been used by many people around the world. I am proud of that and of the great community. Now, after 5 years, most people have migrated to the new Kimai version and the number of users is growing every day. That's why I would like to thank everyone who has contributed to Kimai.\n"
