            На щастя, існують інструменти, які допомагають фрілансерам, підрядникам, цифровим кочівникам і solopreneur’ам обліковувати оплачувані години, виставляти рахунки клієнтам без зайвих клопотів, керувати погодинними ставками й витратами тощо.

            Це дозволяє вам зосередитися на тому, що ви любите, — і отримувати оплату, на яку ви справді заслуговуєте. Розгляньмо, як це робиться з Kimai як інструментом обліку часу для фрілансерів.
        cta:
            title: Ready to get the most of your time as a freelancer?
        title: Облік часу для успішних фрілансерів
        about:
            title: Перші кроки до кращого управління часом
            introduction: |
                Готові відчути переваги Kimai? Ми пропонуємо безкоштовний пробний період, щоб ви могли ознайомитися з усіма функціями, перш ніж вирішити, яке програмне забезпечення для обліку часу найкраще підходить вам як незалежному професіоналу.

                Зареєструйтеся сьогодні, почніть обліковувати свій час буквально одним кліком і насолоджуйтеся більш організованим днем!
        intro: Максимізуйте свій дохід як solopreneur
    universities:
        cta:
            title: Ready to transform time management at your institution?
        subtitle: ' '
        testimonials:
            introduction: |
                У Kimai ми створили нашу платформу обліку часу так, щоб вона відповідала потребам агентств, команд і фрілансерів.
                Наш інтуїтивний інтерфейс і потужні функції допомагають агентствам, як ваше, працювати розумніше та прибутковіше.
                Тепер ви можете "почути" відгуки реальних користувачів.
            title: Що кажуть наші клієнти
        name: Університети
        introduction: |
            Управління часом у вищій освіті несе унікальні виклики, зокрема планування лекцій та занять, відстеження дослідницьких проєктів, розподіл часу студентів і викладачів та трудомісткі адміністративні завдання.

            Ефективні рішення для обліку часу допомагають оптимізувати ці процеси, дозволяючи викладачам і дослідникам зосередитися на своїх основних обов’язках.
        features:
            title: Функції для управління часом у межах усієї установи
            introduction: |
                Наше рішення для обліку часу було вдосконалене у співпраці з кількома університетами. Реальні відгуки користувачів керують нашим розвитком, забезпечуючи функції, які справді відповідають академічним потребам.

                Серед академічних установ, що використовують Kimai, варто згадати: `Universität Hamburg`, `Universität Bonn`, `Universität Wien`, `Universität Stuttgart`, `Universität Frankfurt`, `University of Fribourg`, `TU Dresden` та `University of Moscow`.
        about:
            title: Розпочніть свій шлях до кращого управління часом
            introduction: |
                Ми розуміємо, що впровадження нової системи обліку часу в академічному середовищі вимагає ретельного обдумування.
                Тому ми пропонуємо безкоштовний пробний період і демо-сеанси.
                Спробуйте Kimai безкоштовно зараз і насолоджуйтеся більш організованим днем!
        intro: Трансформуйте ефективність вашої установи завдяки потужному обліку часу
        title: Облік часу для академічного сектору
    non-profit:
        about:
            introduction: |
                If you represent a non-profit organization, please register with an official
                email address of your organization and send us a brief support message. The plan will be activated after manual review.

                In return, we ask for a testimonial with your logo and name, or an interview so we can feature you as a user.
            title: Our affordable non-profit plan for you
        introduction: |
            Today we say thank you to the many NGOs and NPOs:

            - Charitable and philanthropic organizations
            - Public and independent schools, universities, community colleges
            - Public safety agencies, emergency services, disaster relief, fire departments, civil protection
            - Conservation, sports, and all other clubs that foster community and teach skills
            - Social services, elderly care, and youth facilities
            - … and the many, many others we forgot to mention

            You give your time, create small and great wonders, and enrich the lives of so many: **Thank you for being there ❤️**

            As an organization grows, donations increase, and the first employees come on board, the need for structured time tracking becomes clear. Documenting workflows transparently helps identify opportunities for improvement early on – freeing up resources for your actual mission while laying the groundwork for transparent accountability reports.
        subtitle: Less administrative burden, so your mission stays in focus
        cta:
            title: |
                We want to help you
                simplify your time tracking
        title: Time Tracking for Non-Profit Organizations ✨
        features:
            title: Features that NPOs appreciate
            introduction: Kimai helps many non-profits gain insight into their projects while simplifying working time management. We have built a time tracking tool that speaks your language – simple, reliable, GDPR-compliant, and designed to make your daily work run more smoothly.
        testimonials:
            title: What other NPOs say about Kimai
            introduction: |
                Thanks to Kimai's open-source roots, we see ourselves as part of the broader non-profit movement that spans so many fields and sectors.
                We are happy to support you!
        intro: We put your work and vision center stage while simplifying administration and billing
        name: Non-Profits
