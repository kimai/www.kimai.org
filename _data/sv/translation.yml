industries:
    name: Industrier
    agency:
        features:
            introduction: Alla tidrapporteringsverktyg är inte likadana. De bästa lösningarna för byråer erbjuder en specialiserad uppsättning funktioner som effektiviserar era arbetsflöden.
            title: Kimai‑funktioner som används mest av byråer
        testimonials:
            tag: Byrå
            introduction: På Kimai har vi utformat vår plattform för tidrapportering för att möta behoven hos byråer, team och frilansare. Vårt intuitiva gränssnitt och våra kraftfulla funktioner hjälper byråer som din att arbeta smartare och mer lönsamt. Nu kan du ”lyssna” på recensionerna från riktiga användare.
            title: Vad byråer säger om tidrapportering
        about:
            title: Första stegen mot bättre tidrapportering
            introduction: |
                Du har redan tagit dina första steg, och vi är övertygade om att du kan göra ett välgrundat val. Vad mer bör du tänka på för att välja den bästa programvaran för tidrapportering? Vissa leverantörer erbjuder gratisversioner, som kan ha begränsningar, medan andra erbjuder gratis demos, testperioder eller prismodeller baserade på företagets storlek eller antal användare.

                Hos Kimai erbjuder vi en gratis testperiod så att du kan utforska vår lösning innan du bestämmer om fler användare, funktioner eller plugins behövs. Prova gratis redan idag och få en mer organiserad arbetsdag!
        title: Tidrapportering för byråer
        cta:
            title: Redo att börja spåra tid i din byrå?
        name: Byråer
        introduction: |
            Driver du en byrå – oavsett om det är inom marknadsföring, PR, design, konsulting, HR eller arkitektur? Då vet du hur avgörande tidrapportering är för verksamheten. Att spåra medarbetarnas timmar och projekttid för kunder är nödvändigt för att fakturera korrekt, förstå lönsamheten och leda ett växande team.

            Men att hantera tidrapportering i kalkylblad och separata verktyg blir snabbt rörigt, särskilt när byrån växer. Därför kan en dedikerad lösning för tidrapportering göra enorm skillnad.

            Låt oss titta på varför framgångsrika byråer förlitar sig på tidrapporteringsprogram och vilka viktiga funktioner du bör leta efter. Vi använder Kimai som exempel på en användarvänlig lösning byggd med byråer i åtanke.
        intro: Lås upp lönsamhetspotentialen i snabbväxande byråer med ett skalbart tidrapporteringssystem
        subtitle: Nyckeln till lönsamhet
    lawyer:
        about:
            title: Första stegen mot bättre tidrapportering i din juridiska verksamhet
            introduction: |
                Vi förstår att det kan kännas överväldigande att testa ny programvara inom juridisk verksamhet. Därför erbjuder vi en gratis provperiod utan bindningstid, enkel onboarding, ett flexibelt funktionsutbud som växer med din byrå eller ditt team, samt dedikerad support.

                Vi tror att du redan under provperioden kan upptäcka ett sätt att slippa brottas med tidrapporter. Prova Kimai idag och njut av en mer organiserad arbetsdag!
        features:
            title: Kimai‑funktioner som advokatbyråer uppskattar
            introduction: Kimai är utformat med juridiska yrkesutövare i åtanke. Vi har skapat ett tidrapporteringsverktyg som talar ditt språk – enkelt, pålitligt, GDPR‑kompatibelt och fokuserat på att göra din arbetsdag smidigare.
        testimonials:
            introduction: På Kimai har juridiska yrkesutövare och konsulter alltid stått i fokus. Nu kan du ta del av våra användares verkliga erfarenheter.
            title: Insikter om tidrapportering från våra kunder
        title: Time Tracking för jurister
        intro: Lämna krångliga tidrapporter bakom dig och fokusera på att leverera förstklassiga juridiska tjänster med moderna lösningar för tidrapportering
        subtitle: Fokusera på debiterbara timmar, inte krångliga tidrapporter
        name: Jurister
        introduction: |
            I den snabbrörliga juridiska världen är tid din mest värdefulla tillgång. Advokatbyråer, fristående jurister och juridiska team behöver en tidrapporteringslösning som är anpassad efter yrkets unika krav. På Kimai förstår vi att ditt fokus ska ligga på att leverera förstklassiga juridiska tjänster — inte på att kämpa med krångliga tidrapporter.

            Manuell tidsregistrering, oändliga kalkylblad och komplicerade exportprocesser stjäl värdefull tid från det som verkligen betyder något: att ge kvalificerad juridisk rådgivning. Upptäck hur effektiv tidrapportering kan hjälpa dig att fokusera på det som verkligen räknas.
        cta:
            title: Redo att revolutionera tidrapporteringen i din verksamhet?
    software-developers:
        features:
            title: Kimai‑funktioner som används av mjukvaruingenjörer
            introduction: Upptäck den perfekta uppsättningen funktioner anpassade efter dina uppgifter och mål. Tänk om ditt IT‑team behöver mer än en enkel tidrapportering — en robust lösning med olika integrationsmöjligheter samt avancerade funktioner för fakturering och analys?
        title: Time Tracking för mjukvaruutvecklare
        about:
            introduction: |
                Att välja rätt tidrapporteringsverktyg börjar ofta med att avgöra om du ska använda en gratisversion eller testa en demo. Priset är också en viktig faktor, så leta efter alternativ som kan växa i takt med ditt team.

                Hos Kimai erbjuder vi en gratis provperiod så att du kan utforska vår lösning innan du bestämmer om du behöver fler funktioner eller plugins. Med priser som börjar på bara €0,99 per användare för vissa branscher är det ett prisvärt val. Prova gratis redan idag och få en mer organiserad arbetsdag!
            title: Första stegen mot bättre tidrapportering
        subtitle: Maximera din produktivitet
        cta:
            title: |
                Redo att testa ett nytt sätt
                att spåra tid i ditt IT‑team
        testimonials:
            title: IT‑proffs berättar om tidrapportering
            introduction: På Kimai har vi utformat vår plattform för tidrapportering med behoven hos enskilda utvecklare, utvecklingsteam och IT‑avdelningar i åtanke. Vår metod fokuserar på att bygga open‑source‑lösningar för teknikteam i alla storlekar och inom olika branscher. Här kan du se vilken typ av feedback vi får från våra användare inom tech.
        name: Programvaruutvecklare
        intro: Maximera teamets produktivitet och uppnå balans mellan arbete och fritid med smart tidrapportering
        introduction: |
            Vi känner alltför väl igen smärtan – oändlig övertid, stressiga deadlines, tidskrävande buggar och den ständiga kampen för att få projektledare och kunder att förstå det verkliga arbetet bakom din kod. Det är en ond cirkel som snabbt kan leda till utbrändhet och rubba balansen mellan arbete och fritid. Detta är en vanlig utmaning för mjukvaruutvecklare, programmerare, ingenjörer och andra teknikproffs.

            Men det finns ett sätt att bryta sig loss från denna cirkel och återfå kontrollen över din tid och dina uppgifter. Med rätt verktyg kan du maximera din produktivitet och få värdefulla insikter i dina projekt. Oavsett om du är frilansande programmerare, en del av ett startup‑team eller ansvarar för en hel IT‑avdelning är det avgörande att hitta en skalbar lösning med rätt funktioner. Låt oss ta en titt på Kimai – en användarvänlig och kraftfull programvara för tidrapportering – som exempel.
    consultants:
        features:
            title: Kimai‑funktioner som används mest av konsulter
            introduction: Oavsett om du är frilansare eller en del av en större konsultavdelning erbjuder Kimai verktyg som hjälper dig att växa i takt med att verksamheten expanderar.
        about:
            title: Första stegen mot bättre tidrapportering inom konsultbranschen
            introduction: |
                För att få ut mesta möjliga av din programvara för tidrapportering bör du börja med att utforska alla funktioner genom en demo eller en gratis testperiod. Som konsult vill du troligen granska prisalternativen noggrant och tänka framåt kring vilka funktioner du kan behöva när verksamheten växer.

                På Kimai förstår vi den här resan. Därför erbjuder vi en gratis testperiod som låter dig provköra vår lösning innan du bestämmer vilka extra funktioner eller plugins som passar dig bäst. Vår allt‑i‑ett‑app växer med din verksamhet – du kan enkelt lägga till utökningar när behovet uppstår. Prova gratis redan idag och njut av en välorganiserad arbetsdag!
        subtitle: Maximera debiterbara timmar och effektivitet
        name: Konsulter
        title: Tidrapportering för konsulter
        testimonials:
            introduction: På Kimai har vi byggt vår plattform för att möta behoven hos både enskilda konsulter och stora team. Som en allt‑i‑ett‑lösning används Kimai av företag i alla storlekar och inom många olika branscher. Här är vad våra användare inom konsultområdet säger.
            title: Insikter om tidrapportering från konsultproffs
        intro: Öka lönsamheten och leveransen av kundvärde genom strategisk tidrapportering för förstklassig konsultverksamhet
        introduction: |
            I dagens dynamiska konsultlandskap – oavsett om du arbetar inom managementkonsulting, finansiell rådgivning, IT‑tjänster, datavetenskap, juridisk rådgivning, psykologiska tjänster eller HR‑konsulting – finns det en sak som alltid gäller: tid är din mest värdefulla tillgång. Noggrann tidrapportering handlar inte bara om att logga timmar. Det handlar om att maximera lönsamheten och leverera värde till dina kunder.

            Låt oss vara ärliga – att hantera konsultprojekt är inte enkelt. Dina teammedlemmar kan arbeta från New York, London och Singapore samtidigt. Det är mycket att hålla koll på! Dessutom måste du veta exakt vem som gjort vad för att fakturera korrekt. Utan ordentlig tidrapportering blir det snabbt rörigt. Du behöver kontrollera projektkostnader, följa regelverk och säkerställa att teamets tid används klokt.

            Därför har allt‑i‑ett‑lösningar för tidrapportering blivit ett måste för konsulter. De förvandlar potentiellt kaos till tydlig, organiserad data som hjälper verksamheten att växa. Låt oss utforska hur en heltäckande lösning som Kimai kan förändra din konsultverksamhet.
        cta:
            title: |
                Redo att prova ett nytt sätt 
                att spåra tid i din verksamhet
    freelancers:
        name: Frilansare
        testimonials:
            introduction: "Lita inte bara på vårt ord. Här är vad andra frilansare säger:"
            title: Vad andra yrkesverksamma säger om tidrapportering med Kimai
        features:
            title: 'Funktioner som frilansare älskar '
            introduction: Kimai är utformat för att hjälpa soloprenörer att effektivisera sitt arbetsflöde. Oavsett om du jonglerar flera kunder eller hanterar en mängd olika projekt ger Kimai dig de verktyg du behöver för att hålla ordning och vara lönsam.
        introduction: |
            När frilanslivet blir ett nytt kapitel i ditt liv behöver du prova nya roller och möta nya utmaningar. En av dessa är tidsplanering – att balansera arbetade timmar med projektens lönsamhet. Att jonglera flera projekt kräver analys, både för dig och dina kunder.

            Men det finns verktyg som hjälper frilansare, konsulter, digitala nomader och soloprenörer att hålla koll på debiterbara timmar, fakturera utan att slita sitt hår, hantera timpriser och utgifter med mera.

            Det gör att du kan fokusera på det du älskar – och få betalt det du verkligen förtjänar. Låt oss se hur Kimai som tidrapporteringsverktyg kan hjälpa frilansare.
        cta:
            title: Redo att få ut det mesta av din tid som frilansare?
        title: Tidrapportering för framgångsrika frilansare
        about:
            title: Första stegen mot bättre tidsplanering
            introduction: |
                Är du redo att uppleva fördelarna med Kimai? Vi erbjuder en gratis testperiod så att du kan utforska alla funktioner innan du bestämmer vilken tidrapporteringslösning som passar dig bäst som egenföretagare.

                Registrera dig idag, börja spåra din tid med bokstavligen ett klick och få en mer organiserad dag!
        intro: Maximera din inkomst som soloprenör
    universities:
        cta:
            title: Redo att förändra tidshanteringen på din institution?
        subtitle: ' '
        testimonials:
            introduction: |
                På Kimai har vi utformat vår plattform för tidrapportering för att möta behoven hos byråer, team och frilansare.
                Vårt intuitiva gränssnitt och våra kraftfulla funktioner hjälper byråer som din att arbeta smartare och mer lönsamt.
                Nu kan du dessutom ”lyssna” på recensionerna från verkliga användare.
            title: Vad våra kunder säger
        name: Universitet
        introduction: |
            Att hantera tid inom högre utbildning innebär unika utmaningar, inklusive schemaläggning av föreläsningar och lektioner, uppföljning av forskningsprojekt, tidsfördelning för studenter och personal samt tidskrävande administrativa uppgifter.

            Effektiva tidrapporteringslösningar kan hjälpa till att effektivisera dessa processer, så att lärare och forskare kan fokusera på sina kärnuppgifter.
        features:
            title: Funktioner för institutionsövergripande tidshantering
            introduction: |
                Vår lösning för tidrapportering har förfinats genom samarbeten med flera universitet. Äkta användarfeedback driver vår utveckling och säkerställer funktioner som verkligen möter akademiska behov.

                Här är några av de akademiska institutioner som använder Kimai: Universität Hamburg, Universität Bonn, Universität Wien, Universität Stuttgart, Universität Frankfurt, University of Fribourg, TU Dresden och University of Moscow.
        about:
            title: Starta din resa mot bättre tidshantering
            introduction: |
                Vi förstår att införandet av ett nytt tidrapporteringssystem i en akademisk miljö kräver noggrann övervägning.
