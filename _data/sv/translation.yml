        intro: 'Det har alltid varit min dröm att kunna försörja mig på en open source‑produkt. Med Kimai har jag kunnat utveckla en programvara som ger stort värde till mina kunder och vars utveckling driver mig varje dag.


            Ett särskilt tack till det fantastiska communityt för deras lojalitet genom åren – jag ser fram emot de kommande 10 åren med Kimai 🚀'
