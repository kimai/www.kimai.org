industries:
    name: Odvetvia
    agency:
        features:
            introduction: Nie všetky nástroje na sledovanie času sú rovnaké. Najlepšie riešenia pre agentúry ponúkajú špecializovanú sadu funkcií na zefektívnenie vašich procesov.
            title: Funkcie Kimai najčastejšie používané agentúrami
        testimonials:
            tag: Agentúra
            introduction: V Kimai sme našu platformu na sledovanie času navrhli tak, aby spĺňala potreby agentúr, tímov a freelancerov. Naše intuitívne rozhranie a výkonné funkcie pomáhajú agentúram, ako je tá vaša, pracovať šikovnejšie a so ziskom. Teraz si môžete „vypočuť" recenzie skutočných používateľov.
            title: Čo o sledovaní času hovoria agentúry
        about:
            title: Prvé kroky k lepšiemu sledovaniu času
            introduction: |
                Prvé kroky už máte za sebou a sme si istí, že dokážete urobiť informované rozhodnutie. Čo ďalšie by ste mali zvážiť pri výbere najlepšieho softvéru na sledovanie času? Niektorí dodávatelia ponúkajú bezplatné verzie, ktoré môžu mať obmedzenia, iní bezplatné demá, skúšobné obdobia alebo ceny podľa veľkosti firmy či počtu používateľov.

                V Kimai ponúkame bezplatnú skúšobnú verziu, aby ste si naše riešenie mohli vyskúšať, kým sa rozhodnete, či potrebujete ďalších používateľov, funkcie alebo pluginy. Vyskúšajte ju dnes zadarmo a majte organizovanejší pracovný deň!
        title: Sledovanie času pre agentúry
        cta:
            title: Ready to start tracking time in your agency?
        name: Agentúry
        introduction: |
            Vediete agentúru — či už marketingovú, PR, dizajn, poradenstvo, HR alebo architektúru? Potom viete, aké dôležité je sledovanie času pre vaše podnikanie. Evidencia hodín zamestnancov a času stráveného na projektoch klientov je nevyhnutná na presnú fakturáciu, pochopenie ziskovosti a riadenie rastúceho tímu.

            Ale spravovať sledovanie času pomocou tabuliek a nepripojených nástrojov sa môže rýchlo stať chaosom, najmä keď vaša agentúra rastie. A práve tu môže urobiť veľký rozdiel špecializované riešenie na sledovanie času.

            Pozrime sa, prečo úspešné agentúry spoliehajú na softvér na sledovanie času a aké kľúčové funkcie treba hľadať. Ako príklad používateľsky prívetivého riešenia navrhnutého pre agentúry použijeme Kimai.
        intro: Uvoľnite potenciál ziskovosti v rýchlo rastúcich agentúrach vďaka škálovateľnému systému sledovania času
        subtitle: Kľúč k ziskovosti
    lawyer:
        about:
            title: Prvé kroky k lepšiemu sledovaniu času vo vašej advokátskej praxi
            introduction: |
                Chápeme, že vyskúšať nový softvér v právnej oblasti môže pôsobiť odstrašujúco. Preto ponúkame bezplatné skúšobné obdobie bez záväzkov, jednoduchý onboarding, flexibilnú sadu funkcií, ktorá rastie spolu s vašou praxou alebo tímom, a dedikovanú podporu.

                Veríme, že aj počas bezplatnej skúšobnej verzie si môžete nájsť spôsob, ako prestať zápasiť s výkazmi. Vyskúšajte Kimai dnes a majte pekne organizovaný deň!
        features:
            title: Funkcie Kimai obľúbené v advokátskych kanceláriách
            introduction: Kimai je navrhnuté špeciálne s ohľadom na právnych profesionálov. Vytvorili sme nástroj na sledovanie času, ktorý hovorí vaším jazykom — jednoduchý, spoľahlivý, v súlade s GDPR a navrhnutý tak, aby vám spríjemnil pracovný deň.
        testimonials:
            introduction: V Kimai boli právni profesionáli a konzultanti vždy našou prioritou. Teraz si môžete prečítať o skutočných skúsenostiach našich používateľov.
            title: Pohľad našich zákazníkov na sledovanie času
        title: Sledovanie času pre advokátov
        intro: Zbavte sa komplikovaných výkazov práce a sústreďte sa na poskytovanie výnimočných právnych služieb vďaka moderným riešeniam na sledovanie času
        subtitle: Sústreďte sa na fakturovateľné hodiny, nie na komplikované výkazy
        name: Advokáti
        introduction: |
            V rýchlom svete právnych služieb je čas vaším najcennejším aktívom. Advokátske kancelárie, samostatní advokáti aj právne tímy potrebujú riešenie na sledovanie času, prispôsobené špecifickým nárokom ich profesie. V Kimai chápeme, že vaša pozornosť by mala patriť poskytovaniu výnimočných právnych služieb — a nie zápasu s komplikovanými výkazmi.

            Ručné zaznamenávanie hodín, nekonečné tabuľky a komplikované exporty berú cenný čas, ktorý by ste mohli venovať odbornému právnemu poradenstvu. Zistite, ako vám efektívne sledovanie času pomôže sústrediť sa na to, na čom skutočne záleží.
        cta:
            title: Ready to revolutionize time tracking in your practice?
    software-developers:
        features:
            title: Funkcie Kimai používané softvérovými inžiniermi
            introduction: Objavte perfektnú sadu funkcií prispôsobenú vašim úlohám a cieľom. Čo ak váš IT tím nepotrebuje len jednoduché sledovanie času, ale robustné riešenie s rôznymi možnosťami integrácie a pokročilými funkciami fakturácie a analytiky?
        title: Sledovanie času pre vývojárov softvéru
        about:
            introduction: |
                Voľba správneho nástroja na sledovanie času často začína rozhodnutím medzi bezplatnou verziou a demom. Cena je tiež kľúčovým faktorom, takže hľadajte možnosti, ktoré rastú spolu s vaším tímom.

                V Kimai ponúkame bezplatné skúšobné obdobie, aby ste si naše riešenie mohli preskúmať, kým sa rozhodnete, či potrebujete ďalšie funkcie alebo pluginy. S cenami už od 0,99 € za používateľa v niektorých odvetviach ide o cenovo dostupnú voľbu. Vyskúšajte ho dnes zadarmo a vneste do svojho pracovného dňa viac poriadku!
            title: Prvé kroky k lepšiemu sledovaniu času
        subtitle: Maximalizujte svoju produktivitu
        cta:
            title: |
                Pripravení vyskúšať nový spôsob
                sledovania času vo vašom IT tíme?
        testimonials:
            title: IT profesionáli o sledovaní času
            introduction: V Kimai sme našu platformu na sledovanie času navrhli s ohľadom na potreby jednotlivých vývojárov, vývojárskych tímov a IT oddelení. Zameriavame sa na budovanie open-source riešení pre technické tímy všetkých veľkostí a v rôznych odvetviach. Môžete sa pozrieť, akú spätnú väzbu dostávame od našich používateľov z technickej oblasti.
        name: Vývojári softvéru
        intro: Maximalizujte produktivitu tímu a dosiahnite rovnováhu medzi prácou a životom vďaka šikovnému sledovaniu času
        introduction: |
            Tú bolesť poznáme až príliš dobre — nekonečné nadčasy, stresujúce termíny, časovo náročné bugy a neustály boj o to, aby projektoví manažéri a klienti ocenili skutočné úsilie za vaším kódom. Je to začarovaný kruh, ktorý môže rýchlo viesť k vyhoreniu a narušiť vašu rovnováhu medzi prácou a životom. Tejto výzve čelia vývojári softvéru, programátori, inžinieri a ďalší profesionáli z technologického sektora.

            Ale existuje spôsob, ako sa z tohto kruhu vymaniť a získať späť kontrolu nad svojím časom a úlohami. So správnymi nástrojmi môžete maximalizovať svoju produktivitu a získať cenné informácie o svojich projektoch. Či ste freelance programátor, súčasť startupového tímu, alebo riadite celé IT oddelenie — nájsť škálovateľné riešenie so správnymi funkciami je kľúčové. Pozrime sa na Kimai — používateľsky prívetivý a výkonný softvér na sledovanie času — ako na príklad.
    consultants:
        features:
            title: Funkcie Kimai najčastejšie používané konzultantmi
            introduction: Či už ste freelancer, alebo súčasťou veľkého poradenského oddelenia, Kimai ponúka nástroje, ktoré rastú spolu s vaším biznisom.
        about:
            title: Prvé kroky k lepšiemu sledovaniu času v poradenstve
            introduction: |
                Aby ste zo softvéru na sledovanie času vyťažili maximum, začnite tým, že si všetky funkcie prejdete v deme alebo bezplatnom skúšobnom období. Ako konzultant si pravdepodobne dôkladne zvážite cenové možnosti a vopred premyslíte, aké funkcie môžete potrebovať, ako sa vaše podnikanie rozrastie.

                V Kimai tejto ceste rozumieme. Preto ponúkame bezplatné skúšobné obdobie, v ktorom si naše riešenie môžete vyskúšať, kým sa rozhodnete, ktoré ďalšie funkcie alebo pluginy vám vyhovujú najlepšie. Naša all-in-one aplikácia rastie spolu s vaším biznisom — kedykoľvek môžete jednoducho pridať rozšírenia. Vyskúšajte ju dnes zadarmo a majte pekne organizovaný deň!
        subtitle: Maximalizujte fakturovateľné hodiny a efektivitu
        name: Konzultanti
        title: Sledovanie času pre konzultantov
        testimonials:
            introduction: V Kimai sme našu platformu vybudovali tak, aby vyhovovala tak jednotlivým konzultantom, ako aj veľkým tímom. Ako all-in-one riešenie Kimai využívajú firmy všetkých veľkostí v rôznych sektoroch. Tu je, čo o tom hovoria naši používatelia z poradenstva.
            title: Pohľad na sledovanie času od profesionálov z poradenstva
        intro: Zvýšte ziskovosť a dodávajte klientom väčšiu hodnotu vďaka strategickému sledovaniu času pre špičkové poradenstvo
        introduction: |
            V dynamickom svete dnešného poradenstva — či už ide o strategické poradenstvo, finančné poradenstvo, IT služby, data science, právne poradenstvo, psychologické služby alebo HR poradenstvo — ostáva jedna pravda nemenná: čas je vaším najcennejším aktívom. Presné sledovanie času nie je len o zaznamenávaní hodín. Ide o maximalizáciu ziskovosti a dodávanie hodnoty klientom.

            Buďme úprimní — riadenie poradenských projektov nie je jednoduché. Členovia vášho tímu môžu pracovať z New Yorku, Londýna a Singapuru naraz. To je veľa na sledovanie! Navyše musíte presne vedieť, kto na čom pracoval, aby ste mohli klientom správne fakturovať. Bez kvalitného sledovania času sa veci môžu rýchlo zamotať. Musíte mať pod kontrolou náklady projektov, dodržiavať predpisy a zabezpečiť, aby bol čas vášho tímu využívaný zmysluplne.

            Práve preto sa all-in-one nástroje na sledovanie času stali pre konzultantov nevyhnutnosťou. Menia potenciálny chaos na prehľadné, usporiadané údaje, ktoré pomáhajú vášmu podnikaniu prosperovať. Pozrime sa, ako môže komplexné riešenie ako Kimai zmeniť vaše poradenské podnikanie.
        cta:
            title: |
                Pripravení vyskúšať nový spôsob
                sledovania času vo vašej praxi?
    freelancers:
        name: Freelancer
        testimonials:
            introduction: "Neverte len nám. Tu je, čo hovoria ostatní freelanceri:"
            title: Čo o sledovaní času s Kimai zdieľajú ostatní profesionáli
        features:
            title: 'Features loved by freelancers '
            introduction: Kimai je navrhnuté tak, aby solopreneurom pomohlo zefektívniť ich workflow. Či už žonglujete s viacerými klientmi, alebo spravujete rôzne projekty, Kimai vám poskytuje nástroje, ktoré potrebujete, aby ste zostali organizovaní a ziskoví.
        introduction: |
            Keď je freelancing novou kapitolou vo vašom živote, musíte na seba zobrať nové úlohy a čeliť novým výzvam. Jednou z nich je správa času a rovnováha medzi odpracovanými hodinami a ziskovosťou projektov. Žonglovanie s viacerými projektmi vyžaduje analýzu — pre vás aj pre vašich klientov.

            Našťastie existujú nástroje, ktoré pomáhajú freelancerom, dodávateľom, digitálnym nomádom a solopreneurom evidovať fakturovateľné hodiny, fakturovať klientom bez stresu, spravovať hodinové sadzby a výdavky a podobne.

            Vďaka tomu sa môžete sústrediť na to, čo milujete — a dostať zaplatené toľko, koľko si naozaj zaslúžite. Pozrime sa, ako na to s Kimai ako nástrojom na sledovanie času pre freelancerov.
        cta:
            title: Ready to get the most of your time as a freelancer?
        title: Sledovanie času pre úspešných freelancerov
        about:
            title: Prvé kroky k lepšej správe času
            introduction: |
                Ste pripravení vyskúšať výhody Kimai? Ponúkame bezplatné skúšobné obdobie, aby ste si mohli preskúmať všetky funkcie, kým sa rozhodnete, ktorý softvér na sledovanie času je pre vás ako nezávislého profesionála najlepší.

                Zaregistrujte sa ešte dnes, začnite svoj čas sledovať doslova jedným kliknutím a majte organizovanejší deň!
        intro: Maximalizujte svoje príjmy ako solopreneur
    universities:
        cta:
            title: Ready to transform time management at your institution?
        subtitle: ' '
        testimonials:
            introduction: |
                V Kimai sme našu platformu na sledovanie času navrhli tak, aby spĺňala potreby agentúr, tímov a freelancerov.
                Naše intuitívne rozhranie a výkonné funkcie pomáhajú agentúram, ako je tá vaša, pracovať šikovnejšie a so ziskom.
                Teraz si môžete „vypočuť" recenzie skutočných používateľov.
            title: Čo hovoria naši zákazníci
        name: Univerzity
        introduction: |
            Správa času vo vysokoškolskom vzdelávaní prináša jedinečné výzvy vrátane plánovania prednášok a hodín, sledovania výskumných projektov, alokácie času študentov a akademických pracovníkov a časovo náročných administratívnych úloh.

            Efektívne riešenia na sledovanie času pomáhajú tieto procesy zefektívniť a umožňujú pedagógom a výskumníkom sústrediť sa na ich hlavné povinnosti.
        features:
            title: Funkcie pre správu času v celej inštitúcii
            introduction: |
                Naše riešenie na sledovanie času bolo dopracované v spolupráci s viacerými univerzitami. Skutočná spätná väzba používateľov riadi náš vývoj a zabezpečuje funkcie, ktoré skutočne zodpovedajú akademickým potrebám.

                Aby sme uviedli aspoň niektoré akademické inštitúcie využívajúce Kimai: `Universität Hamburg`, `Universität Bonn`, `Universität Wien`, `Universität Stuttgart`, `Universität Frankfurt`, `University of Fribourg`, `TU Dresden` a `University of Moscow`.
        about:
            title: Začnite svoju cestu k lepšej správe času
            introduction: |
                Chápeme, že zavedenie nového systému sledovania času v akademickom prostredí vyžaduje dôkladné zváženie.
                Preto ponúkame bezplatné skúšobné obdobie a demo sedenia.
                Vyskúšajte Kimai teraz zadarmo a majte organizovanejší deň!
        intro: Zvýšte efektivitu svojej inštitúcie vďaka výkonnému sledovaniu času
        title: Sledovanie času pre akademický sektor
    non-profit:
        about:
            introduction: |
                If you represent a non-profit organization, please register with an official
                email address of your organization and send us a brief support message. The plan will be activated after manual review.

                In return, we ask for a testimonial with your logo and name, or an interview so we can feature you as a user.
            title: Our affordable non-profit plan for you
        introduction: |
            Today we say thank you to the many NGOs and NPOs:

            - Charitable and philanthropic organizations
            - Public and independent schools, universities, community colleges
            - Public safety agencies, emergency services, disaster relief, fire departments, civil protection
            - Conservation, sports, and all other clubs that foster community and teach skills
            - Social services, elderly care, and youth facilities
            - … and the many, many others we forgot to mention

            You give your time, create small and great wonders, and enrich the lives of so many: **Thank you for being there ❤️**

            As an organization grows, donations increase, and the first employees come on board, the need for structured time tracking becomes clear. Documenting workflows transparently helps identify opportunities for improvement early on – freeing up resources for your actual mission while laying the groundwork for transparent accountability reports.
        subtitle: Less administrative burden, so your mission stays in focus
        cta:
            title: |
                We want to help you
                simplify your time tracking
        title: Time Tracking for Non-Profit Organizations ✨
        features:
            title: Features that NPOs appreciate
            introduction: Kimai helps many non-profits gain insight into their projects while simplifying working time management. We have built a time tracking tool that speaks your language – simple, reliable, GDPR-compliant, and designed to make your daily work run more smoothly.
        testimonials:
            title: What other NPOs say about Kimai
            introduction: |
                Thanks to Kimai's open-source roots, we see ourselves as part of the broader non-profit movement that spans so many fields and sectors.
                We are happy to support you!
        intro: We put your work and vision center stage while simplifying administration and billing
        name: Non-Profits
