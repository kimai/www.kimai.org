feature:
    auth:
        name: "Autenticació i seguretat"
        description: "Kimai admet proveïdors d'identitat externs i inici de sessió mitjançant LDAP i SAML a través de múltiples proveïdors (com Google Workspace, Azure AD o Authentik). L'autenticació de dos factors mitjançant tokens TOTP és opcionalment possible."
    reporting:
        name: "Informes i anàlisis"
        description: "Anàlisi dels temps registrats per usuaris, clients, projectes, activitats, etiquetes, períodes de temps i més."
    mobile-ready:
        name: "Preparat per a mòbils"
        description: "El disseny és totalment responsiu, fet per a ús d'escriptori i mòbil. Cada usuari pot configurar les columnes de dades que s'han de mostrar, p. ex., per evitar el desplaçament horitzontal en dispositius petits."
    plugins:
        name: "Complements"
        description: "Kimai es va construir per ser extensible, i les característiques es poden afegir amb connectors. Els desenvolupadors que vulguin crear-los poden utilitzar molts punts d'extensió."
    multi-user:
        name: "Multiusuari"
        description: "Kimai pot ser utilitzat per tants usuaris com vulgueu: cada instal·lació admet usuaris il·limitats amb diferents rols (vegeu permisos)."
    multi-language:
        name: "Multiidioma"
        description: "Kimai es pot localitzar a qualsevol idioma i ja està traduït a més de 30 idiomes."
    teams:
        name: "Microsoft Teams"
        description: "Els equips connecten usuaris en grups lògics, com departaments. Limiteu l'accés a les dades assignant clients i projectes als vostres equips."
    customers:
        name: "Clients"
        description: "Gestioneu els vostres clients i establieu adreça, contactes, país, moneda, visibilitat (per a arxivament) i molts més camps."
    projects:
        name: "Projectes"
        description: "Gestioneu projectes per a cada client amb número de comanda, pressupost i visibilitat (per a arxivament)."
    activities:
        name: "Activitats"
        description: "Les activitats s'utilitzen per assignar la unitat de treball a les entrades del full de temps. Gestioneu activitats per a cada projecte amb número de comanda, pressupost i visibilitat (per a arxivament) o creeu-ne de globals per evitar duplicats."
    invoices:
        name: "Facturació"
        description: "Plantilles de factura configurables, opcions d'agrupació d'entrades, números de factura configurables i múltiples formats com PDF i DOCX."
    export:
        name: "Exportar dades"
        description: "Les dades del full de temps es poden exportar i compartir en format XLSX, PDF, CSV i HTML. Els registres exportats es poden bloquejar i protegir contra canvis posteriors."
    expenses:
        name: "Despeses"
        description: "Compreu el connector i feu el seguiment de les despeses basades en client, projecte i activitat — per a la categorització i inclusió a les vostres factures."
    2fa:
        name: "Autenticació de dos factors (2FA)"
        description: "Kimai admet l'autenticació de dos factors amb tokens TOTP: assegureu els vostres comptes d'usuari avui!"
    saml:
        name: "SAML"
        description: "Inicieu sessió i registreu usuaris amb SAML mitjançant el vostre proveïdor d'identitat SSO existent, com Google Workspace, Authentik o Azure Active Directory."
    api:
        name: "JSON API"
        description: "Amb una extensa API JSON per llegir i escriure dades, de manera que les aplicacions externes i les eines personalitzades poden comunicar-se amb Kimai."
    ldap:
        name: "LDAP"
        description: "Connecteu Kimai amb el vostre servidor de directori d'empresa (LDAP o Active Directory) i utilitzeu la vostra infraestructura d'autenticació existent."
    statistics:
        name: "Estadístiques"
        description: "El vostre tauler de control us mostrarà diverses estadístiques sobre els temps registrats i la quantitat de dades recollides. I sempre podem afegir més gràfics!"
    docker:
        name: "Docker"
        description: "Tenim imatges Docker per al desenvolupament i hi ha múltiples variacions de configuracions de Docker-Compose per a l'ús en producció."
    migrate-v1:
        name: "Migració"
        description: "Les dades de Kimai v1 es poden importar, per a una migració sense interrupcions del vostre seguidor de temps."
    active-entries:
        name: "Quantitat de registres actius"
        description: "Registreu tants temps com vulgueu en paral·lel, o limiteu-lo a un."
    am-pm-format:
        name: "format AM/PM"
        description: "Kimai utilitza una versió localitzada del format de 24 hores. Però si esteu acostumat al format AM/PM, podeu configurar-ho."
    time-clock:
        name: "Rellotge de temps"
        description: "No voleu que els vostres usuaris registrin registres de full de temps arbitraris? Canvieu al mode rellotge de temps, que només permet registrar \"entrada\" i \"sortida\"."
    duration-only:
        name: "Només durada"
        description: "Si les vostres lleis locals us requereixen mostrar només durades en lloc de data i hora d'inici i final, podeu activar aquest mode globalment."
    rates:
        name: "Càlcul de tarifa"
        description: "Les tarifes es poden calcular en funció d'importos horaris i fixos, configurables per a clients, projectes, activitats i cada registre de full de temps individualment."
    timesheet-filter:
        name: "Filtre de registre d'hores"
        description: "Podeu filtrar tots els registres de temps per usuari, client, projecte, activitat i data."
    permissions:
        name: "Permisos"
        description: "Estructura de permisos personalitzable. Assigna diferents rols als teus usuaris, p. ex., els usuaris poden registrar temps, els caps d'equip poden imprimir factures i configurar projectes/activitats, els administradors poden configurar usuaris i clients."
    user-profile:
        name: "Perfil d'usuari"
        description: "Estadístiques personals i configuració per usuari per a tarifa horària, tema de Kimai, contrasenya i avatar."
    user-registration:
        name: "Registre d'usuari"
        description: "Kimai admet l'autoregistre d'usuaris amb activació per correu electrònic."
    password-reset:
        name: "Restabliment de contrasenya"
        description: "Heu oblidat la vostra contrasenya? Kimai us ajuda a restablir-la per correu electrònic."
    customer-portal:
        name: Portal de clients
        description: Compartiu estadístiques de clients i projectes i registres d'hores amb qualsevol mitjançant una URL secreta, opcionalment protegida amb contrasenya.
    dark-mode:
        name: Mode fosc
        description: Perquè cada aplicació necessita un mode fosc, que ajuda a reduir la fatiga visual a la nit o en entorns foscos.
    security:
        points:
            security_4: Integració contínua amb milers de comprovacions
            security_1: '"Hashing" segur de contrasenyes amb Argon2 o Sodium'
            security_2: Rols d'usuari detallats que restringeixen l'accés
            security_3: Protecció CSRF i XSS
            security_6: Prova de codi automatitzada amb una cobertura de codi superior al 90%
            security_5: Revisions de codi en profunditat
        description: Kimai implementa les millors pràctiques en el disseny d'aplicacions per prevenir atacs comuns. Els controls de seguretat automatitzats són fonamentals per a qualsevol flux de treball de desenvolupament de programari per reduir el temps des de la creació d'un defecte fins a la seva detecció. Aquests escanejos s'executen amb cada canvi de codi, sempre.
        name: Seguretat a Kimai
    security-cloud:
        points:
            security_1: Totes les connexions protegides mitjançant TLS (SSL)
            security_2: Millors pràctiques de seguretat, tallafocs i prevenció de força bruta
            security_3: Sense multi-locació, cada client té la seva pròpia base de dades
            security_6: El codi s'executa en entorns de domini estrictament restringits
            security_5: Els serveis crítics no són accessibles des del món exterior
            security_4: Els servidors estan allotjats en un centre de dades de la UE
        name: Seguretat a la plataforma
        description: El programari només és tan segur com el sistema en què s'executa. Adopto un enfocament de defensa en profunditat amb la infraestructura de servidor i xarxa. Els clients de la plataforma allotjada estan protegits a través de múltiples capes de protecció.
    no-limits:
        name: Sense límits
        description: "El vostre programari SaaS sempre inclou límits? No Kimai: no hi ha límits. Només pagueu per la quantitat d'usuaris actius. No us limito, i no cobro pels usuaris inactius. Podeu crear una quantitat il·limitada d'usuaris, clients, projectes, activitats, registres d'hores i més."
    privacy:
        description: 'Respecto la vostra privacitat i les vostres dades, així com les dels vostres usuaris. No, aquesta no és una altra introducció avorrida a una política de privacitat: així és com gestiono aquest negoci. No venc dades. Segueixo el RGPD i respondré a qualsevol pregunta sobre els subprocessadors implicats.'
        name: El primer és la privacitat
install:
    ssh: 'Aquest mètode instal·la Kimai directament al vostre servidor.'
    docker: 'Utilitzeu la nostra imatge Docker per instal·lar i actualitzar fàcilment el contenidor Kimai.'
    kubernetes: 'Podeu desplegar Kimai a Kubernetes utilitzant els nostres "Helm-Charts".'
    cloud: 'No cal instal·lar Kimai, podeu començar a utilitzar-lo ara mateix.'
    caddy-docker: 'Utilitzant Docker-Compose i Caddy com a proxy invers amb suport SSL.'
    alert-vps: 'En aquesta fase, no és possible instal·lar Kimai descarregant un fitxer ZIP i penjant els fitxers al vostre servidor web. Necessiteu tenir accés SSH al vostre servidor. Això no significa necessàriament que necessiteu un VPS. Alguns hostings compartits us donen accés SSH, a través del qual hauríeu de poder instal·lar Composer i Kimai sense problemes.'
developer:
    kevinpapst:
        intro: |-
            Sempre ha estat el meu somni guanyar-me la vida amb un producte de codi obert. Amb Kimai, he pogut desenvolupar un programari que proporciona un gran valor als meus clients i el desenvolupament del qual em motiva cada dia.

            Els meus agraïments especials a la gran comunitat per la seva lleialtat al llarg dels anys, m'alegre pensar en els propers 10 anys de Kimai 🚀
history:
    intro: "El que va començar com a projecte de hobby és ara l'aplicació de seguiment de temps de codi obert líder al món. Fem una ullada a la seva història."
    early-days-subtitle: "Kimai té una llarga història i existeix des del 2006, aquí teniu una breu visió general de com va començar tot."
    early-days-title: "Com va començar"
    year-2006: "Es llança la primera versió de Kimai i guanya lentament una creixent base d'usuaris i desenvolupadors."
    year-2009: "Torsten, el desenvolupador original, vol tancar Kimai. Kevin intervé i es converteix en el mantenidor."
    year-2014: "Es crea l'última versió de Kimai 1, el desenvolupament s'estanca i no hi ha gairebé més activitat."
    year-2018: "La reescriptura de Kimai troba el seu camí cap a la comunitat, la migració de dades funciona, l'adopció està en augment."
    year-2019: "Es creen els primers connectors per sondejar l'interès pel programari de codi obert de pagament."
    year-2020: "Kimai s'ofereix com a SaaS basat en subscripció, amb un pla gratuït i dos de pagament."
    year-2023: "Tot el treball dur finalment s'ha recompensat i Kimai és ara la meva feina a temps complet al 100%. Moltes gràcies!"
    current: |
        Kimai és un programari de seguiment de temps amb una llarga història, la primera versió es va llançar el 2006. Per què ho mencioneu? Perquè he vist molts programes arribar i marxar des d'aleshores - creieu-me quan dic: Kimai és aquí per quedar-se. Vaig passar molts anys desenvolupant Kimai per diversió, avui Kimai és el meu negoci i mai he estat més motivat per continuar millorant-lo.

        Construeixo Kimai amb un propòsit: registrar, gestionar, avaluar i facturar hores de treball. Kimai admet un nombre il·limitat d'usuaris, clients, projectes i entrades de temps, de manera que podeu gestionar tots els vostres equips en una sola instal·lació fàcil d'utilitzar. Kimai està traduït a desenes d'idiomes i s'executa en qualsevol dispositiu amb accés a internet i un navegador, fins i tot al vostre dispositiu mòbil quan esteu de gràcies al disseny responsiu.

        Podeu crear factures a partir dels vostres registres de temps directament al vostre navegador, amb plantilles de factura personalitzables. Kimai també es pot ampliar de moltes maneres, especialment a través dels molts connectors creats per una comunitat activa.

        Sigueu un treballador autònom, una petita organització o una empresa amb centenars d'empleats, Kimai us pot ajudar a gestionar el vostre negoci. Si us plau, feu-vos la vostra pròpia opinió i proveu Kimai amb l'ajuda de les instal·lacions de demostració.
    past: |
        Kimai té una llarga història i estava molt avançat al seu temps quan l'equip de Torsten Höltge va començar a desenvolupar-lo el 2006. Tenia un disseny responsiu (gràcies a molta màgia de Javascript) en una època en què la paraula encara no s'havia inventat oficialment.
        Vaig fer-me càrrec del desenvolupament de Kimai el 2009 quan Torsten volia aturar-lo per falta de temps, i he mantingut i ampliat Kimai durant diversos anys amb l'ajuda d'altres entusiastes del codi obert.

        Mentrestant, la comunitat PHP estava fent grans avenços, mentre que Kimai anava quedant cada cop més endarrerit a causa de la seva història. La base tenia moltes debilitats tècniques, i després de molts anys de desenvolupament, la base de codi es tornava cada cop més difícil de mantenir.
        La idea de reescriure Kimai amb marcs moderns portava temps donant voltes, també impulsada per les peticions de la comunitat, però ningú tenia els recursos per portar aquesta idea endavant. A finals del 2017, diversos factors es van conjugar i vaig aprofitar el moment per començar a desenvolupar el següent pas evolutiu, "Kimai 2".

        El Kimai original es va llançar per primera vegada el 2006 i ha estat utilitzat per moltes persones de tot el món, n'estic orgullós i també de la seva gran comunitat. Voldria agrair a tothom qui ha contribuït a Kimai.
