landing_oss:
    subtitle: "Kimai és el programari de codi obert %title% que estaves buscant"
    vendor_title: "Sense bloqueig de proveïdor"
    vendor_intro: "El bloqueig de proveïdor pot costar molt, no només en diners sinó també en hores. Amb Kimai, pots allotjar-ho tu mateix, deixar que jo t'ho allotgi, o fer un fork i canviar-lo. Mai estaràs bloquejat a un producte allotjat, i totes les teves dades són fàcils d'exportar de manera que si algun dia decides que Kimai no és per a tu, les teves dades segueixen sent teves (el mateix s'aplica als plans de pagament, ofereixo l'exportació de dades en cancel·lar)."
    transparency_title: "Sempre transparent"
    transparency_intro: "Amb el programari de codi tancat, només tens les afirmacions del proveïdor que mantenen el programari segur i compleixen els estàndards. La visibilitat del codi darrere del programari de codi obert significa que pots veure-ho per tu mateix. Sempre pots veure les meves respostes a la comunitat, el calendari de llançaments i fites, i cada revisió de commit i pull request."
    discover: 'Descobreix Kimai'
    version_choose: 'Quin Kimai és adequat per a tu?'
    version_onpremise: 'Emocarrec del programari, t''ocupes tu de l''allotjament, les actualitzacions i la seguretat. I si no vols fer-ho tu mateix, sempre hi ha suport disponible a l''abast de la teva mà. Compres els connectors rellevants per a tu en una subscripció d''actualització anual.'
    version_cloud: 'Posa''t en marxa en segons, deixa''m a mi l''allotjament i les actualitzacions, t''ocupes del teu negoci principal. Assegura''t que el teu equip estigui preparat per al futur, amb una solució moderna de seguiment del temps. Tots els connectors estan disponibles al núvol sense cost addicional.'
