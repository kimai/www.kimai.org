about:
    name: 'Sobre Kimai'
    description: 'Descobreix la història del seguidor de temps Kimai i el seu desenvolupador.'
    kevin: 'Kimai i el Núvol són desenvolupats i operats per Kevin, un desenvolupador de programari independent de Viena (Àustria).'
    collaboration:
        title: 'Col·laboració'
        content: 'Els clients aprecien la comoditat que ve amb el suport gratuït i l''intercanvi és una part essencial del meu treball. M''encanta la participació de la comunitat a GitHub, la col·laboració i el treball àgil. La millora constant basada en els teus comentaris fa d''aquest viatge una experiència extraordinària.'
    technology:
        title: 'Tecnologia'
        content: 'Com a desenvolupador, m''encanta provar noves tecnologies. I si això millora la manera en què interactues amb Kimai, ho anomenaria una situació guanyar-guanyar. La UI i la UX són crucials per a mi perquè el programari ha de ser fàcil d''usar. La seguretat és un requisit per defecte i el programari de codi obert és un factor d''èxit important per a moltes empreses.'
    joy:
        title: 'Benestar laboral'
        content: 'El desenvolupament de Kimai és la combinació ideal de la professió que estimo, amb les seves infinites possibilitats d''educació, i la necessitat de guanyar diners per mantenir la meva família. Gràcies a Kimai, puc passar més temps amb la meva dona i el meu fill, que probablement és la millor motivació que et pots imaginar.'
