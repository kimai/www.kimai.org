industries:
    name: Sectors
    agency:
        features:
            introduction: No totes les eines de registre de temps són iguals. Les millors solucions per a agències ofereixen un conjunt de funcions especialitzades per optimitzar els teus fluxos de treball.
            title: Funcions de Kimai més utilitzades per les agències
        testimonials:
            tag: Agència
            introduction: A Kimai, hem dissenyat la nostra plataforma de registre de temps per satisfer les necessitats d'agències, equips i autònoms. La nostra interfície intuïtiva i les nostres potents funcions ajuden les agències com la teva a treballar de manera més intel·ligent i rendible. Ara pots "escoltar" les opinions d'usuaris reals.
            title: Què diuen les agències sobre el registre de temps
        about:
            title: Primers passos per a un millor registre de temps
            introduction: |
                Ja has fet els teus primers passos i estem segurs que pots prendre una decisió informada. Què més hauries de tenir en compte per triar el millor programari de registre de temps? Alguns proveïdors de solucions ofereixen versions gratuïtes, que poden tenir limitacions, mentre que d'altres ofereixen demos gratuïtes, proves o opcions de preus basades en la mida de l'empresa o el nombre d'usuaris.

                A Kimai, oferim una prova gratuïta perquè puguis explorar la nostra solució abans de decidir si necessites més usuaris, funcions o connectors. Prova-ho gratis avui mateix i gaudeix d'una jornada laboral més organitzada!
        title: Registre de temps per a agències
        cta:
            title: |
                A punt per començar
                a comptar el temps a la teva agència?
        name: Agències
        introduction: |
            Gestiones una agència, ja sigui de màrqueting, relacions públiques, disseny, consultoria, RRHH o arquitectura? Aleshores ja saps com n'és de crític el registre de temps per al teu negoci. Controlar les hores dels empleats i el temps dels projectes dels clients és essencial per facturar amb precisió, entendre la rendibilitat i gestionar un equip en creixement.

            Però gestionar el registre de temps mitjançant fulls de càlcul i eines desconnectades pot convertir-se ràpidament en un caos, especialment a mesura que l'agència creix. Aquí és on una solució de registre de temps dedicada pot marcar la diferència.

            Explorem per què les agències d'èxit confien en el programari de registre de temps i quines característiques essencials cal buscar. Utilitzarem Kimai com a exemple de solució intuïtiva dissenyada pensant en les agències.
        intro: Desbloqueja el potencial de rendibilitat en agències de creixement ràpid amb un sistema de registre de temps escalable
        subtitle: La clau de la rendibilitat
    lawyer:
        about:
            title: Primers passos per a un millor registre de temps al teu bufet
            introduction: |
                Sabem que provar un nou programari en el sector jurídic pot imposar. Per això, oferim una prova gratuïta i sense compromís, una posada en marxa senzilla, funcions flexibles que creixen amb el teu despatx o equip i un suport dedicat.

                Creiem que, fins i tot durant la prova gratuïta, podràs deixar de lluitar amb els fulls de temps. Prova Kimai avui mateix i gaudeix d'una jornada ben organitzada!
        features:
            title: Funcions de Kimai que encanten als bufets d'advocats
            introduction: 'Kimai està dissenyat pensant en els professionals del dret. Hem creat una eina que parla el teu idioma: senzilla, fiable, compatible amb el RGPD i enfocada a facilitar el teu dia a dia.'
        testimonials:
            introduction: A Kimai, els professionals del dret i la consultoria sempre han estat la nostra prioritat. Ara pots llegir l'experiència real dels nostres usuaris.
            title: Opinions dels nostres clients sobre el registre de temps
        title: Registre de temps per a advocats
        intro: Oblida els fulls de temps complexos i centra't a oferir serveis jurídics excepcionals amb solucions modernes de registre de temps
        subtitle: Centra't en les hores facturables, no en fulls de temps complicats
        name: Advocats
        introduction: |
            En el trepidant món de l'advocacia, el temps és el teu actiu més valuós. Bufets, advocats independents i equips jurídics necessiten una solució de registre de temps a mida. A Kimai, entenem que el teu focus ha de ser oferir un servei jurídic excepcional, no lluitar contra fulls de temps complexos.

            El registre manual, els fulls de càlcul infinits i les exportacions complicades et roben temps per assessorar els teus clients. Descobreix com un registre eficient t'ajuda a centrar-te en el que realment importa.
        cta:
            title: |
                A punt per revolucionar
                el control del temps al teu despatx?
    software-developers:
        features:
            title: Funcions de Kimai utilitzades per enginyers de programari
            introduction: Descobreix el conjunt de funcions perfecte, adaptat a les teves tasques i objectius. I si el teu equip d'IT no només necessita un simple registre de temps, sinó una solució robusta amb diferents opcions d'integració i funcions avançades de facturació i anàlisi?
        title: Registre de temps per a desenvolupadors de programari
        about:
            introduction: |
                Triar el gestor de temps adequat sol començar per decidir entre una versió gratuïta o una demostració. El preu també és un factor clau, així que busca opcions que s'ajustin al creixement del teu equip.

                A Kimai, oferim una prova gratuïta perquè puguis explorar la nostra solució abans de decidir si necessites funcions o connectors addicionals. Amb preus a partir de només 0,99 € per usuari en alguns sectors, és una opció molt assequible. Prova'l gratis avui mateix i aporta més organització a la teva jornada laboral!
            title: Primers passos per a un millor registre de temps
        subtitle: Maximitza la teva productivitat
        cta:
            title: |
                Estàs a punt per provar una nova manera
                de registrar el temps al teu equip d'IT?
        testimonials:
            title: Professionals IT opinen sobre el registre de temps
            introduction: A Kimai, hem dissenyat la nostra plataforma de registre de temps pensant en les necessitats dels desenvolupadors individuals, els equips de desenvolupament i els departaments d'IT. El nostre enfocament es basa a crear solucions de codi obert per a equips tècnics de totes les mides i de diversos sectors. Aquí pots veure quin tipus de valoracions rebem dels nostres usuaris del sector tecnològic.
        name: Desenvolupadors de programari
        intro: Maximitza la productivitat de l'equip i aconsegueix l'equilibri entre la vida laboral i la personal amb un registre de temps intel·ligent
        introduction: |
            Coneixem massa bé aquesta situació: hores extres interminables, terminis estressants, errors que consumeixen massa temps i la lluita constant perquè els caps de projecte i els clients valorin l'esforç real que hi ha darrere del teu codi. És un cercle viciós que pot portar ràpidament a l'esgotament i trencar el teu equilibri entre la vida laboral i la personal. Aquest és un repte comú al qual s'enfronten desenvolupadors de programari, programadors, enginyers i altres professionals de la tecnologia.

            Però hi ha una manera d'escapar d'aquest cicle i recuperar el control sobre el teu temps i les teves tasques. Mitjançant l'ús de les eines adequades, pots maximitzar la teva productivitat i obtenir informació valuosa sobre els teus projectes. Tant si ets un programador autònom, com si formes part d'una startup o gestiones tot un departament d'IT, és essencial trobar una solució escalable amb les funcions correctes. Explorem plegats Kimai, un programari de registre de temps potent i fàcil d'utilitzar.
    consultants:
        features:
            title: Funcions de Kimai més utilitzades pels consultors
            introduction: Tant si ets autònom com si formes part d'un gran departament de consultoria, Kimai ofereix eines per ajudar-te a escalar a mesura que el teu negoci creix.
        about:
            title: Primers passos per a un millor registre de temps en consultoria
            introduction: |
                Per treure el màxim profit del teu programari de registre de temps, comença explorant totes les funcions mitjançant una demo o una prova gratuïta. Com a consultor, és probable que vulguis considerar acuradament les opcions de preus i preveure quines funcions podries necessitar a mesura que el teu negoci s'expandeixi.

                A Kimai, entenem aquest procés. Per això oferim una prova gratuïta que et permet provar la nostra solució abans de decidir quines funcions o connectors addicionals et funcionarien millor. La nostra aplicació tot en un creix amb el teu negoci: pots afegir extensions fàcilment sempre que sigui necessari. Prova-ho de forma gratuïta avui mateix i gaudeix d'una jornada ben organitzada!
        subtitle: Maximitza les hores facturables i l'eficiència
        name: Consultors
        title: Registre de temps per a consultors
        testimonials:
            introduction: A Kimai, hem creat la nostra plataforma per satisfer les necessitats tant de consultors individuals com de grans equips. Com a solució tot en un, empreses de totes les mides de diversos sectors confien en Kimai. Això és el que diuen els nostres usuaris del sector de la consultoria.
            title: Perspectives de professionals de la consultoria sobre el registre de temps
        intro: Potencia la rendibilitat i el lliurament de valor al client mitjançant un registre de temps estratègic per a l'excel·lència en la consultoria
        introduction: |
            En l'entorn dinàmic de la consultoria actual, ja sigui en consultoria de gestió, assessorament financer, serveis informàtics, ciència de dades, assessoria jurídica, serveis psicològics o consultoria de RRHH, una veritat es manté constant: el temps és el teu actiu més valuós. El registre precís del temps no consisteix només a anotar hores. Es tracta de maximitzar la rendibilitat i dliurar valor als teus clients.

            Siguem sincers: gestionar projectes de consultoria no és fàcil. Els membres del teu equip poden estar treballant des de Nova York, Londres i Singapur alhora. Això és molt a controlar! A més, has de saber exactament qui ha treballat en què per facturar correctament als teus clients. Sense un registre de temps adequat, les coses poden descontrolar-se ràpidament. Necessites controlar els costos del projecte, complir amb les normatives i assegurar-te que el temps del teu equip s'utilitza amb seny.

            És per això que les eines de registre de temps "tot en un" s'han convertit en un element imprescindible per als consultors. Transformen tot aquest caos potencial en dades clares i organitzades que ajuden el teu negoci a prosperar. Explorem com una solució integral com Kimai pot transformar el teu negoci de consultoria.
        cta:
            title: |
                Estàs a punt per provar una nova manera
                de registrar el temps al teu despatx?
    freelancers:
        name: Autònom
        testimonials:
            introduction: "No només ho diem nosaltres. Això és el que diuen altres autònoms:"
            title: Què diuen altres professionals sobre el registre de temps amb Kimai
        features:
            title: 'Funcions preferides pels autònoms'
            introduction: Kimai està dissenyat per simplificar el flux de treball de l'emprenedor autònom. Tant si mous diversos clients com una varietat de projectes, Kimai t'aporta l'organització i rendibilitat que necessites.
        introduction: |
            Quan el treball autònom és un nou capítol a la teva vida, has d'assumir nous rols i enfrontar-te a nous reptes. Un d'aquests reptes és la gestió del temps i l'equilibri entre les hores que treballes i la rendibilitat dels teus projectes. Gestionar diversos projectes alhora requereix anàlisi, tant per a tu com per als teus clients.

            Però existeixen eines per ajudar els autònoms, contractistes, nòmades digitals i emprenedors a fer el seguiment de les hores facturables, facturar als clients sense estirar-se els cabells, gestionar les tarifes horàries i les despeses, etc.

            Això et permet centrar-te en el que t'agrada i cobrar el que realment et mereixes. Vegem com aconseguir-ho amb Kimai com a eina de registre de temps per a autònoms.
        cta:
            title: |
                A punt per treure
                el màxim partit al teu temps com a autònom?
        title: Registre de temps per a autònoms d'èxit
        about:
            title: Primers passos cap a una millor gestió del temps
            introduction: |
                Estàs a punt per experimentar els avantatges de Kimai? Oferim una prova gratuïta perquè exploris totes les funcions abans de decidir quin programari de registre de temps s'adapta millor a tu com a professional independent.

                Registra't avui mateix, comença a comptar les hores amb un sol clic i gaudeix d'una jornada més organitzada!
        intro: Maximitza els teus ingressos com a "solopreneur"
    universities:
        cta:
            title: |
                A punt per transformar
                la gestió del temps a la teva institució?
        subtitle: 'Centra''t en els informes, no en fluxos de treball administratius complicats'
        testimonials:
            introduction: |
                A Kimai, hem dissenyat la nostra plataforma de registre de temps per satisfer les necessitats d'agències, equips i autònoms.
                La nostra interfície intuïtiva i les funcions potents ajuden les agències com la teva a treballar de manera més intel·ligent i rendible.
                Ara pots "escoltar" les ressenyes d'usuaris reals.
            title: Què diuen els nostres clients
        name: Universitats
        introduction: |
            La gestió del temps en l'educació superior comporta reptes únics, com ara la programació de lliçons i classes, el seguiment de projectes de recerca, l'assignació de temps per a estudiants i professors, i tasques administratives que consumeixen molt de temps.

            Les solucions eficaces de registre de temps poden ajudar a agilitzar aquests processos, permetent que els educadors i els investigadors es concentrin en les seves responsabilitats principals.
        features:
            title: Funcions per a la gestió del temps a tota la institució
            introduction: |
                La nostra solució de registre de temps s'ha perfeccionat mitjançant la col·laboració amb diverses universitats. Les valoracions real dels usuaris impulsen el nostre desenvolupament, garantint funcions que realment serveixen a les necessitats acadèmiques.

                Només per esmentar alguns dels instituts acadèmics que utilitzen Kimai: `Universität Hamburg`, `Universität Bonn`, `Universität Wien`, `Universität Stuttgart`, `Universität Frankfurt`, `University of Fribourg`, `TU Dresden` i la `University of Moscow`.
        about:
            title: Comença el teu camí cap a una millor gestió del temps
            introduction: |
                Entenem que implementar un nou sistema de registre de temps en un entorn acadèmic requereix una consideració acurada.
                És per això que oferim un període de prova gratuït i sessions de demostració.
                Prova Kimai de forma gratuïta ara i gaudeix d'una jornada més organitzada!
        intro: Transforma l'eficiència de la teva institució amb un registre de temps potent
        title: Registre de temps per al sector acadèmic
