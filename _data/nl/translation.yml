alternatives:
    subtitle: Elke use-case, elk bedrijf en elke workflow is anders en uw vereisten moeten worden geëvalueerd voordat u beslist over een tijdsregistratie-oplossing. Hier zijn enkele populaire alternatieven voor Kimai, die we in detail zullen vergelijken om de beste optie voor u te vinden.
    name: Tijdregistratie vergelijken
    description: Kimai is de beste open source tijdregistratie-applicatie die beschikbaar is, niet alleen voor teams die aan projecten werken. Bekijk hoe Kimai zich verhoudt tot alternatieve tijdregistratieoplossingen, zodat u de juiste kunt kiezen voor uw organisatie.
feature:
    mobile-ready:
        name: "Geschikt voor mobiel"
        description: "Het ontwerp is volledig responsief, gemaakt voor zowel desktop- als mobiel gebruik. Elke gebruiker kan de gegevenskolommen configureren die moeten worden weergegeven, bijvoorbeeld om horizontaal scrollen op kleine apparaten te voorkomen."
    plugins:
        name: "Plug-ins"
        description: "Kimai is ontworpen om uitbreidbaar te zijn, en functies kunnen worden toegevoegd met plugins. Ontwikkelaars die ze willen maken, kunnen veel uitbreidingspunten gebruiken."
    multi-user:
        name: "Multi-gebruiker"
        description: "Kimai kan door zoveel gebruikers worden gebruikt als u wilt: elke installatie ondersteunt onbeperkte gebruikers met verschillende rollen (zie machtigingen)."
    multi-language:
        name: "Meertalig"
        description: "Kimai kan worden gelokaliseerd naar elke taal en is al vertaald naar meer dan 30 talen."
    teams:
        name: "Teams"
        description: "Teams kunnen worden gemaakt om uw gebruikers in logische groepen te groeperen, zoals afdelingen of projectgerelateerde peer-groepen. Klanten en projecten kunnen aan die teams worden toegewezen, wat de zichtbaarheid en toegang voor andere gebruikers beperkt."
    customers:
        name: "Klanten"
        description: "Beheer uw klanten en stel adres, contactpersonen, land, valuta, zichtbaarheid (voor archivering) en nog veel meer velden in."
    projects:
        name: "Projecten"
        description: "Beheer projecten voor elke klant met bestelnummer, budget en zichtbaarheid (voor archivering)."
    activities:
        name: "Activiteiten"
        description: "Activiteiten worden gebruikt om de eenheid van werk toe te wijzen aan timesheet-invoeren. Beheer activiteiten voor elk project met bestelnummer, budget en zichtbaarheid (voor archivering). Activiteiten kunnen globaal zijn, dus geen duplicatie nodig als meerdere projecten dezelfde werkeenheid delen."
    invoices:
        name: "Facturering"
        description: "Verschillende factuursjablonen, opties voor groepering van invoeren, configureerbare factuurnummers, en u kunt uw eigen sjablonen toevoegen in PDF, DOCX, HTML, XLSX en ODS-bestandsindeling."
    export:
        name: "Gegevens exporteren"
        description: "Timesheet-gegevens kunnen worden geëxporteerd naar andere programma's of gedeeld met verschillende afdelingen in XLSX (Excel), PDF, CSV en HTML-indeling. Geëxporteerde gegevens kunnen bovendien worden vergrendeld en beschermd tegen verdere wijzigingen."
    expenses:
        name: "Uitgaven"
        description: "Koop de plugin en houd uitgaven bij op basis van klant, project en activiteit - voor categorisatie en opname in uw facturen."
    saml:
        name: "SAML"
        description: "Meld u aan en registreer gebruikers via SAML (single sign-on aka SSO) en hergebruik uw bestaande identiteitsprovider, zoals Google Workspace, Authentik of Azure Active Directory."
    api:
        name: "JSON API"
        description: "Met een JSON API zodat externe apps kunnen communiceren met uw favoriete tijdsregistratiesysteem."
    ldap:
        name: "LDAP"
        description: "Verbind Kimai met uw bedrijfsdirectoryserver (LDAP of Active Directory) en gebruik uw bestaande authenticatie-infrastructuur."
    statistics:
        name: "Statistieken"
        description: "Uw dashboard toont u verschillende statistieken over geregistreerde tijden en de hoeveelheid verzamelde gegevens. En we kunnen altijd meer grafieken toevoegen!"
    docker:
        name: "Docker"
        description: "We hebben Docker-images voor ontwikkeling en er zijn meerdere variaties van Docker-Compose-configuraties voor productiegebruik."
    migrate-v1:
        name: "Migratie"
        description: "Gegevens van Kimai v1 kunnen worden geïmporteerd voor een naadloze migratie van uw tijdregistratiesysteem."
    active-entries:
        name: "Aantal actieve records"
        description: "Registreer zoveel tijden als u wilt parallel, of beperk het tot één."
    am-pm-format:
        name: "AM/PM-formaat"
        description: "Kimai gebruikt de gelokaliseerde versie van het 24-uursformaat. Maar als u gewend bent aan het AM/PM-formaat, kunt u dat configureren."
    time-clock:
        name: "Tijdklok"
        description: 'Wilt u niet dat uw gebruikers willekeurige timesheet-records registreren? Schakel over naar de tijdklokmodus, die alleen "inklokken" en "uitklokken" toestaat. Geen handmatig opgegeven start- en eindtijden meer.'
    duration-only:
        name: "Alleen duur"
        description: "Als uw lokale wetten vereisen dat u alleen duur in plaats van start- en einddatum en -tijd weergeeft, kunt u die modus wereldwijd activeren."
    rates:
        name: "Tariefberekening"
        description: "Tarieven kunnen worden berekend op basis van uurtarieven en vaste bedragen, configureerbaar voor klanten, projecten, activiteiten en elke timesheet-invoer afzonderlijk."
    timesheet-filter:
        name: "Timesheet-filter"
        description: "U kunt alle tijdsregistraties filteren op gebruiker, klant, project, activiteit en datum."
    permissions:
        name: "Machtigingen"
        description: "Aanpasbare machtigingsstructuur. Wijs verschillende rollen toe aan uw gebruiker, bijvoorbeeld gebruikers kunnen tijden registreren, teamleiders kunnen facturen afdrukken en project-/activiteiten configureren, beheerders kunnen gebruikers en klanten configureren."
    user-profile:
        name: "Gebruikersprofiel"
        description: "Persoonlijke statistieken en gebruikersspecifieke instellingen voor uurtarief, Kimai-thema, wachtwoord en avatar."
    password-reset:
        name: "Wachtwoordreset"
        description: "Wachtwoord vergeten? Kimai helpt u dit te resetten via e-mail."
    2fa:
        name: Tweefactorauthenticatie (2FA)
        description: "Kimai ondersteunt tweefactorauthenticatie met TOTP-tokens: beveilig uw gebruikersaccounts vandaag nog!"
    auth:
        description: "Kimai ondersteunt externe identiteitsproviders en inloggen via LDAP en SAML bij meerdere providers (zoals Google Workspace, Azure AD of Authentik). Daarnaast kan tweefactorauthenticatie worden ingeschakeld via TOTP-tokens."
        name: Authenticatie en Beveiliging
    reporting:
        description: "Analyse van geregistreerde tijden, klanten, projecten en activiteiten. Evaluatie op basis van gebruikers, klanten, projecten, activiteiten, tags, tijdsperiodes en nog veel meer."
        name: Rapporten en analyses
    dark-mode:
        name: Donkere modus
        description: Want elke app heeft een donkere modus nodig, die helpt om de ogen ’s avonds of in donkere omgevingen minder te belasten.
    customer-portal:
        name: Klantenportaal
        description: Deel klant- en projectstatistieken en urenstaten met iedereen via een geheime URL, optioneel beveiligd met een wachtwoord.
    no-limits:
        description: "Bevat jouw SaaS-software altijd limieten? Kimai niet: er zijn geen limieten. Je betaalt alleen voor het aantal actieve gebruikers. Ik leg je geen beperkingen op en bereken inactieve gebruikers niet. Je kunt onbeperkt gebruikers, klanten, projecten, activiteiten, urenstaten en meer aanmaken."
        name: Kent geen grenzen
    privacy:
        name: Privacy staat voorop
        description: Ik respecteer jouw privacy en die van je gebruikers, evenals jullie gegevens. Nee, dit is geen zoveelste saaie inleiding op een privacybeleid — zo run ik dit bedrijf. Ik verkoop geen gegevens. Ik volg de AVG/GDPR en beantwoord graag elke vraag over de betrokken subverwerkers.
    security:
        points:
            security_1: Veilige wachtwoord-hashing met Argon2 of Sodium
            security_6: Geautomatiseerde codetests met een code coverage boven 90%
            security_4: Continuous integration met duizenden controles
            security_5: Diepgaande code reviews
            security_2: Granulaire gebruikersrollen die de toegang beperken
            security_3: CSRF- en XSS-bescherming
        name: Beveiliging in Kimai
        description: Kimai implements best-practices in application design to prevent common attacks. Automated security controls are critical to any software development workflow to reduce the amount of time from defect creation to defect detection. These scans run on every code change, every time.
    security-cloud:
        points:
            security_6: De code draait in strikt afgeschermde omgevingen
            security_1: Alle verbindingen zijn beveiligd via TLS (SSL)
            security_2: Best-practice beveiliging, firewalls en bescherming tegen brute-force
            security_3: Geen multi-tenancy, elke klant heeft een eigen database
            security_4: De servers staan in een datacenter in de EU
            security_5: Kritieke services zijn niet toegankelijk vanaf het internet
        name: Beveiliging in het platform
        description: Software is alleen zo veilig als het systeem waarop het draait. Ik hanteer een defense-in-depth-aanpak voor server- en netwerkinfrastructuur. Klanten op het gehoste platform worden beschermd door meerdere lagen beveiliging.
    electronic-invoicing:
        name: E-facturen
        description: Maak e-facturen in zowel XML- als PDF/A-formaat, conform EN 16931, XRechnung 3.0, Zugferd/Factur-X en met gebruik van de CII- en UBL-syntax
    eu-hosting:
        description: Onafhankelijk en Europees 🇪🇺 – ontwikkeld in Oostenrijk 🇦🇹 en gehost in Duitsland 🇩🇪
        name: EU-hosting
developer:
    kevinpapst:
        intro: 'Het is altijd mijn droom geweest om te kunnen leven van een open source product. Met Kimai heb ik een software kunnen ontwikkelen die grote waarde biedt voor mijn klanten en waarvan de ontwikkeling mij elke dag drijft.


            Mijn speciale dank gaat uit naar de geweldige community voor hun loyaliteit door de jaren heen. Ik kijk uit naar de volgende 10 jaar Kimai 🚀'
