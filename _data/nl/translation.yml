industries:
    name: Sectoren
    agency:
        features:
            introduction: Niet alle tijdregistratietools zijn gelijk. De beste oplossingen voor bureaus bieden een gespecialiseerde set functies om je workflows te stroomlijnen.
            title: Kimai-functies die het meest door bureaus worden gebruikt
        testimonials:
            tag: Bureau
            introduction: Bij Kimai hebben we ons tijdregistratieplatform ontworpen om aan de behoeften van bureaus, teams en zelfstandigen te voldoen. Onze intuïtieve interface en krachtige functies helpen bureaus zoals het jouwe slimmer en winstgevender te werken. Je kunt nu "luisteren" naar de ervaringen van echte gebruikers.
            title: Wat bureaus zeggen over tijdregistratie
        about:
            title: Eerste stappen naar betere tijdregistratie
            introduction: |
                Je hebt al je eerste stappen gezet en we zijn ervan overtuigd dat je een weloverwogen keuze kunt maken. Wat moet je nog meer overwegen om de beste tijdregistratiesoftware te kiezen? Sommige aanbieders bieden gratis versies aan, die beperkingen kunnen hebben, terwijl andere gratis demo’s, proefperiodes of prijsmodellen aanbieden op basis van de bedrijfsomvang of het aantal gebruikers.

                Bij Kimai bieden we een gratis proefperiode aan zodat je onze oplossing kunt verkennen voordat je beslist of je extra gebruikers, functies of plugins nodig hebt. Probeer het vandaag gratis en heb een meer georganiseerde werkdag!
        title: Tijdregistratie voor bureaus
        cta:
            title: Ready to start tracking time in your agency?
        name: Bureaus
        introduction: |
            Run je een bureau — of het nu in marketing, PR, design, consultancy, HR of architectuur is? Dan weet je hoe cruciaal tijdregistratie is voor je bedrijf. Het bijhouden van de uren van medewerkers en de tijd die aan klantprojecten wordt besteed, is essentieel om correct te factureren, de winstgevendheid te begrijpen en je groeiende team te beheren.

            Maar tijdregistratie beheren via spreadsheets en losse tools kan al snel een chaos worden, vooral wanneer je bureau groeit. Dan kan een speciale tijdregistratieoplossing het verschil maken.

            Laten we kijken waarom succesvolle bureaus op tijdregistratiesoftware vertrouwen en welke essentiële functies je moet zoeken. We gebruiken Kimai als voorbeeld van een gebruiksvriendelijke oplossing die met bureaus in gedachten is gebouwd.
        intro: Benut het winstpotentieel in snelgroeiende bureaus met een schaalbaar tijdregistratiesysteem
        subtitle: De sleutel tot winstgevendheid
    lawyer:
        about:
            title: Eerste stappen naar betere tijdregistratie in je advocatenpraktijk
            introduction: |
                We begrijpen dat het uitproberen van nieuwe software in de juridische sector ontmoedigend kan voelen. Daarom bieden we een gratis proefperiode zonder verplichtingen, een eenvoudige onboarding, een flexibele set functies die meegroeit met je praktijk of team, en speciale ondersteuning.

                We geloven dat je zelfs tijdens een gratis proefperiode een manier kunt vinden om te stoppen met worstelen met urenstaten. Probeer Kimai vandaag en heb een fijne, georganiseerde dag!
        features:
            title: Kimai-functies die advocatenkantoren waarderen
            introduction: Kimai is speciaal ontworpen met juridische professionals in gedachten. We hebben een tijdregistratietool gemaakt die jouw taal spreekt — eenvoudig, betrouwbaar, AVG/GDPR-conform en gericht op een soepelere werkdag.
        testimonials:
            introduction: Bij Kimai zijn juridische professionals en consultants altijd ons aandachtspunt geweest. Lees nu over de echte ervaring van onze gebruikers.
            title: Inzichten over tijdregistratie van onze klanten
        title: Tijdregistratie voor advocaten
        intro: Laat complexe urenstaten achter je en richt je op uitmuntende juridische dienstverlening met moderne tijdregistratieoplossingen
        subtitle: Focus op factureerbare uren, niet op ingewikkelde urenstaten
        name: Advocaten
        introduction: |
            In de snelle wereld van juridische dienstverlening is tijd je waardevolste bezit. Advocatenkantoren, zelfstandige advocaten en juridische teams hebben een tijdregistratieoplossing nodig die is afgestemd op de unieke eisen van hun vak. Bij Kimai begrijpen we dat jouw focus moet liggen op uitmuntende juridische dienstverlening — niet op het worstelen met ingewikkelde urenstaten.

            Handmatig uren bijhouden, eindeloze spreadsheets en omslachtige exportprocessen kosten waardevolle tijd die je beter aan je juridische advisering kunt besteden. Ontdek hoe efficiënte tijdregistratie je helpt om je te richten op wat er echt toe doet.
        cta:
            title: Ready to revolutionize time tracking in your practice?
    software-developers:
        features:
            title: Kimai-functies die door software-engineers worden gebruikt
            introduction: Ontdek de perfecte set functies, afgestemd op je taken en doelen. Wat als je IT-team niet alleen een eenvoudige tijdregistratie nodig heeft, maar een robuuste oplossing met verschillende integratieopties en geavanceerde facturatie- en analysemogelijkheden?
        title: Tijdregistratie voor softwareontwikkelaars
        about:
            introduction: |
                De juiste tijdregistratie kiezen begint vaak met de keuze tussen een gratis versie of een demo. De prijs is ook een belangrijke factor, dus zoek naar opties die meegroeien met je team.

                Bij Kimai bieden we een gratis proefperiode aan zodat je onze oplossing kunt verkennen voordat je beslist of je extra functies of plugins nodig hebt. Met prijzen vanaf slechts € 0,99 per gebruiker voor sommige sectoren is het een betaalbare keuze. Probeer het vandaag gratis en breng meer structuur in je werkdag!
            title: Eerste stappen naar betere tijdregistratie
        subtitle: Maximaliseer je productiviteit
        cta:
            title: |
                Klaar om een nieuwe manier te proberen
                om tijd te registreren in je IT-team?
        testimonials:
            title: IT-professionals over tijdregistratie
            introduction: Bij Kimai hebben we ons tijdregistratieplatform ontworpen met de behoeften van individuele ontwikkelaars, devteams en IT-afdelingen in gedachten. Onze aanpak is gericht op het bouwen van open-sourceoplossingen voor techteams van elke omvang en in verschillende sectoren. Je kunt zien wat voor feedback we ontvangen van onze gebruikers uit de tech.
        name: Softwareontwikkelaars
        intro: Maximaliseer de productiviteit van het team en bereik een goede werk-privébalans met slimme tijdregistratie
        introduction: |
            We kennen de pijn maar al te goed — eindeloos overwerk, stressvolle deadlines, tijdrovende bugs en de voortdurende strijd om projectmanagers en klanten de echte inspanning achter je code te laten waarderen. Het is een vicieuze cirkel die snel kan leiden tot burn-out en je werk-privébalans kan verstoren. Dit is een veelvoorkomende uitdaging voor softwareontwikkelaars, programmeurs, engineers en andere techprofessionals.

            Maar er is een manier om uit deze cirkel te breken en je tijd en taken weer in eigen hand te nemen. Met de juiste tools kun je je productiviteit maximaliseren en waardevolle inzichten in je projecten krijgen. Of je nu freelance programmeur bent, deel uitmaakt van een startupteam of een hele IT-afdeling leidt, een schaalbare oplossing met de juiste functies vinden is essentieel. Laten we Kimai bekijken — gebruiksvriendelijke en krachtige tijdregistratiesoftware — als voorbeeld.
    consultants:
        features:
            title: Kimai-functies die het meest door consultants worden gebruikt
            introduction: Of je nu zelfstandige bent of deel uitmaakt van een grote consultancyafdeling, Kimai biedt tools om mee te schalen terwijl je bedrijf groeit.
        about:
            title: Eerste stappen naar betere tijdregistratie in consultancy
            introduction: |
                Om het meeste uit je tijdregistratiesoftware te halen, begin je met het verkennen van alle functies via een demo of gratis proefperiode. Als consultant wil je waarschijnlijk de prijsopties zorgvuldig afwegen en vooruitdenken over welke functies je nodig kunt hebben naarmate je bedrijf groeit.

                Bij Kimai begrijpen we deze reis. Daarom bieden we een gratis proefperiode aan waarmee je onze oplossing kunt testen voordat je beslist welke extra functies of plugins het best bij je passen. Onze alles-in-één app groeit mee met je bedrijf — je kunt eenvoudig uitbreidingen toevoegen wanneer dat nodig is. Probeer het vandaag gratis en heb een fijne, georganiseerde dag!
        subtitle: Maximaliseer factureerbare uren en efficiëntie
        name: Consultants
        title: Tijdregistratie voor consultants
        testimonials:
            introduction: Bij Kimai hebben we ons platform gebouwd om zowel individuele consultants als grote teams te bedienen. Als alles-in-één oplossing wordt Kimai vertrouwd door bedrijven van elke omvang in verschillende sectoren. Dit is wat onze gebruikers uit de consultancybranche te zeggen hebben.
            title: Inzichten over tijdregistratie van consultancyprofessionals
        intro: Verhoog de winstgevendheid en lever meer waarde aan klanten met strategische tijdregistratie voor uitmuntende consultancy
        introduction: |
            In het dynamische consultancylandschap van vandaag — of het nu gaat om managementconsultancy, financieel advies, IT-diensten, data science, juridisch advies, psychologische dienstverlening of HR-consultancy — blijft één waarheid constant: tijd is je waardevolste bezit. Nauwkeurige tijdregistratie gaat niet alleen over het bijhouden van uren. Het gaat erom de winstgevendheid te maximaliseren en waarde te leveren aan je klanten.

            Laten we eerlijk zijn — consultancyprojecten beheren is niet makkelijk. Je teamleden werken misschien tegelijkertijd vanuit New York, Londen en Singapore. Dat is veel om bij te houden! Bovendien moet je precies weten wie aan wat heeft gewerkt om je klanten correct te factureren. Zonder goede tijdregistratie kan het snel rommelig worden. Je moet de projectkosten beheersen, voldoen aan regelgeving en ervoor zorgen dat de tijd van je team verstandig wordt benut.

            Daarom zijn alles-in-één tijdregistratietools onmisbaar geworden voor consultants. Ze veranderen al die mogelijke chaos in heldere, georganiseerde gegevens die je bedrijf laten floreren. Laten we kijken hoe een complete oplossing zoals Kimai je consultancybedrijf kan transformeren.
        cta:
            title: |
                Klaar om een nieuwe manier te proberen
                om tijd te registreren in je praktijk?
    freelancers:
        name: Freelancer
        testimonials:
            introduction: "Geloof ons niet op ons woord. Dit is wat andere freelancers zeggen:"
            title: Wat andere professionals delen over tijdregistratie met Kimai
        features:
            title: 'Features loved by freelancers '
            introduction: Kimai is ontworpen om solopreneurs te helpen hun workflow te stroomlijnen. Of je nu meerdere klanten jongleert of verschillende projecten beheert, Kimai biedt de tools die je nodig hebt om georganiseerd en winstgevend te blijven.
        introduction: |
            Wanneer freelancen een nieuw hoofdstuk in je leven is, moet je nieuwe rollen op je nemen en nieuwe uitdagingen aangaan. Eén daarvan is timemanagement en de balans tussen de uren die je werkt en de winstgevendheid van je projecten. Het beheren van meerdere projecten vraagt om analyse — zowel voor jou als voor je klanten.

            Maar er zijn tools die freelancers, opdrachtnemers, digital nomads en solopreneurs helpen om hun factureerbare uren bij te houden, klanten te factureren zonder hoofdpijn, hun uurtarieven en kosten te beheren, enzovoort.

            Daardoor kun je je richten op waar je van houdt — en krijg je betaald wat je echt verdient. Laten we kijken hoe met Kimai als tijdregistratietool voor freelancers.
        cta:
            title: Ready to get the most of your time as a freelancer?
        title: Tijdregistratie voor succesvolle freelancers
        about:
            title: Eerste stappen naar beter timemanagement
            introduction: |
                Klaar om de voordelen van Kimai te ervaren? We bieden een gratis proefperiode aan zodat je alle functies kunt verkennen voordat je beslist welke tijdregistratiesoftware het beste bij jou past als zelfstandige professional.

                Meld je vandaag aan, begin je tijd letterlijk met één klik te registreren en heb een meer georganiseerde dag!
        intro: Maximaliseer je inkomen als solopreneur
    universities:
        cta:
            title: Ready to transform time management at your institution?
        subtitle: ' '
        testimonials:
            introduction: |
                Bij Kimai hebben we ons tijdregistratieplatform ontworpen om aan de behoeften van bureaus, teams en freelancers te voldoen.
                Onze intuïtieve interface en krachtige functies helpen bureaus zoals het jouwe slimmer en winstgevender te werken.
                Je kunt nu "luisteren" naar de ervaringen van echte gebruikers.
            title: Wat onze klanten zeggen
        name: Universiteiten
        introduction: |
            Het beheren van tijd in het hoger onderwijs brengt unieke uitdagingen met zich mee, zoals het plannen van colleges en lessen, het volgen van onderzoeksprojecten, het toewijzen van tijd aan studenten en docenten, en tijdrovende administratieve taken.

            Effectieve tijdregistratieoplossingen helpen deze processen te stroomlijnen, zodat docenten en onderzoekers zich op hun kerntaken kunnen richten.
        features:
            title: Functies voor instellingsbreed timemanagement
            introduction: |
                Onze tijdregistratieoplossing is verfijnd in samenwerking met meerdere universiteiten. Echte gebruikersfeedback stuurt onze ontwikkeling aan en zorgt voor functies die echt aansluiten op academische behoeften.

                Een paar van de academische instellingen die Kimai gebruiken: `Universität Hamburg`, `Universität Bonn`, `Universität Wien`, `Universität Stuttgart`, `Universität Frankfurt`, `University of Fribourg`, `TU Dresden` en de `University of Moscow`.
        about:
            title: Begin je weg naar beter timemanagement
            introduction: |
                We begrijpen dat het implementeren van een nieuw tijdregistratiesysteem in een academische omgeving zorgvuldig overwegen vraagt.
                Daarom bieden we een gratis proefperiode en demosessies aan.
                Probeer Kimai nu gratis en heb een meer georganiseerde dag!
        intro: Transformeer de efficiëntie van je instelling met krachtige tijdregistratie
        title: Tijdregistratie voor de academische sector
    non-profit:
        about:
            introduction: |
                If you represent a non-profit organization, please register with an official
                email address of your organization and send us a brief support message. The plan will be activated after manual review.

                In return, we ask for a testimonial with your logo and name, or an interview so we can feature you as a user.
            title: Our affordable non-profit plan for you
        introduction: |
            Today we say thank you to the many NGOs and NPOs:

            - Charitable and philanthropic organizations
            - Public and independent schools, universities, community colleges
            - Public safety agencies, emergency services, disaster relief, fire departments, civil protection
            - Conservation, sports, and all other clubs that foster community and teach skills
            - Social services, elderly care, and youth facilities
            - … and the many, many others we forgot to mention

            You give your time, create small and great wonders, and enrich the lives of so many: **Thank you for being there ❤️**

            As an organization grows, donations increase, and the first employees come on board, the need for structured time tracking becomes clear. Documenting workflows transparently helps identify opportunities for improvement early on – freeing up resources for your actual mission while laying the groundwork for transparent accountability reports.
        subtitle: Less administrative burden, so your mission stays in focus
        cta:
            title: |
                We want to help you
                simplify your time tracking
        title: Time Tracking for Non-Profit Organizations ✨
        features:
            title: Features that NPOs appreciate
            introduction: Kimai helps many non-profits gain insight into their projects while simplifying working time management. We have built a time tracking tool that speaks your language – simple, reliable, GDPR-compliant, and designed to make your daily work run more smoothly.
        testimonials:
            title: What other NPOs say about Kimai
            introduction: |
                Thanks to Kimai's open-source roots, we see ourselves as part of the broader non-profit movement that spans so many fields and sectors.
                We are happy to support you!
        intro: We put your work and vision center stage while simplifying administration and billing
        name: Non-Profits
