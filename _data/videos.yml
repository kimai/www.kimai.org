rates:
    title: "Setting Your Prices"
    id: "iQX9ozk8fkE"
    category: Timesheet
    description: "In this video you will find out how to set prices for the working time you track with Kimai. You will learn Kimai's intelligent price hierarchy, the hourly pricing and budget tracking and the difference of billable vs non-billable work. Rate hierarchy: user, customer, project, activity, Default hourly rate and internal cost tracking, Customer-specific pricing for client tiers, Project rates: fixed-price vs hourly, Activity-based premium pricing, User-specific rates for teams, Billable vs non-billable work,"

exports_invoices:
    title: "Create Reports & Invoices"
    id: "saNH0SX3UW8"
    category: Export
    chapter:
        export: 68
        export_state: 116
        invoice: 196
    description: "In this episode – you will see the results of your hard work! Transform data into professional reports, export to any format, and create invoices. Business reporting for users/customers/projects/activities, Multiple report views, Export to Excel, CSV, PDF for any purpose, Invoice template creation for your company, Invoice generation from tracked time, Invoice history management & payment tracking"

create_users:
    title: "Add Users, Teams & Roles"
    id: "0NWSYR3JvxM"
    category: Users
    chapter:
        roles: 95
        teams: 137
    description: "In this episode you will learn how to build your team inside Kimai. You'll learn how to add new users, assign roles and create teams that can work on specific projects and customers."

working_contracts_setup_and_absences:
    title: "Set Up Working Time & Absences"
    id: "Ed11R3d4Eng"
    category: Working contract
    chapter:
        public_holiday: 99
    description: "In this episode you will configure an employment contract for your user. Learn how to set up user's working time and how to manage absences like holiday, sickness, time off and other. Find out how admins can use the manual bookings feature in Kimai. Working hours, vacation, sickness, public holidays is available as part of Kimai Cloud Professional plan and as a Kimai On-Premise Plugin."

kiosk_mode:
    title: "Kiosk Mode"
    id: "l6KDhG1oM2A"
    category: Kiosk
    description: "In this video, you will learn how to set up a kiosk with Kimai's Kiosk Mode feature. This will let users log in through a RFID or NFC tap, a barcode scan or a manual code entry. Kiosk Mode is available as part of Kimai Cloud Professional plan and as a Kimai On-Premise Plugin."

working_contract_overview:
    title: "Working Times introduction"
    id: "BYkgplGTz4Q"
    category: Working contract
    chapter:
        absence_calculation_mode: 36
        overview: 80
        colors: 150
    description: "This tutorial walks you through Kimai’s working times feature, showing how it calculates user's time balance and displays absences. You will find out about important working times settings and learn how to lock a completed month. Working times feature is available as part of Kimai Cloud Professional plan and as a Kimai On-Premise Plugin."
