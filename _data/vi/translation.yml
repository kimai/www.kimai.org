feature:
    teams:
        name: Teams
        description: Teams can be created to group your users into logical groups like departments or project related peer-groups. Customers and projects can be assigned to those teams, which will limit visibility and access for other users.
    mobile-ready:
        description: The layout is fully responsive, made for desktop and mobile usage. Every user can configure the data columns that should be shown, e.g. to prevent horizontal scrolling on small devices.
        name: Mobile ready
    plugins:
        description: Kimai was built to be extendable, and features can be added with plugins. Developers wanting to create them can use many extension points.
        name: Plugins
    multi-user:
        description: 'Kimai can be used by as many users as you want: each installation supports unlimited users with different roles (see permissions).'
        name: Multi user
    multi-language:
        name: Multi language
        description: Kimai can be localized to any language and is already translated to more than 30 languages.
    customers:
        name: Customers
        description: Manage your customers and set address, contacts, country, currency, visibility (for archiving) and many more fields.
    projects:
        name: Projects
        description: Manage projects for each customer with order number, budget and visibility (for archiving).
    activities:
        name: Activities
        description: Activities are used to assign the unit of work to timesheet entries. Manage activities for each project with order number, budget and visibility (for archiving). Activities can be global, no more duplication necessary if multiple projects share the same working unit.
    invoices:
        name: Invoicing
        description: Configurable invoice templates, options for entry grouping, configurable invoice numbers, and multiple formats like PDF and DOCX.
    export:
        name: Export data
        description: Timesheet data can be exported and shared with in XLSX, PDF, CSV and HTML format. Exported records can be locked and protected against further changes.
    expenses:
        name: Expenses
        description: Buy the plugin and keep track of expenses based on customer, project and activity — for categorization and inclusion in your invoices.
    saml:
        description: Login and register users via SAML (Single sign on aka SSO) and re-use your existing identity provider, like Google workspace, Authentik or Azure active directory.
        name: SAML
    api:
        name: JSON API
        description: Featuring a JSON API so external apps can communicate with your favorite time-tracker!
    ldap:
        description: Connect Kimai with your company directory server (LDAP or Active directory) and use your existing authentication infrastructure.
        name: LDAP
    statistics:
        name: Statistics
        description: Your dashboard will show you several statistics about recorded times and the amount of collected data. And we can always add more charts!
    docker:
        name: Docker
        description: We have Docker images for development and there multiple variations of Docker-Compose setups for production usage.
    migrate-v1:
        name: Migration
        description: Data from Kimai v1 can be imported, for a seamless migration of your time-tracker.
    active-entries:
        name: Amount of active records
        description: You can record as many times as you want in parallel, but you can also config the allowed limit of active records down to 1.
    am-pm-format:
        name: AM/PM format
        description: Kimai uses localized version of the 24 hour format. But if you are used to the AM/PM format, you can configure that.
    duration-only:
        description: If your local laws require you to only show durations instead of start and end date-time, you can activate that mode globally.
        name: Duration only
    rates:
        name: Rate calculation
        description: Rates can be calculated based on hourly and fixed amounts, configurable for customers, projects, activities and each timesheet record individually.
    timesheet-filter:
        name: Timesheet filter
        description: You can filter all time-records by user, customer, project, activity and date.
    permissions:
        name: Permissions
        description: Customizable permission structure. Assign different roles to your user, e.g. users can record times, teamleads can print invoices and configure project/activities, admins can configure users and customers.
    user-profile:
        name: User profile
        description: Personal statistics and per user settings for hourly rate, Kimai theme, password and avatar.
    user-registration:
        name: User registration
        description: Kimai supports user self-registration with e-mail activation.
    password-reset:
        name: Password reset
        description: Forgot your password? Kimai helps you reset it via e-mail.
    time-clock:
        name: Time-clock
        description: Don’t want your users to log arbitrary timesheet records? Switch to the time-clock mode, which only allows “punch in” and “punch out” records.
    2fa:
        description: 'Kimai supports two-factor authentication with TOTP tokens: secure your user accounts today!'
        name: Two-factor auth (2FA)
    auth:
        description: Kimai supports external identity providers and login via LDAP and SAML across multiple providers (such as Google Workspace, Azure AD or Authentik). In addition, two-factor authentication can be enabled via TOTP tokens.
        name: Authentication and Security
    reporting:
        description: Analysis of recorded times by users, customers, projects, activities, tags, time periods and more.
        name: Reports and analyses
    dark-mode:
        name: Dark mode
        description: Because every app needs a dark-mode, which helps to reduce eye strain in the evening or in dark environments.
    customer-portal:
        description: Share client and project statistics and timesheets with anyone using a secret URL, optionally password protected.
        name: Customer Portal
    no-limits:
        description: "Your SaaS software always includes limits? Not Kimai: there are no limits. You only pay for the amount of active users. I don't limit you, and I do not charge for inactive users. You can create an unlimited amount of users, customers, projects, activities, timesheets and more."
        name: Knows no limits
    security:
        points:
            security_6: Automated code test with a code coverage above 90%
            security_4: Continuous integration with thousands of checks
            security_1: Secure password hashing with Argon2 or Sodium
            security_5: In-depth code reviews
            security_2: Granular user-roles restricting access
            security_3: CSRF and XSS protection
        description: Kimai implements best-practices in application design to prevent common attacks. Automated security controls are critical to any software development workflow to reduce the amount of time from defect creation to defect detection. These scans run on every code change, every time.
        name: Security in Kimai
    security-cloud:
        points:
            security_1: All connections secured via TLS (SSL)
            security_2: Best-practice security, firewalls and brute-force prevention
            security_6: Code runs in tightly restricted domain environments
            security_3: No multi-tenancy, each customer has their own database
            security_4: Servers are hosted in a data center in the EU
            security_5: Critical services are not accessible to the outside world
        name: Security in the platform
        description: Software is only as secure as the system it runs on. I take a defense-in-depth approach with server and network infrastructure. Customers on the hosted platform are secured through multiple layers of protection.
    privacy:
        name: Privacy comes first
        description: I respect your and your users privacy and data. No, this is not yet another boring introduction into a Privacy policy - that's how I run this business. I don't sell data. I follow the GDPR and will answer any question about involved sub-processors.
