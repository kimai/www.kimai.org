items:
    alexandreptj-kemai-desktop-client:
        intro: Giao diện đa nền tảng cho Kimai
        title: Kemai - Desktop client
    keleo-css-custom-bundle:
        title: Custom CSS
        intro: Cho phép thêm quy định CSS custom thông qua màn hình quản trị viên.
    cloudrizon-kimai-mobile-app-android:
        title: Kimai Mobile (Android)
        intro: Kimai Mobile là ứng dụng cho phép sử dụng Kimai một cách thuận tiện trên thiết bị di động Android của bạn
    district09-archive-timesheets-command-bundle:
        title: Lệnh lưu trữ bảng chấm công
        intro: Cho phép dùng lệnh để lưu trữ các bảng chấm công cũ hơn khoảng thời gian đã chỉ định.
    district09-personal-calendar-pref-bundle:
        title: Tùy chọn lịch cá nhân
        intro: Cho phép người dùng tùy chỉnh thời gian bắt đầu và kết thúc cho lịch theo cá nhân.
    gbs-zip-projectrenderer-bundle:
        title: ZipProjectRenderer (Xuất file ZIP với mỗi file PDF cho mỗi dự án)
        intro: Xuất mỗi file PDF cho mỗi dự án trong các dự án đã chọn.
    glorpen-duration-bundle:
        title: Ghi đè làm tròn thời gian
        intro: Ghi đè làm tròn thời gian cho khách hàng, dự án và hoạt động
    infeeeee-kimai2-cmd-argos:
        title: Argos/Kargos/xbar menu bar plugin
        intro: Đặt Kimai trên thanh hiển thị phía trên!
    infeeeee-kimai2-cmd-rainmeter:
        title: Rainmeter widget
        intro: Kimai widget dành cho Windows!
    infeeeee-kimai2-cmd:
        title: Client giao diện dòng lệnh
        intro: Client giao diện dòng lệnh cho Kimai, viết bằng Node.js
    katjaglass-approval-bundle:
        title: Chấp nhận luồng công việc cho bảng chấm công
        intro: Bundle này khả dụng để thực hiện cấp phép hằng tuần cho bảng chấm công.
    katjaglass-timekex:
        title: TimeKex - Import bảng chấm công Excel
        intro: Import file Excel dùng để duy trì thời gian vào Kimai hằng tuần. Một lần import file Excel cho khách hàng/dự án/hoạt động cũng khả dụng.
    audit-trail-bundle:
        intro: Ghi nhận chi tiết log từ chỉnh sửa/kiểm toán của bảng chấm công, khách hàng, dự án và hoạt động, và hiển thị theo từng mục trên dòng thời gian.
        title: Log dấu vết kiểm toán
    console-phar:
        title: Client dòng lệnh (PHAR)
        intro: Client dòng lệnh đa nền tảng cho Kimai
    custom-content-bundle:
        intro: Content tùy chỉnh cho stylesheets, Javascript, thông báo lỗi global và một trang mới để hiển thị nội dung markdown cho tin tức công ty.
        title: Content tùy chỉnh
    custom-fields-bundle:
        intro: Tạo thêm các mục tự do tùy chỉnh cho bảng chấm công, khách hàng, dự án, hoạt động và người dùng theo nhiều định dạng. Các mục có thể không bắt buộc hoặc bắt buộc và bị giới hạn bởi hạn quyền.
        title: Mục điền tủy chỉnh
    custom-plugins:
        intro: Có nhu cầu về tính năng nào đó chưa có trên Kimai? Chúng tôi có thể phát triển nó cho bạn.
        title: Phát triển theo tùy chỉnh (Plugin, Mẫu Invoice và Export)
    keleo-deduction-time-bundle:
        title: Bundle giảm thời gian
        intro: Cài đặt các hoạt động thành thời gian bị giảm và tiết kiệm khoảng thời gian âm
    expenses-bundle:
        title: Quản lý chi tiêu
        intro: Theo dõi các khoản chi tiêu dựa trên khách hàng và dự án. Những khoản chi tiêu này có thể được phân loại và có bao gồm trong invoice của bạn.
    fail2ban-bundle:
        title: Fail2Ban dành cho đăng nhập
        intro: Plugin tương tích với Fail2Ban, log lại các yêu cầu xác thực thất bại
    grandtotal-plugin-for-kimai:
        title: Đồng bộ với GrandTotal
        intro: GrandTotal plugin, cho phép nhập bảng chấm công từ Kimai
    keleo-importer-bundle:
        title: Importer (CSV và JSON)
        intro: Cho phép nhập file CSV thông qua màn hình quản trị viên.
    installation-support:
        title: Hỗ trợ cài đặt và cập nhật
        intro: Bạn muốn dùng Kimai, nhưng không biết cách cài đặt cho server của bạn?
    invoice-bundle:
        intro: E-invoices (EN16931, XRechnung, ZUGFeRD, Factur-X), tự động xuất file PDF bảng chấm công, và các tính năng lập hóa đơn nâng cao khác
        title: E-Invoice Plus
    keleo-invoice-format-fixation-bundle:
        title: Định dạng dữ liệu invoice cố định (theo ngôn ngữ)
        intro: Cho phép thiết lập ngôn ngữ chung cho định dạng dữ liệu invoice
    kiosk-barcode-bundle:
        title: Kiosk mode with support for Barcode, RFID, Web NFC
        intro: Theo dõi thời gian điểm danh trong một môi trường nơi người dùng không có truy cập vào Kimai (ví dụ như trong nhà kho) bằng cách dùng máy quét mã vạch hoặc RFID để bắt đầu và kết thúc bảng chấm công.
    lockdown-per-user-bundle:
        title: Khóa cài đặt theo từng người dùng
        intro: Thiết lập khoảng thời gian khóa cho từng người dùng theo lựa chọn.
    keleo-recalculate-rates-bundle:
        intro: Bắt buộc tính toán lại cho mỗi mức giá theo giờ/cố định cho mỗi lần cập nhật bản chấm công
        title: Tính toán lại giá trị
    task-management-bundle:
        title: Lập kế hoạch công việc
        intro: Tạo công việc, bắt đầu/dừng/tạm dừng công việc, giao chúng cho người dùng và các đội và ghi nhận thời gian của chúng — quản lý danh sách việc cần làm với Kimai
    translation-bundle:
        title: Phiên dịch
        intro: Thay đổi tất cả các yếu tố hiển thị (nhãn biểu mẫu (form), tiêu đề bảng, mục menu, ...)  trong cài đặt của Kimai bằng bản phiên dịch của riêng bạn
    liaraalis-small-business-rule-bundle:
        title: Quy định cho doanh nghiệp nhỏ (small-business)
        intro: Sử dụng quy định dành cho doanh nghiệp nhỏ. Có thể áp dụng cho Đức và Áo, khi lập biên lai (invoices) trong Kimai.
    maximiliangross-easy-backup-bundle:
        title: Easy Backup
        intro: Với một click chuột, bạn sẽ tạo ra một bản backup đầy đủ môi trường Kimai của bạn
    neontribe-chrome-plugin:
        title: ChromePlugin cho Kimai Bridge
        intro: Cho phép thời gian được log từ các vé ChromePlugin vào một bản Kimai.
    pcsg-recurring-budget-bundle:
        title: Chi phí thường xuyên
        intro: Tự động thêm tiền hoặc thời gian vào kinh phí dự án của bạn theo chu kỳ lặp lại với thời gian chu kỳ tùy chỉnh.
    cloudrizon-kimai-mobile-app-ios:
        title: Kimai Mobile (iOS)
        intro: Truy cập Kimai từ thiết bị iOS của bạn với Kimai Mobile
    ticesoftware-kimaibar-macos-client:
        title: KimaiBar – ứng dụng menu bar chạy native trên macOS
        intro: Theo dõi thời gian bằng app menu bar chạy native trên macOS KimaiBar và nhận thông báo khi không hoạt động.
    owlysk-codetimer:
        title: CodeTimer Desktop
        intro: App desktop cho Kimai (Windows, Mac & Linux)
    helsinkisystems-budgetwatcher:
        title: Công cụ theo dõi kinh phí (budget)
        intro: Nhận thông báo mỗi khi có một lượng kinh phí nhất định của dự án của bạn đã được sử dụng
    controlling:
        title: "Giờ làm việc, đi chơi lễ, ốm, ngày lễ công cộng"
        intro: "Employee management: Working hours & overtime. Vacations, sickness and PTO. Public holiday management and calendar integration. Monthly approvals with PDF."
    helsinkisystems-lexoffice:
        title: Lexoffice Invoice Sync
        intro: Whenever an invoice is created in Kimai this plugin automatically creates a Lexoffice invoice.
    simonschaufi-customer-email-report-bundle:
        title: Report email khách hàng
        intro: Gửi email đến khách hàng để báo về thời gian làm việc của bạn
    lnngyn-period-insert-bundle:
        title: Chèn Period
        intro: Tạo ra lượt vào trong một khoảng thời gian nhất định
    customer-portal:
        intro: Chia sẻ thống kê về đối tác và dự án và bảng chấm công với bất kỳ ai bằng URL bí mật, có thể được bảo vệ bằng mật khẩu hoặc không.
        title: Cổng khách hàng
    owlysk-codetimer-mobile:
        intro: Android client dành cho Kimai (miễn phí và mã nguồn mở)
        title: CodeTimer Mobile
    eon-timer:
        title: Eon Timer
        intro: Theo dõi thời gian trên Mac, tích hợp với Kimai một cách liền mạch – Cả tại chỗ (On-Premise) và trên Cloud.
    playmoweb-kimtrack:
        title: KimTrack
        intro: Desktop client dành cho macOS, Windows, và Linux để theo dõi thời gian từ thanh menu của bạn.
    potx8o-kimai-vscode:
        title: VSCode / VSCodium
        intro: Extension từ VSCode để bắt đầy và ngừng thời gian của bạn
    foraum-kimai-clock:
        intro: App trên thanh menu của MacOS để theo dõi thời gian với Kimai
        title: KimaiClock
    dolux-swiss-qr-bundle:
        intro: Mã QR Thụy Sĩ cho QR-invoice của bạn.
        title: QR-Invoices cho Thụy Sĩ
    drthomasentner-timai:
        intro: Client Kimai trên iOS, theo dõi thời gian trên iPhone và iPad
        title: Timai
    kleinitsolutions-teams-integration:
        intro: Giúp sắp xếp các file liên quan đến dự án trong Microsoft Teams
        title: Tích hợp Microsoft Teams
    simple-accounting-bundle:
        intro: Track billable work vs. invoiced amounts and manual adjustments per project.
        title: Simple Accounting
