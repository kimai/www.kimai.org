    agency:
        features:
            introduction: Nem todas as ferramentas de controlo de tempo são iguais. As melhores soluções para agências oferecem um conjunto especializado de recursos para agilizar os seus fluxos de trabalho.
            title: Recursos do Kimai mais usados por agências
        testimonials:
            tag: Agência
            introduction: No Kimai, desenvolvemos a nossa plataforma de controlo de tempo para atender às necessidades de agências, equipas e profissionais autônomos. A nossa interface intuitiva e os seus recursos poderosos ajudam agências como a sua a trabalhar de forma mais inteligente e lucrativa. Agora pode "ouvir" as opiniões dos utilizadores reais.
            title: O que as agências dizem sobre o controlo de tempo
        about:
            title: Primeiros passos para um melhor controlo de tempo
            introduction: |
                Já deu os seus primeiros passos e temos certeza que pode fazer uma escolha bem informada. O que mais considerar para escolher o melhor software de controlo de tempo? Alguns fornecedores oferecem versões gratuitas, que podem ter limitações, enquanto outros oferecem demonstrações gratuitas, períodos de teste ou opções de preço com base no tamanho do negócio ou na quantidade de utilizadores.

                No Kimai, oferecemos um período de teste gratuito para que possa explorar a nossa solução antes de decidir se precisa de mais utilizadores, recursos ou plug-ins. Experimente gratuitamente hoje e tenha um dia de trabalho mais organizado!
        title: Controlo de tempo para agências
        cta:
            title: Ready to start tracking time in your agency?
        name: Agências
        introduction: |
            Dirige uma agência — seja de marketing, RP, design, consultoria, RH ou arquitetura? Depois sabe o quanto o controlo de tempo é importante para o seu negócio. Registar as horas dos funcionários e o tempo dedicado aos projetos dos clientes é essencial para faturar com precisão, perceber a lucratividade e gerir a sua equipa em crescimento.

            Mas gerir o controlo de tempo com planilhas e ferramentas desconectadas pode rapidamente virar uma bagunça, especialmente conforme a sua agência cresce. É aí que uma solução dedicada de controlo de tempo pode fazer toda a diferença.

            Vamos explorar por que agências bem-sucedidas confiam em softwares de controlo de tempo e quais são os recursos essenciais a procurar. Usaremos o Kimai como exemplo de uma solução intuitiva pensada para agências.
        intro: Libere o potencial de lucratividade em agências em crescimento com um sistema escalável de controlo de tempo
        subtitle: A chave para a lucratividade
    lawyer:
        about:
            title: Primeiros passos para um melhor controlo de tempo no seu escritório
            introduction: |
                Sabemos que testar um software novo na área jurídica pode parecer assustador. Por isso oferecemos um período de teste gratuito e sem compromisso, um processo de integração simples, um conjunto flexível de recursos que cresce com o seu escritório ou a sua equipa e apoio dedicado.

                Acreditamos que mesmo durante um período de teste gratuito é possível encontrar uma forma de parar de brigar com planilhas. Experimente o Kimai hoje e tenha um dia bem organizado!
        features:
            title: Recursos do Kimai preferidos por escritórios de advocacia
            introduction: O Kimai foi pensado especificamente para profissionais do direito. Criamos uma ferramenta de controlo de tempo que fala a sua língua – simples, confiável, em conformidade com a LGPD/GDPR e focada em fazer o seu dia de trabalho mais leve.
        testimonials:
            introduction: No Kimai, profissionais do direito e consultores sempre foram o nosso foco. Agora pode conferir a experiência real dos nossos utilizadores.
            title: Opiniões sobre controlo de tempo dos nossos clientes
        title: Controlo de tempo para advogados
        intro: Esqueça as planilhas complexas e foque em entregar serviços jurídicos excepcionais com soluções modernas de controlo de tempo
        subtitle: Foque nas horas faturáveis, não em planilhas complicadas
        name: Advogados
        introduction: |
            No mundo acelerado dos serviços jurídicos, o tempo é o seu ativo mais valioso. Escritórios de advocacia, advogados independentes e equipas jurídicas precisam de uma solução de controlo de tempo adaptada às necessidades específicas da sua profissão. No Kimai, percebemos que o seu foco deve estar em entregar serviços jurídicos excepcionais — e não em lutar com planilhas complicadas.

            Registar horas manualmente, manter planilhas intermináveis e lidar com processos de exportação complexos toma um tempo valioso que poderia ser dedicado à sua assessoria jurídica. Descubra como um controlo de tempo eficiente pode ajudá-lo a focar no que realmente importa.
        cta:
            title: Ready to revolutionize time tracking in your practice?
    software-developers:
        features:
            title: Recursos do Kimai usados por engenheiros de software
            introduction: Descubra o conjunto perfeito de recursos adaptado às suas tarefas e objetivos. E se a sua equipa de TI precisar não só de um controlo de tempo simples, mas de uma solução robusta com diferentes opções de integração e recursos avançados de faturamento e análise?
        title: Controlo de tempo para programadores de software
        about:
            introduction: |
                Escolher o controlo de tempo certo geralmente começa pela decisão entre uma versão gratuita ou uma demonstração. O preço também é um fator importante, então busque opções que cresçam com a sua equipa.

                No Kimai, oferecemos um período de teste gratuito para explorar a nossa solução antes de decidir se precisa de recursos ou plug-ins adicionais. Com preços a partir de apenas € 0,99 por utilizador em alguns setores, é uma opção acessível. Experimente gratuitamente hoje e traga mais organização para o seu dia de trabalho!
            title: Primeiros passos para um melhor controlo de tempo
        subtitle: Maximize a sua produtividade
        cta:
            title: |
                Pronto para experimentar uma nova forma
                de controlar o tempo na sua equipa de TI?
        testimonials:
            title: Profissionais de TI falam sobre controlo de tempo
            introduction: No Kimai, desenvolvemos a nossa plataforma de controlo de tempo pensando nas necessidades de programadores individuais, equipas de desenvolvimento e departamentos de TI. A nossa abordagem é focada em construir soluções de código aberto para equipas técnicas de todos os tamanhos e em diferentes setores. Pode conferir o tipo de feedback que recebemos dos nossos utilizadores da área de tecnologia.
        name: Programadores de software
        intro: Maximize a produtividade da equipa e alcance o equilíbrio entre trabalho e vida pessoal com um controlo de tempo inteligente
        introduction: |
            Conhecemos bem esta dor — horas extras intermináveis, prazos estressantes, bugs que consomem horas e a constante luta para que gerentes de projeto e clientes valorizem o esforço real por trás do seu código. É um ciclo vicioso que pode rapidamente levar ao burnout e prejudicar o seu equilíbrio entre trabalho e vida pessoal. Este é um desafio comum para programadores, programadores, engenheiros e outros profissionais da área de tecnologia.

            Mas existe uma forma de quebrar este ciclo e retomar o controlo do seu tempo e das suas tarefas. Com as ferramentas certas, pode maximizar a sua produtividade e obter insights valiosos sobre os seus projetos. Seja você um programador autônomo, parte de uma startup ou responsável por um departamento de TI inteiro, encontrar uma solução escalável com os recursos certos é essencial. Vamos explorar o Kimai — um software de controlo de tempo intuitivo e poderoso — como exemplo.
    consultants:
        features:
            title: Recursos do Kimai mais usados por consultores
            introduction: Seja você um profissional autônomo ou parte de um grande departamento de consultoria, o Kimai oferece ferramentas para escalar conforme o seu negócio cresce.
        about:
            title: Primeiros passos para um melhor controlo de tempo na consultoria
            introduction: |
                Para aproveitar ao máximo o seu software de controlo de tempo, comece a explorar todos os recursos por meio de uma demonstração ou de um período de teste gratuito. Como consultor, provavelmente vai avaliar com cuidado as opções de preço e pensar com antecedência nos recursos que poderá precisar conforme o seu negócio crescer.

                No Kimai, percebemos esta jornada. Por isto oferecemos um período de teste gratuito que permite experimentar a nossa solução antes de decidir quais recursos ou plug-ins adicionais funcionam melhor para si. A nossa app tudo-em-um cresce junto com o seu negócio — pode adicionar extensões facilmente sempre que precisar. Experimente gratuitamente hoje e tenha um dia bem organizado!
        subtitle: Maximize as horas faturáveis e a eficiência
        name: Consultores
        title: Controlo de tempo para consultores
        testimonials:
            introduction: No Kimai, construímos a nossa plataforma para atender tanto consultores individuais quanto grandes equipas. Como solução tudo-em-um, o Kimai conta com a confiança de empresas de todos os tamanhos em vários setores. Confira o que os nossos utilizadores da área de consultoria têm a dizer.
            title: Insights sobre controlo de tempo por profissionais de consultoria
        intro: Aumente a lucratividade e entregue mais valor aos clientes com um controlo de tempo estratégico para a excelência em consultoria
        introduction: |
            No dinâmico cenário atual da consultoria — seja consultoria de gestão, assessoria financeira, serviços de TI, ciência de dados, consultoria jurídica, serviços psicológicos ou consultoria de RH — uma verdade permanece constante: o tempo é o seu ativo mais valioso. O controlo preciso do tempo não se trata apenas de registar horas. Trata-se de maximizar a lucratividade e entregar valor aos seus clientes.

            Sejamos sinceros — gerir projetos de consultoria não é fácil. Os membros da sua equipa podem estar trabalhando em Nova York, Londres e Singapura ao mesmo tempo. É muita coisa para acompanhar! Além disso, precisa saber exatamente quem trabalhou em quê para faturar corretamente os seus clientes. Sem um bom controlo de tempo, as coisas podem ficar enevoadas rapidamente. Precisa controlar os custos dos projetos, manter-se em conformidade com as regulamentações e garantir que o tempo da sua equipa seja bem aproveitado.

            Por isto, as ferramentas tudo-em-um de controlo de tempo fizeram-se indispensáveis para consultores. Elas transformam todo este possível caos em dados claros e organizados que ajudam o seu negócio a prosperar. Vamos explorar como uma solução completa como o Kimai pode transformar a sua consultoria.
        cta:
            title: |
                Pronto para experimentar uma nova forma
                de controlar o tempo na sua consultoria?
    freelancers:
        name: Profissionais autônomos
        testimonials:
            introduction: "Não confie só na nossa palavra. Veja o que outros profissionais autônomos dizem:"
            title: O que outros profissionais contam sobre controlar o tempo com o Kimai
        features:
            title: 'Features loved by freelancers '
            introduction: O Kimai foi pensado para ajudar solopreneurs a otimizar o seu fluxo de trabalho. Seja a gerir vários clientes ou lidando com diferentes projetos, o Kimai oferece as ferramentas necessárias para se manter organizado e lucrativo.
        introduction: |
            Quando ser autônomo é um capítulo novo na sua vida, precisa assumir novos papéis e enfrentar novos desafios. Um deles é a gestão do tempo e o equilíbrio entre as horas trabalhadas e a lucratividade dos seus projetos. Equilibrar vários projetos exige análise, tanto para você quanto para os seus clientes.

            Mas existem ferramentas que ajudam profissionais autônomos, prestadores de serviço, nômades digitais e solopreneurs a registar as horas faturáveis, faturar para os clientes sem dor de cabeça, gerir tarifas por hora e despesas, entre outros.

            Isso permite que se concentre no que ama — e receba o que realmente merece. Vamos ver como fazer isso com o Kimai como ferramenta de controlo de tempo para profissionais autônomos.
        cta:
            title: Ready to get the most of your time as a freelancer?
        title: Controlo de tempo para profissionais autônomos de sucesso
        about:
            title: Primeiros passos para uma melhor gestão de tempo
            introduction: |
                Está pronto para aproveitar os benefícios do Kimai? Oferecemos um período de teste gratuito para explorar todos os recursos antes de decidir qual software de controlo de tempo é o melhor para si como profissional independente.

                Cadastre-se hoje, comece a controlar o seu tempo literalmente com um clique e tenha um dia mais organizado!
        intro: Maximize a sua renda como solopreneur
    universities:
        cta:
            title: Ready to transform time management at your institution?
        subtitle: ' '
        testimonials:
            introduction: |
                No Kimai, desenvolvemos a nossa plataforma de controlo de tempo para atender às necessidades de agências, equipas e profissionais autônomos.
                A nossa interface intuitiva e os seus recursos poderosos ajudam agências como a sua a trabalhar de forma mais inteligente e lucrativa.
                Agora pode "ouvir" as opiniões dos utilizadores reais.
            title: O que os nossos clientes dizem
        name: Universidades
        introduction: |
            Gerir o tempo no ensino superior traz desafios únicos, incluindo a organização de aulas e palestras, o acompanhamento de projetos de pesquisa, a alocação de tempo de alunos e docentes e tarefas administrativas que consomem muito tempo.

            Soluções eficazes de controlo de tempo ajudam a agilizar estes processos, permitindo que educadores e pesquisadores se concentrem nas suas responsabilidades principais.
        features:
            title: Recursos para a gestão do tempo em toda a instituição
            introduction: |
                A nossa solução de controlo de tempo foi aprimorada com a colaboração de várias universidades. O feedback real dos utilizadores orienta o nosso desenvolvimento e garante recursos que realmente atendem às necessidades acadêmicas.

                Apenas para citar algumas das instituições acadêmicas que usam o Kimai: `Universität Hamburg`, `Universität Bonn`, `Universität Wien`, `Universität Stuttgart`, `Universität Frankfurt`, `University of Fribourg`, `TU Dresden` e a `University of Moscow`.
        about:
            title: Comece a sua jornada rumo a uma melhor gestão do tempo
            introduction: |
                Sabemos que implementar um novo sistema de controlo de tempo num ambiente acadêmico exige uma análise cuidadosa.
                Por isso oferecemos um período de teste gratuito e sessões de demonstração.
                Experimente o Kimai gratuitamente agora e tenha um dia mais organizado!
        intro: Transforme a eficiência da sua instituição com um controlo de tempo poderoso
        title: Controlo de tempo para o setor acadêmico
    non-profit:
        about:
            introduction: |
                If you represent a non-profit organization, please register with an official
                email address of your organization and send us a brief support message. The plan will be activated after manual review.

                In return, we ask for a testimonial with your logo and name, or an interview so we can feature you as a user.
            title: Our affordable non-profit plan for you
        introduction: |
            Today we say thank you to the many NGOs and NPOs:

            - Charitable and philanthropic organizations
            - Public and independent schools, universities, community colleges
            - Public safety agencies, emergency services, disaster relief, fire departments, civil protection
            - Conservation, sports, and all other clubs that foster community and teach skills
            - Social services, elderly care, and youth facilities
            - … and the many, many others we forgot to mention

            You give your time, create small and great wonders, and enrich the lives of so many: **Thank you for being there ❤️**

            As an organization grows, donations increase, and the first employees come on board, the need for structured time tracking becomes clear. Documenting workflows transparently helps identify opportunities for improvement early on – freeing up resources for your actual mission while laying the groundwork for transparent accountability reports.
        subtitle: Less administrative burden, so your mission stays in focus
        cta:
            title: |
                We want to help you
                simplify your time tracking
        title: Time Tracking for Non-Profit Organizations ✨
        features:
            title: Features that NPOs appreciate
            introduction: Kimai helps many non-profits gain insight into their projects while simplifying working time management. We have built a time tracking tool that speaks your language – simple, reliable, GDPR-compliant, and designed to make your daily work run more smoothly.
        testimonials:
            title: What other NPOs say about Kimai
            introduction: |
                Thanks to Kimai's open-source roots, we see ourselves as part of the broader non-profit movement that spans so many fields and sectors.
                We are happy to support you!
        intro: We put your work and vision center stage while simplifying administration and billing
        name: Non-Profits
