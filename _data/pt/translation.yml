    name: Compare time tracker
    description: O Kimai é a melhor aplicação de rastreamento de tempo de código aberto disponível, não apenas para equipes orientadas por projetos. Veja como o Kimai se compara às soluções alternativas de rastreamento de tempo para que você possa escolher a certa para a sua organização.
feature:
    mobile-ready:
        name: "Pronto para aparelhos móveis"
        description: "O layout é totalmente responsivo, feito para desktop e uso móvel. Cada utilizador pode configurar as colunas dos dados que devem ser mostrados, para evitar a rolagem horizontal em aparelhos pequenos por exemplo."
    plugins:
        name: "Plug-ins"
        description: "O Kimai foi desenvolvido para ser extensível e os recursos podem ser adicionados através de plug-ins. Os programadores que desejam criá-los podem usar muitos pontos de extensão."
    multi-user:
        name: "Multiutilizador"
        description: "O Kimai pode ser usado por quantos utilizadores quiser: cada instalação não possui um limite de utilizadores e com diferentes funções (consulte permissões)."
    multi-language:
        name: "Vários idiomas"
        description: "O Kimai pode ser localizado em qualquer idioma e já está traduzido para mais que 30 línguas."
    teams:
        name: "Equipas"
        description: "O Teams conecta os utilizadores em grupos lógicos, como departamentos. Limite o acesso aos dados atribuindo clientes e projetos às suas equipas."
    customers:
        name: "Clientes"
        description: "Gira os seus clientes e defina um endereço, um país, uma moeda, visibilidade (para arquivamento), contatos e muitos outros campos."
    projects:
        name: "Projetos"
        description: "Gira os projetos para cada cliente com número de pedido, orçamento e visibilidade (para arquivamento)."
    activities:
        name: "Atividades"
        description: "As atividades são usadas para atribuir a unidade de trabalho aos registos da planilha de horas. Gira atividades para cada projeto com número de pedido, orçamento e visibilidade (para arquivamento) ou crie atividades globais para evitar duplicatas."
    invoices:
        name: "Faturamento"
        description: "Modelos de fatura configuráveis, opções para agrupamento de entradas, números de fatura configuráveis e vários formatos, como PDF e DOCX."
    export:
        name: "Exportar dados"
        description: "Os dados da planilha de horas podem ser exportados e partilhados nos formatos XLSX, PDF, CSV e HTML. Os registos exportados podem ser bloqueados e protegidos contra alterações posteriores."
    expenses:
        name: "Despesas"
        description: "Compre o plug-in e acompanhe as despesas com base no cliente, no projeto e na atividade - para a categorização e para a inclusão nas suas faturas."
    saml:
        name: "SAML"
        description: "Faça login e registe utilizadores com SAML por meio do seu provedor de identidade SSO existente, como Google Workspace, Authentik ou Azure Ative Directory."
    api:
        name: "API JSON"
        description: "Apresenta uma extensa API JSON para leitura e gravação de dados, para que apps externos e ferramentas personalizadas possam comunicar com o Kimai."
    ldap:
        name: "LDAP"
        description: "Conecte o Kimai com o servidor da sua empresa (LDAP ou Active Directory) e use a sua própria infraestrutura de autenticação."
    statistics:
        name: "Estatísticas"
        description: "O seu painel mostrará várias estatísticas sobre os tempos registados e a quantidade dos dados coletados. E sempre poderemos adicionar mais gráficos!"
    docker:
        name: "Docker"
        description: "Temos imagens do Docker para desenvolvimento e diferentes variações de configurações do Docker-Compose para uso em produção."
    migrate-v1:
        name: "Migração"
        description: "Os dados do Kimai v1 podem ser importados, para uma migração perfeita do seu rastreador de tempo."
    active-entries:
        name: "Quantidade de registos ativos"
        description: "Pode fazer registos em paralelo quantas vezes quiser, ou, limite-os para apenas um."
    am-pm-format:
        name: "Formato AM/PM"
        description: "O Kimai usa uma versão localizada do formato de 24 horas. Mas se está acostumado com o formato AM/PM, também poderá configurá-lo."
    time-clock:
        name: "Relógio de ponto"
        description: "Não deseja que os seus utilizadores registem um quadro de horários arbitrários? Mude para o modo relógio-de-ponto, isso permite apenas os registos “de entrada” e “de saída”."
    duration-only:
        name: "Apenas duração"
        description: "Se as leis locais exigirem que mostre apenas as durações em vez da data e hora de início e término, pode ativar esse modo globalmente."
    rates:
        name: "Cálculo da taxa"
        description: "As taxas podem ser calculadas com base em valores horários e valores fixos, configuráveis para clientes, para projetos, para atividades e para cada registo individual no quadro de horários."
    timesheet-filter:
        name: "Filtro do quadro de horários"
        description: "Pode filtrar todos os registos de tempo por utilizador, por cliente, por projeto, por atividade e pela data."
    permissions:
        name: "Permissões"
        description: "Estrutura de permissões personalizáveis. Atribua diferentes funções ao seu utilizador, por exemplo, os utilizadores podem registar tempos, os líderes de equipa podem imprimir faturas e configurar os projetos/atividades, os administradores podem configurar os utilizadores e os clientes."
    user-profile:
        name: "Perfil do utilizador"
        description: "Estatísticas pessoais e configurações individuais para a taxa horária, para o tema do Kimai, para a palavra-passe e o avatar."
    password-reset:
        name: "Redefinir a palavra-passe"
        description: "Esqueceu-se da sua palavra-passe? O Kimai ajuda-o a redefini-la via e-mail."
    2fa:
        name: Autenticação de Dois Fatores (2FA)
        description: 'O Kimai oferece suporte à autenticação de dois fatores com tokens TOTP: proteja suas contas de usuário hoje!'
    auth:
        description: O Kimai oferece apoio a provedores de identidade externos e login via LDAP e SAML em vários provedores (como Google Workspace, Azure AD ou Authentik). A autenticação de dois fatores por meio de tokens TOTP é uma opção.
        name: Autenticação e Segurança
    reporting:
        description: Análise dos tempos registados por utilizadores, clientes, projetos, atividades, etiquetas, períodos de tempo e muito mais.
        name: Relatórios e análises
    dark-mode:
        name: Modo escuro
        description: Porque todas as apps precisam de um modo escuro, que ajuda a reduzir o cansaço visual à noite ou em ambientes escuros.
    customer-portal:
        description: Partilhe as estatísticas dos clientes, de projetos e de planilhas de horas com qualquer pessoa usando um URL secreto, opcionalmente protegido por palavra-passe.
        name: Portal do cliente
    no-limits:
        name: Não há limites
        description: "O seu software SaaS tem limites? O Kimai não. Paga apenas pela quantidade de utilizadores ativos. Não o limito nem cobro por utilizadores inativos. Com ele, pode criar uma quantidade ilimitada de utilizadores, clientes, projetos, atividades, planilhas de horas e muito mais."
    security:
        points:
            security_6: Teste de código automatizado com uma cobertura acima de 90%
            security_4: Integração contínua com centenas de verificações
            security_1: Hash de palavra-passe segura com Argon2 ou Sodium
            security_5: Revisões detalhadas do código
            security_3: Proteções CSRF e XSS
            security_2: Funções de utilizador granulares que restringem o acesso
        description: O Kimai implementa as práticas recomendadas no design de aplicações para evitar ataques comuns. Os controlos de segurança automatizados são essenciais para qualquer fluxo de trabalho de desenvolvimento de software para reduzir o tempo entre a criação e a detecção de defeitos. Estas varreduras são executadas em cada alteração de código, sempre.
        name: A segurança no Kimai
    security-cloud:
        points:
            security_1: Todas as conexões são protegidas por TLS (SSL)
            security_2: Melhores práticas de segurança, firewalls e prevenção contra força bruta
            security_6: O código é executado em ambientes de domínio bem restrito
            security_3: Sem multilocação, cada cliente tem a sua própria base de dados
            security_4: Os servidores são hospedados num data center na UE
            security_5: Os serviços essenciais não são acedáveis ao mundo externo
        name: Segurança na plataforma
        description: O software é tão seguro quanto o sistema onde é executado. Adoto uma abordagem de defesa completa com infraestrutura de servidor e rede. Os clientes hospedados na plataforma são protegidos por várias camadas de segurança.
    privacy:
        name: A privacidade vem em primeiro lugar
        description: Respeito a privacidade dos utilizadores e a sua. Não, esta não é mais uma introdução enfadonha a uma política de privacidade; é assim que administro este negócio. Não vendo dados. Sigo o GDPR e responderei a qualquer pergunta sobre subprocessadores envolvidos.
    electronic-invoicing:
        name: Faturas eletrônicas
        description: Crie faturas eletrônicas nos formatos XML e PDF/A, em conformidade com EN 16931, XRechnung 3.0, Zugferd/Factur-X e usando a sintaxe CII e UBL
    eu-hosting:
        description: Independente e europeu 🇪🇺 – desenvolvido na Áustria 🇦🇹 e hospedado na Alemanha 🇩🇪
        name: Hospedagem na UE
install:
    alert-vps: Nesta fase, não é possível instalar o Kimai descarregando um ficheiro ZIP e enviando os ficheiros para o seu servidor web. Isso ocorre porque o Composer precisa ser executado via linha de comando. Isso não significa necessariamente que precisa de um VPS. Alguns hosts compartilhados fornecem acesso SSH, por meio do qual poderá instalar o Composer e o Kimai sem maiores problemas.
    ssh: Este método instala o Kimai diretamente no seu servidor.
    cloud: Não é necessário instalar o Kimai, você pode começar a usá-lo agora mesmo.
    docker: Use nossa Docker image para instalar e atualizar o container do Kimai facilmente.
    kubernetes: Pode implantar Kimai para Kubernetes através dos nossos Helm-Charts.
    caddy-docker: Usando o Docker-Compose e o Caddy como proxy reverso com apoio ao SSL.
