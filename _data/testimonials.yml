    text: |
        We have been using Kimai for time tracking at Pulse of Europe for quite some time now and are extremely satisfied with the experience.

        As a non-profit, pro-European citizens' movement, we coordinate a wide range of projects, campaigns and activities involving both staff members and volunteers. Having a reliable and transparent time-tracking solution is therefore essential for our daily work.

        What particularly impresses us about Kimai is its simple and intuitive user experience. Working hours can be recorded quickly and easily, while projects and tasks can be clearly categorised and flexibly filtered. This allows us to maintain an overview even across multiple teams, projects and responsibilities.

        Kimai helps us make our internal processes more transparent and efficient – both in our day-to-day operations and when evaluating project-related working hours.

        For organisations and teams looking for a powerful yet user-friendly time-tracking solution, we can wholeheartedly recommend Kimai.
