    rating: 5
    name: Frank
    position: Service
    company: 'Roptec GmbH'
    url: 'https://roptec.com/'
    text: "When I started to identify a time reporting software for our medium size enterprise (~30 people distributed all over United States and Canada) in the software service industry for onsite and remote services, I had several programs in my mind. In my specification I had the following things to be covered\n- Customer related time reporting\n- Project related time reporting\n- Time approval\n- Various hierarchies in user and access levels\n- Open data interface for potential interfaces to other software packages (such as various payroll software packages for Canada and US, ERP for invoicing) \n- Time budget for hourly packages\n- Time reporting to customers with time budget\n- The data is mine and I always want to have access to it\n- I would like to create plugins if I need to add features that do not yet exist\n\nI continued my search but always came back to Kevin Papst’s time reporting software Kimai. So I installed it on a shared host. I continued to set up a few users and imported a few customers, projects and finally understood how activities are to be set up (global and local). This is a feature that surprised me even more. Well implemented! I finally rolled it out to a small group and then the entire team. The time reporting is now fully implemented within 2 months from first idea to fully operational. \n\nThen the demands grow with the possibilities: I purchased a few plugins and these were installed as simple as the main software. Then, when I had even more requests that I didn’t find an answer by plugins, I reached out to the developer Kevin asking for help with changing a report and he simply answered to consider this for the entire software, not just a module for me. It may be within some of the next releases.\n\nIn summary, <mark>Kimai is a flexible time reporting package with active code, modern, responsive and fast user interface and a fast responding support</mark>.\n\nThanks, Kevin, for this nice software package!"
    translations:
        en: "When I started to identify a time reporting software for our medium size enterprise (~30 people distributed all over United States and Canada) in the software service industry for onsite and remote services, I had several programs in my mind. In my specification I had the following things to be covered\n- Customer related time reporting\n- Project related time reporting\n- Time approval\n- Various hierarchies in user and access levels\n- Open data interface for potential interfaces to other software packages (such as various payroll software packages for Canada and US, ERP for invoicing) \n- Time budget for hourly packages\n- Time reporting to customers with time budget\n- The data is mine and I always want to have access to it\n- I would like to create plugins if I need to add features that do not yet exist\n\nI continued my search but always came back to Kevin Papst’s time reporting software Kimai. So I installed it on a shared host. I continued to set up a few users and imported a few customers, projects and finally understood how activities are to be set up (global and local). This is a feature that surprised me even more. Well implemented! I finally rolled it out to a small group and then the entire team. The time reporting is now fully implemented within 2 months from first idea to fully operational. \n\nThen the demands grow with the possibilities: I purchased a few plugins and these were installed as simple as the main software. Then, when I had even more requests that I didn’t find an answer by plugins, I reached out to the developer Kevin asking for help with changing a report and he simply answered to consider this for the entire software, not just a module for me. It may be within some of the next releases.\n\nIn summary, <mark>Kimai is a flexible time reporting package with active code, modern, responsive and fast user interface and a fast responding support</mark>.\n\nThanks, Kevin, for this nice software package!"
        de: "Als ich begann, eine Zeiterfassungssoftware für unser mittelständisches Unternehmen (~30 Personen, verteilt über die gesamten USA und Kanada) in der Software-Dienstleistungsbranche für Vor-Ort- und Remote-Services zu suchen, hatte ich mehrere Programme im Kopf. In meinem Anforderungskatalog mussten folgende Punkte abgedeckt sein:\n- Kundenbezogene Zeiterfassung\n- Projektbezogene Zeiterfassung\n- Zeitfreigabe\n- Verschiedene Hierarchien in Benutzer- und Zugriffsebenen\n- Offene Datenschnittstelle für mögliche Anbindungen an andere Softwarepakete (wie verschiedene Lohnbuchhaltungsprogramme für Kanada und die USA, ERP für die Rechnungsstellung)\n- Zeitbudget für Stundenpakete\n- Zeiterfassung gegenüber Kunden mit Zeitbudget\n- Die Daten gehören mir und ich möchte jederzeit darauf zugreifen können\n- Ich möchte Plugins erstellen können, wenn ich noch nicht vorhandene Funktionen ergänzen muss\n\nIch setzte meine Suche fort, kam aber immer wieder auf Kevin Papsts Zeiterfassungssoftware Kimai zurück. Also installierte ich sie auf einem Shared Host. Ich richtete einige Benutzer ein, importierte einige Kunden und Projekte und verstand schließlich, wie Aktivitäten einzurichten sind (global und lokal). Diese Funktion hat mich besonders überrascht. Gut umgesetzt! Schließlich habe ich sie für eine kleine Gruppe und dann für das gesamte Team eingeführt. Die Zeiterfassung ist jetzt innerhalb von 2 Monaten von der ersten Idee bis zur vollständigen Betriebsbereitschaft komplett implementiert.\n\nDann wachsen die Anforderungen mit den Möglichkeiten: Ich habe einige Plugins gekauft, und diese ließen sich genauso einfach wie die Hauptsoftware installieren. Als ich dann noch weitere Anfragen hatte, für die ich mit Plugins keine Lösung fand, wandte ich mich an den Entwickler Kevin und bat ihn um Hilfe bei der Änderung eines Berichts. Er antwortete einfach, dies für die gesamte Software in Betracht zu ziehen, nicht nur als Modul für mich. Es könnte in einem der nächsten Releases enthalten sein.\n\nZusammenfassend lässt sich sagen: <mark>Kimai ist ein flexibles Zeiterfassungspaket mit aktivem Code, einer modernen, responsiven und schnellen Benutzeroberfläche und einem schnell reagierenden Support</mark>.\n\nDanke, Kevin, für dieses tolle Softwarepaket!"
    date: '2024-05-02'
    tags: [OnPremise, Plugin, English, WallOfLove, Support]
    avatar: frank.webp
    logo: ''
    video: ''
    type: text
    source: senja
    origin: ''
