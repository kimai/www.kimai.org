    text: |
        Wir setzen KIMAI seit vielen Jahren ein, früher selbst-gehosted bei einem Internet-Provider, seit einiger Zeit in der Cloud. Das Daten-Modell passt hervorragend zu unserem Geschäftsfeld, in dem wir bestimmte Projekte nach Aufwand berechnen, andere zum Festpreis (budgetiert). Beide Abrechnungsmodelle werden von KIMAI unterstützt. Bei budgetierten Projekten behalten wir die Übersicht über den jeweiligen Verbrauch an Zeit und Kosten in Relation zum Budget (Burndown). Bei Projekten nach Aufwand exportieren wir monatlich oder quartalsweise alle abrechenbaren Zeiten mit den hinterlegten Stundensätzen als Grundlage für die Rechnungen, die wir mit einer anderen Faktura-/Buchhaltungs-Software erstellen.

        Neben dem aus meiner Sicht sehr praxisgerechten Daten-Modell und der logischen Struktur ist die Cloud-Lösung auch optisch und von der Handhabung her sehr gut gelungen, modern und intuitiv bedienbar. Ich finde alles dort, wo ich es erwarte. Zahlreiche kleine Features, etwa das Ausblenden von Spalten oder die Filter-Möglichkeiten, erleichtern die Arbeit. Zudem ist erheblich viel konfigurierbar, so dass ich nicht gezwungen werde, meine Prozesse an KIMAI anzupassen, sondern ich kann KIMA an meine Bedürfnisse anpassen.

        Der Support reagiert sehr schnell. Zudem konnte ich schon mehrere Vorschläge einbringen, die tatsächlich zeitnah eingeflossen sind. In dieser Umsetzungsstärke habe ich es bisher bei keinem anderen Anbieter von Cloud-Lösungen erlebt.

        Aus Überzeugung und unentgeltlich habe ich es befreundeten Geschäftspartnern aus ganz anderen Branchen gezeigt, empfohlen und sie bei der Einrichtung unterstützt.

        Aus meiner Sicht eine absolute Empfehlung, sehr professionell und gut durchdacht. Man merkt der Software die Reife und dem Hersteller die Erfahrung in diesem Gebiet an.
