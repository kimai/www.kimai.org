    position: 'Backend Developer'
    company: 'Cyber Fortress'
    url: 'https://cyberfortress.gr'
    text: "I've always preferred self-hosting services, but when I discovered Kimai, I saw the value in their free cloud plan. Wanting to support the developers (being a developer myself), I upgraded to the paid version, and it’s been worth every penny.\n\nRecently, I made a mistake that almost wiped out all my data. Despite my plan not officially including support, Kimai's team was there for me. <mark>They responded quickly and had my issue resolved within half an hour, saving me from a potential disaster.</mark>\n\nAs a freelancer, Kimai has become an essential tool for managing clients, projects, and tasks. It lets me track time accurately and create professional invoices effortlessly. For anyone looking to stay organized and efficient, I highly recommend Kimai."
    translations:
        en: "I've always preferred self-hosting services, but when I discovered Kimai, I saw the value in their free cloud plan. Wanting to support the developers (being a developer myself), I upgraded to the paid version, and it’s been worth every penny.\n\nRecently, I made a mistake that almost wiped out all my data. Despite my plan not officially including support, Kimai's team was there for me. <mark>They responded quickly and had my issue resolved within half an hour, saving me from a potential disaster.</mark>\n\nAs a freelancer, Kimai has become an essential tool for managing clients, projects, and tasks. It lets me track time accurately and create professional invoices effortlessly. For anyone looking to stay organized and efficient, I highly recommend Kimai."
        de: "Ich habe schon immer selbst gehostete Dienste bevorzugt, aber als ich Kimai entdeckte, erkannte ich den Wert ihres kostenlosen Cloud-Tarifs. Da ich die Entwickler unterstützen wollte (da ich selbst Entwickler bin), habe ich auf die kostenpflichtige Version umgestellt, und das war jeden Cent wert.\n\nVor kurzem ist mir ein Fehler unterlaufen, der fast alle meine Daten ausgelöscht hätte. Obwohl mein Tarif offiziell keinen Support beinhaltet, war das Team von Kimai für mich da. <mark>Sie reagierten schnell und hatten mein Problem innerhalb einer halben Stunde gelöst, wodurch sie mich vor einer potenziellen Katastrophe bewahrten.</mark>\n\nAls Freiberufler ist Kimai für mich zu einem unverzichtbaren Werkzeug für die Verwaltung von Kunden, Projekten und Aufgaben geworden. Damit kann ich meine Arbeitszeit genau erfassen und mühelos professionelle Rechnungen erstellen. Allen, die organisiert und effizient arbeiten möchten, kann ich Kimai wärmstens empfehlen."
