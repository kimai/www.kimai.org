industries:
    name: Branchen
    agency:
        name: Agenturen
        title: "Zeiterfassung für Agenturen"
        subtitle: "Der Schlüssel zur Profitabilität"
        intro: "Erschließen Sie das Profitabilitätspotenzial wachsender Agenturen mit einem skalierbaren Zeiterfassungssystem"
        introduction: |
            Führen Sie eine Agentur – ob in den Bereichen Marketing, PR, Design, Beratung, HR oder Architektur? Dann wissen Sie, wie entscheidend Zeiterfassung für Ihr Geschäft ist. Die Erfassung von Arbeitszeiten Ihrer Mitarbeitenden und der Zeit für Kundenprojekte ist unverzichtbar, um korrekt abzurechnen, die Profitabilität zu verstehen und Ihr wachsendes Team zu steuern.

            Doch Zeiterfassung mit Tabellenkalkulationen und voneinander getrennten Tools wird schnell unübersichtlich, besonders wenn Ihre Agentur wächst. Genau hier kann eine dedizierte Zeiterfassungslösung den Unterschied machen.

            Schauen wir uns an, warum erfolgreiche Agenturen auf Zeiterfassungssoftware setzen und auf welche wesentlichen Funktionen Sie achten sollten. Dabei nutzen wir Kimai als Beispiel für eine benutzerfreundliche Lösung, die speziell für Agenturen entwickelt wurde.
        features:
            title: "Kimai-Funktionen, die von Agenturen am häufigsten genutzt werden"
            introduction: "Nicht alle Zeiterfassungstools sind gleich. Die besten Lösungen für Agenturen bieten einen spezialisierten Funktionsumfang, um Ihre Arbeitsabläufe effizienter zu gestalten."
        testimonials:
            title: "Was Agenturen über Zeiterfassung sagen"
            introduction: Bei Kimai haben wir unsere Zeiterfassungsplattform so entwickelt, dass sie die Anforderungen von Agenturen, Teams und Freiberuflern erfüllt. Unsere intuitive Benutzeroberfläche und leistungsstarken Funktionen helfen Agenturen wie Ihrer, smarter und profitabler zu arbeiten. Jetzt können Sie den Bewertungen echter Nutzer „zuhören“.
            tag: Agentur
        about:
            title: "Erste Schritte zu einer besseren Zeiterfassung"
            introduction: |
                Sie haben bereits die ersten Schritte gemacht, und wir sind sicher, dass Sie eine fundierte Entscheidung treffen können. Was sollten Sie außerdem berücksichtigen, um die beste Zeiterfassungssoftware auszuwählen? Manche Anbieter bieten kostenlose Versionen an, die Einschränkungen haben können, während andere kostenlose Demos, Testphasen oder Preisoptionen je nach Unternehmensgröße oder Anzahl der Nutzer anbieten.

                Bei Kimai bieten wir eine kostenlose Testphase an, damit Sie unsere Lösung kennenlernen können, bevor Sie entscheiden, ob zusätzliche Nutzer, Funktionen oder Plugins benötigt werden. Testen Sie es noch heute kostenlos und sorgen Sie für einen besser organisierten Arbeitsalltag!
        cta:
            title: |
                Sind Sie bereit,
                in Ihrer Agentur mit Zeiterfassung zu starten?
    consultants:
        name: Berater
        title: "Zeiterfassung für Berater"
        subtitle: "Maximieren Sie abrechenbare Stunden und Effizienz"
        intro: "Steigern Sie Profitabilität und Kundennutzen durch strategische Zeiterfassung für exzellente Beratungsleistungen"
        introduction: |
            In der heutigen dynamischen Beratungslandschaft – ob Sie in der Managementberatung, Finanzberatung, IT-Dienstleistung, Data Science, Rechtsberatung, psychologischen Beratung oder HR-Beratung tätig sind – bleibt eine Wahrheit konstant: Zeit ist Ihr wertvollstes Gut. Eine präzise Zeiterfassung bedeutet weit mehr, als nur Stunden zu protokollieren. Es geht darum, die Profitabilität zu maximieren und Ihren Kunden echten Mehrwert zu liefern.

            Seien wir ehrlich – Beratungsprojekte zu steuern ist nicht einfach. Ihre Teammitglieder arbeiten vielleicht gleichzeitig aus New York, London und Singapur. Da gibt es viel im Blick zu behalten. Außerdem müssen Sie genau wissen, wer woran gearbeitet hat, um Ihre Kunden korrekt abrechnen zu können. Ohne eine saubere Zeiterfassung wird es schnell unübersichtlich. Sie müssen Projektkosten kontrollieren, regulatorische Anforderungen einhalten und sicherstellen, dass die Zeit Ihres Teams sinnvoll eingesetzt wird.

            Deshalb sind All-in-One-Zeiterfassungslösungen für Berater unverzichtbar geworden. Sie verwandeln dieses potenzielle Chaos in klare, strukturierte Daten, die Ihrem Unternehmen helfen zu wachsen. Schauen wir uns an, wie eine umfassende Lösung wie Kimai Ihr Beratungsgeschäft verändern kann.
        features:
            title: "Kimai-Funktionen, die von Beratern am häufigsten genutzt werden"
            introduction: "Ob Sie Freelancer sind oder Teil einer großen Beratungsabteilung: Kimai bietet Ihnen Werkzeuge, mit denen Sie mit Ihrem wachsenden Unternehmen skalieren können."
        testimonials:
            title: "Einblicke in die Zeiterfassung von Beratungsprofis"
            introduction: Bei Kimai haben wir unsere Plattform so entwickelt, dass sie sowohl die Anforderungen einzelner Berater als auch großer Teams erfüllt. Als All-in-One-Lösung wird Kimai von Unternehmen jeder Größe in unterschiedlichsten Branchen genutzt. Hier erfahren Sie, was unsere Nutzer aus dem Beratungsumfeld sagen.
        about:
            title: "Erste Schritte zu besserer Zeiterfassung in der Beratung"
            introduction: |
                Um das Beste aus Ihrer Zeiterfassungssoftware herauszuholen, sollten Sie zunächst alle Funktionen in einer Demo oder kostenlosen Testphase kennenlernen. Als Berater werden Sie wahrscheinlich die Preisoptionen sorgfältig prüfen und frühzeitig überlegen, welche Funktionen Sie mit dem Wachstum Ihres Unternehmens benötigen könnten.

                Bei Kimai verstehen wir diesen Weg. Deshalb bieten wir eine kostenlose Testphase an, mit der Sie unsere Lösung ausprobieren können, bevor Sie entscheiden, welche zusätzlichen Funktionen oder Plugins für Sie am besten geeignet sind. Unsere All-in-One-App wächst mit Ihrem Unternehmen – Sie können Erweiterungen jederzeit bei Bedarf hinzufügen. Testen Sie Kimai noch heute kostenlos und bringen Sie mehr Struktur in Ihren Arbeitsalltag!
        cta:
            title: |
                Bereit, eine neue Art
                der Zeiterfassung in Ihrer Praxis auszuprobieren?
    freelancers:
        name: Freiberufler
        title: "Zeiterfassung für erfolgreiche Freelancer"
        intro: "Maximieren Sie Ihr Einkommen als Solo-Selbstständiger"
        introduction: |
            Wenn die Freelance-Tätigkeit ein neues Kapitel in Ihrem Leben ist, übernehmen Sie neue Rollen und stellen sich neuen Herausforderungen. Eine davon ist das Zeitmanagement und die Balance zwischen Ihren Arbeitsstunden und der Profitabilität Ihrer Projekte. Mehrere Projekte gleichzeitig zu steuern erfordert Analyse – sowohl für Sie selbst als auch für Ihre Kunden.

            Zum Glück gibt es Tools, die Freelancern, Auftragnehmern, digitalen Nomaden und Solo-Selbstständigen dabei helfen, abrechenbare Stunden zu erfassen, Kunden ohne Stress abzurechnen, Stundensätze und Ausgaben zu verwalten und vieles mehr.

            So können Sie sich auf das konzentrieren, was Sie lieben – und bekommen die Bezahlung, die Sie wirklich verdienen. Schauen wir uns an, wie Kimai Freelancer dabei als Zeiterfassungslösung unterstützt.
        features:
            title: "Funktionen, die Freelancer lieben"
            introduction: "Kimai wurde entwickelt, um Solo-Selbstständigen dabei zu helfen, ihre Arbeitsabläufe zu vereinfachen. Ob Sie mehrere Kunden gleichzeitig betreuen oder unterschiedliche Projekte verwalten – Kimai bietet Ihnen die Werkzeuge, um organisiert und profitabel zu arbeiten."
        testimonials:
            title: "Was andere Profis über Zeiterfassung mit Kimai sagen"
            introduction: "Verlassen Sie sich nicht nur auf unser Wort. Das sagen andere Freelancer:"
        about:
            title: "Erste Schritte zu besserem Zeitmanagement"
            introduction: |
                Sind Sie bereit, die Vorteile von Kimai kennenzulernen? Wir bieten eine kostenlose Testphase an, damit Sie alle Funktionen entdecken können, bevor Sie entscheiden, welche Zeiterfassungssoftware für Sie als unabhängiger Profi am besten geeignet ist.

                Melden Sie sich noch heute an, starten Sie Ihre Zeiterfassung mit nur einem Klick und bringen Sie mehr Ordnung in Ihren Arbeitsalltag!
        cta:
            title: |
                Bereit, als Freelancer
                das Beste aus Ihrer Zeit herauszuholen?
    lawyer:
        name: Anwälte
        title: "Zeiterfassung für Anwälte"
        subtitle: "Konzentrieren Sie sich auf abrechenbare Stunden, nicht auf komplizierte Stundenzettel"
        intro: "Verabschieden Sie sich von komplexen Stundenzetteln und konzentrieren Sie sich mit moderner Zeiterfassung auf erstklassige juristische Dienstleistungen"
        introduction: |
            In der schnelllebigen Welt juristischer Dienstleistungen ist Zeit Ihr wertvollstes Gut. Kanzleien, selbstständige Anwälte und Rechtsteams benötigen eine Zeiterfassungslösung, die auf die besonderen Anforderungen ihres Berufs zugeschnitten ist. Bei Kimai wissen wir, dass Ihr Fokus auf exzellenten juristischen Leistungen liegen sollte – nicht auf dem Kampf mit komplizierten Stundenzetteln.

            Manuelle Zeiterfassung, endlose Tabellenkalkulationen und aufwendige Exportprozesse kosten wertvolle Zeit, die Sie besser in die fachkundige Beratung Ihrer Mandanten investieren. Entdecken Sie, wie effiziente Zeiterfassung Ihnen hilft, sich auf das zu konzentrieren, was wirklich zählt.
        features:
            title: "Kimai-Funktionen, die Kanzleien lieben"
