    software-developers:
        name: Softwareentwickler
        title: "Zeiterfassung für Softwareentwickler"
        subtitle: "Maximieren Sie Ihre Produktivität"
        intro: "Maximieren Sie die Produktivität Ihres Teams und fördern Sie eine gesunde Work-Life-Balance mit intelligenter Zeiterfassung"
        introduction: |
            Wir kennen die Herausforderungen nur zu gut – endlose Überstunden, stressige Deadlines, zeitaufwendige Bugs und der ständige Kampf darum, dass Projektmanager und Kunden den tatsächlichen Aufwand hinter Ihrem Code wertschätzen. Das ist ein Teufelskreis, der schnell zu Burnout führen und Ihre Work-Life-Balance beeinträchtigen kann. Mit diesen Problemen sind Softwareentwickler, Programmierer, Ingenieure und andere IT-Fachkräfte nur allzu vertraut.

            Aber es gibt einen Weg, diesen Kreislauf zu durchbrechen und wieder mehr Kontrolle über Zeit und Aufgaben zu gewinnen. Mit den richtigen Werkzeugen können Sie Ihre Produktivität steigern und wertvolle Einblicke in Ihre Projekte erhalten. Ob Sie als freiberuflicher Programmierer arbeiten, Teil eines Startup-Teams sind oder eine ganze IT-Abteilung leiten – entscheidend ist eine skalierbare Lösung mit den passenden Funktionen. Schauen wir uns Kimai als Beispiel für eine benutzerfreundliche und leistungsstarke Zeiterfassungssoftware an.
        features:
            title: "Kimai-Funktionen für Softwareentwickler"
            introduction: "Entdecken Sie den passenden Funktionsumfang für Ihre Aufgaben und Ziele. Was, wenn Ihr IT-Team nicht nur einen einfachen Zeiterfasser braucht, sondern eine robuste Lösung mit verschiedenen Integrationsmöglichkeiten sowie erweiterten Funktionen für Rechnungen und Analysen?"
        testimonials:
            title: "IT-Profis über Zeiterfassung"
            introduction: Bei Kimai haben wir unsere Zeiterfassungsplattform gezielt für die Anforderungen einzelner Entwickler, Dev-Teams und IT-Abteilungen entwickelt. Unser Ansatz konzentriert sich auf Open-Source-Lösungen für Tech-Teams jeder Größe und aus verschiedensten Branchen. Hier sehen Sie, welches Feedback wir von Nutzern aus der IT erhalten.
        about:
            title: "Erste Schritte zu besserer Zeiterfassung"
            introduction: |
                Die Wahl des richtigen Zeiterfassungstools beginnt oft mit der Entscheidung zwischen einer kostenlosen Version und einer Demo. Auch die Preisgestaltung spielt eine wichtige Rolle – achten Sie daher auf Optionen, die mit dem Wachstum Ihres Teams skalieren.

                Bei Kimai bieten wir eine kostenlose Testphase an, damit Sie unsere Lösung kennenlernen können, bevor Sie entscheiden, ob zusätzliche Funktionen oder Plugins benötigt werden. Mit Preisen ab nur 0,99 € pro Nutzer für einige Branchen ist Kimai eine kostengünstige Wahl. Testen Sie es noch heute kostenlos und bringen Sie mehr Struktur in Ihren Arbeitsalltag!
        cta:
            title: |
                Bereit, eine neue Art
                der Zeiterfassung in Ihrem IT-Team auszuprobieren?
    universities:
        name: Universitäten
        title: "Zeiterfassung für den akademischen Sektor"
        subtitle: "Konzentrieren Sie sich auf die Berichterstellung, nicht auf Verwaltungsabläufe"
        intro: "Steigern Sie die Effizienz Ihrer Einrichtung mit leistungsstarker Zeiterfassung"
        introduction: |
            Zeitmanagement im Hochschulbereich bringt besondere Herausforderungen mit sich, darunter die Planung von Vorlesungen und Lehrveranstaltungen, die Nachverfolgung von Forschungsprojekten, die Zeiteinteilung von Studierenden und Mitarbeitenden sowie zeitaufwendige Verwaltungsaufgaben.

            Effektive Zeiterfassungslösungen helfen dabei, diese Prozesse zu vereinfachen, damit sich Lehrende und Forschende auf ihre eigentlichen Aufgaben konzentrieren können.
        features:
            title: "Funktionen für ein einrichtungsweites Zeitmanagement"
            introduction: |
                Unsere Zeiterfassungslösung wurde in Zusammenarbeit mit mehreren Universitäten weiterentwickelt. Echtes Nutzerfeedback treibt unsere Entwicklung voran und sorgt dafür, dass Funktionen entstehen, die akademische Anforderungen wirklich erfüllen.

                Nur einige der akademischen Einrichtungen, die Kimai nutzen, sind: `Universität Hamburg`, `Universität Bonn`, `Universität Wien`, `Universität Stuttgart`, `Universität Frankfurt`, `Universität Freiburg`, `TU Dresden` und die `Universität Moskau`.
        testimonials:
            title: "Was unsere Kunden sagen"
            introduction: |
                Bei Kimai haben wir unsere Zeiterfassungsplattform so entwickelt, dass sie die Anforderungen von Agenturen, Teams und Freiberuflern erfüllt.
                Unsere intuitive Benutzeroberfläche und leistungsstarken Funktionen helfen Organisationen wie Ihrer, effizienter und profitabler zu arbeiten.
                Jetzt können Sie den Bewertungen echter Nutzer „zuhören“.
        about:
            title: "Starten Sie in Richtung besseres Zeitmanagement"
            introduction: |
                Wir wissen, dass die Einführung eines neuen Zeiterfassungssystems im akademischen Umfeld sorgfältig abgewogen werden muss.
                Deshalb bieten wir eine kostenlose Testphase und Demo-Sessions an.
                Testen Sie Kimai jetzt kostenlos und bringen Sie mehr Struktur in Ihren Alltag!
