industry:
    more: 'மேலும் தொழில்கள்'
    title: 'ஒவ்வொரு தொழிலுக்கும் நேர கண்காணிப்பு'
    name: 'ஒவ்வொரு வணிகத்திற்கும் நேர கண்காணிப்பு'
    subtitle: 'கிமாயுடன் உங்கள் திட்டங்களை கண்காணிக்கவும்'
