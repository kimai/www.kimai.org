    use_case: 'உங்கள் தற்போதைய நேர கண்காணிப்பு தீர்வுக்கு மாற்றாக தேடுகிறீர்களா? நீங்கள் ஏன் மாற வேண்டும் என்று நாங்கள் நினைக்கிறோம்'
    compare_with: கிமாயை %பெயர் %உடன் ஒப்பிடுக
    alternative: '%தயாரிப்பு% மாற்று'
support:
    name: "உதவி"
    description: "உதவி தேவையா? கிமாயைப் பயன்படுத்த, நிறுவுதல் அல்லது புதுப்பிக்க உதவியைக் கண்டறியவும்."
    intro: "சில வாடிக்கையாளர்கள் கிமாயை உள்நாட்டில் இயக்க விரும்புகிறார்கள், ஆனால் தொழில்முறை ஆதரவை இழக்க விரும்பவில்லை. உங்களுக்கு உதவ நான் மகிழ்ச்சியடைகிறேன், சுய-ஓச்ட் செய்யப்பட்ட நிறுவல்களுக்கான உதவி திட்டத்தை வழங்குகிறேன்."
    community: "சமூகம்"
    community_cta: "கிட்அப்பைப் பார்வையிடவும்"
    community_intro: |
        இலவச, சுய-ஓச்ட் நிறுவல்களுக்கு மின்னஞ்சல் உதவி எதுவும் கிடைக்கவில்லை.

         கிதூப்பில் சமூக உதவி பொதுவாக விரைவாக பதிலளிக்கும். உங்கள் சிக்கல் ஏற்கனவே தீர்க்கப்பட்டுள்ளதா என்பதைப் பார்க்க ஏற்கனவே உள்ள சிக்கல்களைத் தேடுங்கள்.
    cloud: "முகில் வாடிக்கையாளர்கள்"
    cloud_cta: "ஒரு டிக்கெட்டை உருவாக்கவும்"
    cloud_intro: |
        முகில் வாடிக்கையாளர்களுக்கு பணம் செலுத்துவதற்கு மின்னஞ்சல் உதவி கிடைக்கிறது.

         முகில் வாடிக்கையாளர்கள் 24 மணி நேரத்திற்குள் பதில்களை எதிர்பார்க்கலாம், திங்கள் முதல் வெள்ளி வரை காலை 10 மணி முதல் மாலை 4 மணி வரை (பொது விடுமுறை நாட்களைத் தவிர).
    premium: "நேரடி தொடர்பு"
    premium_cta: "மேலும் அறிக"
    premium_intro: |
        வாடிக்கையாளர்களுக்கு பணம் செலுத்துவதற்கு மின்னஞ்சல் உதவி மற்றும் வீடியோ அழைப்புகள் கிடைக்கின்றன.

         நான் போட்டி விலையை வழங்குகிறேன், எனவே நீங்கள் உங்கள் வணிகத்தில் கவனம் செலுத்த முடியும். உங்கள் கிமாய் நிறுவலின் உங்கள் கேள்விகள், நிறுவல் மற்றும் மேம்படுத்தல்களுக்கு நான் உதவுகிறேன்.
    calendar: "திரை பகிர்வுடன் அழைப்பு"
    calendar_intro: |
        கிமாய்க்கு அறிமுகம் அல்லது புதுப்பிப்புகள் போன்றவற்றுடன் உதவி விரும்பினால், உருவாக்குபவர் கெவின் பாப்ச்டுடன் கட்டண திரை பகிர்வு அமர்வை முன்பதிவு செய்யலாம்.
    calendar_refund: "உங்கள் சந்திப்பில் நீங்கள் கலந்து கொள்ள முடியாவிட்டால், நீங்கள் குறைந்தது 24 மணிநேரங்களுக்கு முன்பே ரத்து செய்ய வேண்டும், இதனால் அதை மாற்றியமைக்க முடியும். பணத்தைத் திரும்பப்பெற எதுவும் வழங்கப்படாது."
    get_in_touch: தொடர்பு கொள்ளவும்
landing_oss:
    subtitle: "கிமாய் என்பது நீங்கள் தேடிக்கொண்டிருந்த திறந்த மூல % தலைப்பு % மென்பொருளாகும்"
    vendor_title: "விற்பனையாளர் பூட்டுதல் இல்லை"
    vendor_intro: "விற்பனையாளர் பூட்டுதல் பணத்தில் மட்டுமல்ல, மணிநேரத்திலும் நிறைய செலவாகும். கிமாய் மூலம், அதை நீங்களே புரவலன் செய்யலாம், அதை உங்களுக்காக புரவலன் செய்யலாம், அல்லது அதை முடக்கி மாற்றலாம். நீங்கள் ஒருபோதும் புரவலன் செய்யப்பட்ட தயாரிப்பில் பூட்டப்படவில்லை, உங்கள் தரவு அனைத்தும் ஏற்றுமதி செய்வது எளிதானது, இதனால் கிமாய் இனி உங்களுக்காக இல்லை என்று நீங்கள் எப்போதாவது முடிவு செய்தால், உங்கள் தரவு இன்னும் உங்களுடையது (கட்டணத் திட்டங்களுக்கும் இது பொருந்தும், நான் தரவை வழங்குகிறேன் ரத்து செய்யப்பட்டால் ஏற்றுமதி)."
    transparency_title: "எப்போதும் வெளிப்படையானது"
    transparency_intro: "மூடிய மூல மென்பொருளைக் கொண்டு, விற்பனையாளரின் கூற்றுக்கள் மட்டுமே மென்பொருளைப் பாதுகாப்பாக வைத்திருக்கின்றன மற்றும் தரங்களை கடைபிடிக்கின்றன. திறந்த மூல மென்பொருளின் பின்னால் உள்ள குறியீட்டின் தெரிவுநிலை என்பது நீங்களே பார்க்க முடியும் என்பதாகும். சமூகத்திற்கான எனது பதில்கள், வெளியீட்டு அட்டவணை மற்றும் மைல்கற்கள் மற்றும் ஒவ்வொரு கமிட் மற்றும் புல் கோரிக்கை மதிப்பாய்வையும் நீங்கள் எப்போதும் காணலாம்."
    discover: 'கிசைக் கண்டறியவும்'
    version_choose: 'எந்த கிமாய் உங்களுக்கு சரியானது?'
    version_onpremise: 'நான் மென்பொருளை கவனித்துக்கொள்கிறேன், ஓச்டிங், புதுப்பிப்புகள் மற்றும் பாதுகாப்பு குறித்து நீங்கள் கவனித்துக்கொள்கிறீர்கள். அதை நீங்களே செய்ய விரும்பவில்லை என்றால், உங்கள் விரல் நுனியில் எப்போதும் உதவி கிடைக்கும். வருடாந்திர புதுப்பிப்பு சந்தாவில் உங்களுக்கு தொடர்புடைய செருகுநிரல்களை வாங்குகிறீர்கள்.'
    version_cloud: 'எழுந்து நொடிகளில் ஓடுங்கள், ஓச்டிங்கை விட்டுவிட்டு எனக்கு புதுப்பிக்கவும், உங்கள் முக்கிய வணிகத்தை நீங்கள் கவனித்துக் கொள்ளுங்கள். நவீன நேர கண்காணிப்பு தீர்வுடன், உங்கள் குழு எதிர்காலத்திற்கு தயாராக உள்ளது என்பதை உறுதிப்படுத்திக் கொள்ளுங்கள். அனைத்து செருகுநிரல்களும் கூடுதல் செலவில் மேகக்கட்டத்தில் கிடைக்கின்றன.'
