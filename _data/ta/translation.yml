    intro: 'கிமாய் என்பது ஒரு திறந்த மூல மென்பொருளாகும், இது தன்வய புரவலன் மற்றும் சேமெ.'
    saas: 'உங்களுக்காகப் புரவலன் செய்யப்பட்டது'
    onpremise: 'நீங்கள் தொகுத்து வழங்கியது'
highlight:
    title: 'உங்கள் வணிகத்தை ஆதரிக்கிறது'
    subtitle: 'கிமாய் உங்கள் நேரத்தைக் கண்காணிக்கும் பணிப்பாய்வுகளை அமைத்து, அதை உங்கள் இருக்கும் உள்கட்டமைப்புடன் ஒருங்கிணைக்கத் தேவையான அனைத்து வணிக நிறுவன நற்பண்புகளையும் கொண்டுள்ளது.'
    reasons:
        oss: 'திறந்த மூல'
        enterprise: 'நிறுவன துணை நிரல்கள்'
        versions: 'முகில் மற்றும் நிறுவனத்தில்'
        gdpr: 'சிடிபிஆர் இணக்கம்'
        european: சுயாதீன மற்றும் ஐரோப்பிய 🇪🇺-ஆச்திரியாவில் கட்டப்பட்டது 🇦🇹 மற்றும் செர்மனியில் புரவலன் செய்யப்பட்டது தரவு பாதுகாப்பு, வெளிப்படைத்தன்மை மற்றும் திறந்த-மூல தரத்திற்கு வலுவான அர்ப்பணிப்புடன்.
testimonials:
    title: 'கிமாய் பற்றிப் பயனர்கள் என்ன சொல்கிறார்கள்'
section-teaser:
    work-contract:
        title: 'வேலை நேர கணக்குகள்'
        description: 'பற்று மற்றும் கூடுதல் நேர நேரம், மாதாந்திர அறிக்கைகள்.'
    timesheet:
        title: 'நேர கண்காணிப்பு'
        description: 'முடிந்த வேலையின் எளிதான உள்ளீடு மற்றும் தெளிவான கட்டுப்பாடு.'
    report:
        title: 'அறிக்கைகள்'
        description: 'பயனர்கள் மற்றும் திட்டங்களின் மதிப்பீட்டிற்கான அறிக்கைகள்.'
    dashboard:
        title: 'முகப்புப்பெட்டி'
        description: 'உள்ளமைக்கக்கூடிய நிரல்பலகளுடன் முகப்பலகம்.'
    absence:
        title: 'இல்லாதது'
        description: 'பொது விடுமுறை, விடுவு, நோய் மற்றும் இல்லாதது.'
section-features:
    title: 'கிமாய் உங்களுக்கு என்ன செய்ய முடியும்?'
    subtitle: 'கிமாய் நேரத்தைக் கண்காணிப்பதை விட அதிகமாக வழங்குகிறது, பிற முக்கியமான வணிக செயல்பாடுகளின் பட்டியல் இங்கே.'
homepage:
    title: 'திட்டத்தால் இயக்கப்படும் அணிகளுக்கான நேர கண்காணிப்பு'
    intro: 'எங்கள் திறந்த மூல தளம் உங்கள் நிறுவனத்தின் நேரக் கடனைக் கண்காணிக்கவும் பகுப்பாய்வு செய்யவும் வடிவமைக்கப்பட்டுள்ளது, இது எல்லா அளவிலான வணிகங்களுக்கும் சரியானதாக அமைகிறது. நேரம் மற்றும் பணத்தை ஒரு கண் வைத்திருக்கக் கிமாய் உங்களுக்கு உதவுகிறது.'
newsletter:
    title: 'எதையும் இழக்க விரும்பவில்லையா?'
    introduction: 'எங்கள் செய்திமடலுக்கு குழுசேரவும், கிமாய் மற்றும் சொருகி புதுப்பிப்புகள் பற்றிப் புதுப்பிக்கவும்.'
    email-title: 'உங்கள் மின்னஞ்சல் முகவரி'
    email-help: 'குழுசேர உங்கள் மின்னஞ்சல் முகவரியை வழங்கவும்.'
    field-invalid: 'வழங்கப்பட்ட தகவல்கள் தவறானவை. தயவுசெய்து வடிவமைப்பை மதிப்பாய்வு செய்து மீண்டும் முயற்சிக்கவும்.'
    field-required: 'இந்தப் புலத்தைக் காலியாக விட முடியாது.'
    captcha-help: 'குறிதெளிதலுக்கு மிகவும் வருந்துகிறேன், அது எரிச்சலூட்டும் என்று எங்களுக்குத் தெரியும்!'
    sendinblue: 'எங்கள் சந்தைப்படுத்தல் தளமாக ப்ரெவோவைப் பயன்படுத்துகிறோம். இந்தப் படிவத்தைச் சமர்ப்பிக்க கீழே சொடுக்கு செய்வதன் மூலம், நீங்கள் வழங்கிய தகவல்கள் அவற்றின் %terms% விதிமுறைகளுக்கு ஏற்பச் செயலாக்குவதற்காக ப்ரெவோவுக்கு மாற்றப்படும் என்பதை நீங்கள் ஒப்புக்கொள்கிறீர்கள்.'
    terms: 'பயன்பாட்டு விதிமுறைகள்'
    button: 'குழுசேர்'
    archive: Archive
    name: Newsletter
    page_intro: If you're self-hosting Kimai (or just exploring it), don't miss our newsletter. We share news and insights with a community of people who prefer full control over their data.
    page_title: Self-Host Newsletter
photos:
    dashboard:
        title: 'முகப்புப்பெட்டி'
        description: 'உங்கள் நேர கண்காணிப்பு பதிவுகள் மற்றும் பலவற்றைப் பற்றிய பல புள்ளிவிவரங்களுடன் ஒரு நுண்ணறிவைப் பெறுங்கள்'
    invoice:
        title: 'விலைப்பட்டியல்'
        description: 'உங்கள் வாடிக்கையாளர்களுக்குப் பல வடிவங்களில் (PDF, DOCX, ODT) விலைப்பட்டியல் உருவாக்கவும்'
    timesheet:
        title: 'நேர கண்காணிப்பு'
        description: 'உங்கள் வேலை நேரங்களை உருவாக்கி நிர்வகித்து அவற்றை அசத்து, எஆவ அல்லது உஉகுமொ வடிவில் ஏற்றுமதி'
donate: 'நன்கொடை'
demo:
    name: 'செயற்காட்சி'
    description: 'எங்கள் செயற்காட்சி பக்கத்திலிருந்து நேரடியாக எங்கள் நேர கண்காணிப்பு கிமாயை ஆன்லைனில் சோதித்து மதிப்பீடு செய்யுங்கள்.'
    title: 'கிமாயை செயற்காட்சிகளில் ஒன்றில் சோதிக்கவும்'
    introduction: "கிமாய் நேர-கண்காணிப்பு செயற்காட்சியை முயற்சிக்கவும், நாங்கள் வாய்மை செய்கிறோம்: நீங்கள் அதைப் பயன்படுத்திக் கொண்டே இருப்பீர்கள்!"
    choose: 'கிமாய் எப்படி உணர்கிறார், எந்த செயல்பாட்டை வழங்குகிறது என்பதில் முதல் தோற்றத்தைப் பெற, எங்கள் செயற்காட்சி நிறுவல்களில் ஒன்றைத் தேர்வுசெய்க.'
    reinstall: 'செயற்காட்சிகள் வழக்கமான அட்டவணையில் மீண்டும் நிறுவப்படும் என்பதையும், உள்ளிடப்பட்ட அனைத்து தரவுகளும் அகற்றப்படும் என்பதையும் அறிந்து கொள்ளுங்கள்.'
    user: 'செயற்காட்சி பயனர்'
    accounts: "உங்கள் சோதனைகளுக்கு இந்த கணக்குகள் கிடைக்கின்றன. அல்லது ஒவ்வொரு செயற்காட்சியின் உள்நுழைவு வடிவத்தில் உங்கள் சொந்த சோதனை பயனரை உருவாக்குகிறீர்கள்."
    role_user: 'பயனர்'
    role_teamlead: 'குழு தலைவர்'
    role_admin: 'நிர்வாகி'
    role_super: 'சூப்பர் நிர்வாகி'
    stable-title: 'வயிரம்'
    stable-description: "செயற்காட்சி தரவு இல்லாமல், செருகுநிரல்கள் இல்லாமல் அண்மைக் கால வெளியீடு."
    plugins-title: 'இடம்பெற்றது'
    plugins-description: 'செருகுநிரல்கள் மற்றும் டெமோ தரவுகளுடன் மேம்பாட்டு பதிப்பு.'
    empty-title: 'செருகுநிரல்கள்'
    empty-description: 'தரவு இல்லாமல், பிரத்யேக செருகுநிரல்களுடன் தற்போதைய பதிப்பு.'
index:
    name: 'வீடு'
    title: 'கிமாய் - திறந்த மூல நேர -கண்காணிப்பு'
    description: 'கிமாய் - ஃப்ரீலான்சர், ஏசென்சிகள் மற்றும் பயனர் மற்றும் விலைப்பட்டியல் கையாளுதலுடன் கூடிய நிறுவனங்களுக்கு இலவச மற்றும் எளிதான நேர கண்காணிப்பு.'
download:
    name: 'நிறுவல்'
    title: 'கிரா நிறுவல்'
    description: 'பாஓடு, கப்பல்துறை மற்றும் குபெர்னெட்சுடன் பதிவிறக்கம் செய்து நிறுவுதல் - கிமாய் நேர -கண்காணிப்பு'
    subtitle: 'பதிவிறக்கம் மற்றும் நிறுவல்'
    intro: 'கிமாயை நிறுவ நாங்கள் பல வழிகளை வழங்குகிறோம். உங்களுக்கு ஏற்ற விருப்பத்தைத் தேர்வுசெய்க.'
