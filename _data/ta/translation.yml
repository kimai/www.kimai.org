hosted:
    name: 'முகில்'
    title: 'கிமாய்-கிளவுட்-கிமாயை நேரடியாக அமைக்காமல் பயன்படுத்தவும். தொந்தரவு இல்லாத கிமாய் ஓச்டிங்!'
start-trial:
    name: 'கிமாயின் 30 நாள் கட்டற்ற சோதனையைத் தொடங்கு'
    title: 'கட்டற்ற சோதனையைத் தொடங்கு'
    subtitle: '3 படிகளில் உங்கள் சொந்த நேர கண்காணிப்பு அமைப்பு. கிமாயை 30 நாட்கள், கட்டற்ற மற்றும் இடர் இல்லாமல் முயற்சிக்கவும்.'
    video_subtitle: 'அது எளிது: உங்கள் சொந்த நேரத்தைக் கண்காணிக்க 45 நொடிகளில்!'
    step_1_title: 'கணக்கை உருவாக்கு'
    step_1_text: 'உங்கள் கூகிள் கணக்கு அல்லது மின்னஞ்சல் மற்றும் கடவுச்சொல்லுடன் உங்கள் கணக்கை உருவாக்கவும், பின்னர் மின்னஞ்சல் இணைப்புமூலம் சரிபார்க்க வேண்டும்.'
    step_2_title: 'முகில் பெயரைத் தேர்வுசெய்க'
    step_2_text: 'கணக்கு செயல்படுத்தலுக்குப் பிறகு, ஒரு (சப்டொமைன்) பெயரைத் தேர்ந்தெடுப்பதன் மூலம் உங்கள் கிமாய்-கிளவுட் நிகழ்வை உருவாக்க வேண்டும்.'
    step_3_title: 'நேரக் கண்காணிப்பைத் தொடங்கு'
    step_3_text: 'ஒரு குறுகிய கணத்திற்குப் பிறகு, உங்கள் கிமாய்-முகில் பயன்படுத்தத் தயாராக உள்ளது, நீங்கள் இப்போது உள்நுழைந்து நேரத்தைக் கண்காணிக்கலாம்.'
about:
    name: 'கிமாய் பற்றி'
    description: 'டைம்-டிராக்கர் கிமாய் மற்றும் அதன் டெவலப்பரின் வரலாறு பற்றி அறியவும்.'
    kevin: 'கிமாய் மற்றும் முகில் ஆகியவை வியன்னாவிலிருந்து (ஆச்திரியா) ஒரு சுயாதீனமான மென்பொருள்-மேம்பட்ட கெவின் உருவாக்கி இயக்கப்படுகின்றன.'
    collaboration:
        title: 'ஒத்துழைப்பு'
        content: 'இலவச ஆதரவுடன் வரும் வசதியை வாடிக்கையாளர்கள் பாராட்டுகிறார்கள், பரிமாற்றம் எனது பணியின் முக்கிய பகுதியாகும். கிதுபில் சமூக ஈடுபாட்டை நான் விரும்புகிறேன், ஒத்துழைப்பு மற்றும் சுறுசுறுப்பான வேலை. உங்கள் கருத்தை அடிப்படையாகக் கொண்ட நிலையான முன்னேற்றம் இந்தப் பயணத்தை ஒரு அசாதாரண அனுபவமாக ஆக்குகிறது.'
    technology:
        title: 'தொழில்நுட்பம்'
        content: 'டெவலப்பராக, புதிய தொழில்நுட்பங்களைச் சோதிப்பதை நான் விரும்புகிறேன். இது கிமாயுடன் நீங்கள் தொடர்பு கொள்ளும் முறையை மேம்படுத்தினால், நான் அதை ஒரு வெற்றி-வெற்றி நிலைமை என்று அழைக்கிறேன். இடைமுகம் மற்றும் UX எனக்கு முக்கியமானவை, ஏனெனில் மென்பொருள் பயன்படுத்த எளிதாக இருக்க வேண்டும். பாதுகாப்பு என்பது இயல்புநிலை தேவை மற்றும் திறந்த மூல மென்பொருள் பல வணிகங்களுக்கு ஒரு முக்கியமான செய் காரணியாகும்.'
    joy:
        title: 'வேலையில் மகிழ்ச்சி'
        content: 'கிமாயின் வளர்ச்சி என்பது நான் விரும்பும் தொழிலின் சிறந்த கலவையாகும், அதன் எல்லையற்ற கல்வியின் சாத்தியக்கூறுகள் மற்றும் எனது குடும்பத்தை ஆதரிக்கப் பணம் சம்பாதிக்க வேண்டிய தேவை. கிமாய்க்கு நன்றி, நான் என் மனைவி மற்றும் குழந்தையுடன் அதிக நேரம் செலவிட முடியும், இது நீங்கள் கற்பனை செய்யக்கூடிய சிறந்த உந்துதலாகும்.'
store:
    name: 'செருகுநிரல்கள்'
    description: 'கிமாய்க்கான செருகுநிரல்கள் கூடுதல் அம்சங்களுடன் உங்கள் நேர கண்காணிப்பு அனுபவத்தை நீட்டிக்கின்றன'
    subtitle: "உங்கள் தன்-ஓச்ட் டைம் பதிதல் தீர்வைக் கூடுதல் செயல்பாடுகளுடன் சித்தப்படுத்த கிமாய் சுற்றுச்சூழல் அமைப்பிலிருந்து பரந்த அளவிலான செருகுநிரல்கள், பயன்பாடுகள் மற்றும் நீட்டிப்புகளைப் பயன்படுத்தவும்."
