press:
    -
        question: "What is Kimai?"
        answer: "Kimai is an open-source platform designed to track and analyze time data, making it a great fit for businesses of all sizes. We help you keep an eye on time and money."
    -
        question: "Where can I get the Kimai logo?"
        answer: "You can download Kimai’s logo at the [Trademark](/en/trademark-policy.html) page."
    -
        question: "How does Kimai work as a business?"
        answer: |
            Kimai is an independent open-source project. Revenue comes from Kimai Cloud and optional paid plugins.
            Founded in Germany in 2018 with no external investment, Kimai is now used by more than 5,000 companies worldwide.
            As part of the open-source ecosystem, Kimai also reinvests in other projects - for example the PHP Foundation, Tabler, and Doctrine.
    -
        question: "Who's behind the project?"
        answer: "Kimai is built and maintained by a single founder, [Kevin Papst](https://www.kevinpapst.de)."

on_premise:
    -
        question: "I have a problem"
        answer: |
            Please check your logfile at `var/log/prod.log`. Many problems reveal themselves after checking it.

            If that doesn't help, open a new discussion in our Community Forum (see [Support page](/en/support)) and we try to find a solution.
            Please include the last ~ 20-50 lines of the log file, which were written around the time the error happened.
    -
        question: "Kimai is slow"
        answer: |
            There are many factors that influence the performance of Kimai, the most important one is the server Kimai runs on.
            Shared hosts aren't known for their good performance, especially running modern PHP projects like Kimai that load a large amount of files per request.

            The second factor is your PHP configuration, which can lead to massively decreased performance when not tuned for production usage.
            Double check and [optimize your OPcache settings](https://tideways.com/profiler/blog/fine-tune-your-opcache-configuration-to-avoid-caching-suprises).
    -
        question: "Changed configs/templates do not load"
        answer: |
            Kimai is built on top of Symfony, a framework that optimizes its speed by caching most files.
            Therefor, if you are running Kimai in `production`, you have to **clear the cache** before changes will show up.
    -
        question: "Can I install Kimai via FTP?"
        answer: "Sorry, no chance. You either have to find a hoster that offers SSH access, or you use the [SaaS version of Kimai](/en/pricing)."

absence_management:
    -
        question: "What's the best tool for managing sick leave and annual leave in one place?"
        answer: "Kimai Professional handles both in a single, unified system — linked directly to your time tracking data. You can configure separate absence types, track individual entitlements, and report on both vacation and sick leave without switching tools or maintaining separate spreadsheets."
    -
        question: "How do I see which team members are absent next week?"
        answer: "Kimai's Absence Calendar gives you an instant visual overview. Open the calendar, select the relevant week, and you immediately see who's on holiday, who called in sick, and who's available — across your entire team or filtered by department."
    -
        question: "Can Kimai track public holidays per country or region?"
        answer: "Yes. Kimai Professional allows you to define public holiday calendars per region. These are automatically applied to employee leave balances, so that a local bank holiday doesn't incorrectly count as a vacation day for that team member."
    -
        question: "Is Kimai a good alternative to BambooHR or Personio for absence management?"
        answer: "For teams that already use Kimai for time tracking, the Professional tier's absence management is a natural and cost-effective extension. It covers the core needs of most SMBs — without the price tag or complexity of full HR platforms. For absence tracking, leave approval workflows, and team calendar visibility, Kimai Professional covers the full workflow end to end."
    -
        question: "Does Kimai support absence management for remote or distributed teams?"
        answer: "Absolutely. Kimai is a web-based platform accessible from anywhere. Remote and hybrid teams use it to submit absence requests, view team availability, and manage leave entitlements — without relying on office-based workflows or physical HR processes."
    -
        question: "What kind of subscription do I need to get all the features of Kimai Absence Management?"
        answer: "Absence Management and Absence Calendar in particular are available in the Professional plan of Kimai Cloud."

partner_program_en:
    -
        question: "What does recognition as an Official Kimai Partner mean?"
        answer: "The term **Official Kimai Partner** is a designation awarded by Kimai to companies and developers who have demonstrated solid expertise with the platform and act in accordance with Kimai's values. Partners operate independently; Kimai facilitates connections where needed but is not involved in project engagements that partners carry out for their clients."
    -
        question: "What does the Partner Badge mean and how is it used?"
        answer: "The Partner Badge shows clients that a partner's experience has been reviewed and recognised by Kimai. Recognition is valid for one year and is renewed following a review. For as long as recognition remains active, the partner may identify themselves as an **Official Kimai Partner** and display the Partner Badge on their own website, in marketing materials, and in client communications."
    -
        question: "Who can participate in the Kimai Partner Program??"
        answer: |
            Companies and individuals who wish to become Official Kimai Partners must meet certain minimum requirements:
            - a credible professional presence
            - documented experience with Kimai
            - a respectful approach to open source and the community
            - up-to-date knowledge of supported Kimai versions
            - at least 3 client projects or 12 months of experience with Kimai
            - at least one named technical contact person
            - existing client references or case studies."
    -
        question: "How does the partner recognition process work??"
        answer: "As a first step, a company or individual wishing to become an Official Kimai Partner must submit a request as described on the **Become a Partner** page. If the minimum requirements are met, an online interview will be arranged. Following a successful interview and acceptance of the program terms, the applicant is recognised as an **Official Kimai Partner**."
    -
        question: "Does Kimai charge a commission for connecting partners with clients?"
        answer: "Yes — a referral commission of 10% applies to the initial engagement that comes about through the Kimai partner directory or through a direct lead referral from Kimai. This commission funds the operation and continued development of the Partner Program, the partner directory, and the plugin store through which partners are discovered and their services made visible."
    -
        question: "Is there a ranking system for partners?"
        answer: "There is currently no ranking system. Recognition as an **Official Kimai Partner** grants all partners the same benefits and obligations."
    -
        question: "Can a partner lose their recognition?"
        answer: "Yes. Recognition can be revoked — for example, in cases of misrepresentation, a sustained decline in quality, or conduct that conflicts with the program's expectations. Recognition remains valid only for as long as the partner is in good standing and is not a permanently acquired right."
    -
        question: "How do I find the right partner?"
        answer: |
            There are two options:
            1. Visit the "Find a Partner" page, choose a suitable partner, and contact them using the details provided.
            2. If you're unsure which partner is the best fit, send a request with a brief project description to partner@kimai.org. Your request will be forwarded to relevant partners so that interested Official Kimai Partners can get in touch with you."

partner_program_de:
    -
        question: "Was bedeutet die Anerkennung als Offizieller Kimai-Partner?"
        answer: "**Offizieller Kimai-Partner** ist eine Anerkennung, die Kimai an Unternehmen und Entwickler:innen vergibt, die nachweislich fundierte Kompetenz mit der Plattform besitzen und im Einklang mit den Kimai-Werten handeln. Partner arbeiten eigenständig; Kimai vermittelt bei Bedarf, ist jedoch nicht an Projektaufträgen beteiligt, die Partner für Kund:innen umsetzen."
    -
        question: "Was bedeutet das Partner Badge und wie wird es verwendet?"
        answer: "Das Partner Badge zeigt Kundinnen und Kunden, dass die Erfahrung eines Partners von Kimai geprüft und anerkannt wurde. Die Anerkennung gilt für 1 Jahr und wird nach einer Überprüfung verlängert. Solange die Anerkennung gültig ist, darf sich der Partner als **Offizieller Kimai-Partner** bezeichnen und das Partner Badge auf der eigenen Website, in Marketingmaterialien und in der Kundenkommunikation verwenden.."
    -
        question: "Wer kann am Kimai Partner-Programm teilnehmen?"
        answer: "Unternehmen und Privatpersonen, die **offizielle Kimai-Partner** werden möchten, müssen bestimmte Mindestanforderungen erfüllen:
- seriöser geschäftlicher Auftritt
- dokumentierte Kimai-Erfahrung
- respektvoller Umgang mit Open Source und Community
- aktuelles Wissen zu unterstützten Kimai-Versionen
- mindestens 3 Kundenprojekte oder 12 Monate Erfahrung mit Kimai
- mindestens eine benannte technische Ansprechperson
- vorhandene Kundenreferenzen oder Fallbeispiele."
    -
        question: "Wie läuft der Partner-Anerkennungsprozess ab?"
        answer: "Als ersten Schritt muss ein Unternehmen oder eine Privatperson, die **offizieller Kimai-Partner** werden möchte, eine Anfrage senden – wie auf der Seite **Partner werden** beschrieben. Wenn die Mindestanforderungen erfüllt sind, wird ein Termin für ein Online-Interview vereinbart. Nach einem erfolgreichen Interview und der Annahme der Teilnahmebedingungen wird man als **Offizieller Kimai-Partner** anerkannt."
    -
        question: "Nimmt Kimai eine Provision für die Vermittlung zwischen Partner und Kund:innen?"
        answer: "Ja — für den Erstauftrag, der über das Kimai-Partnerverzeichnis oder durch direkte Lead-Weiterleitung von Kimai zustande kommt, fällt eine Vermittlungsprovision von 10 % an. Damit finanziert Kimai den Betrieb und die Weiterentwicklung des Partnerprogramms, des Partnerverzeichnisses und des Plugin-Stores, über die Partner gefunden und ihre Leistungen sichtbar gemacht werden."
    -
        question: "Gibt es ein Ranking-System für Partner?"
        answer: "Derzeit gibt es kein Ranking für Partner. Die Anerkennung als **offizieller Kimai-Partner** gewährt allen Partnern die gleichen Vorteile und Pflichten."
    -
        question: "Kann ein Partner seine Anerkennung verlieren?"
        answer: "Ja. Die Anerkennung kann widerrufen werden – z.B. bei falschen Angaben, anhaltendem Qualitätsabfall oder Verhalten, das gegen die Erwartungen des Programms verstößt. Sie gilt nur, solange der Partner in gutem Ansehen steht, und ist kein dauerhaft erworbenes Recht."
    -
        question: "Wie finde ich den richtigen Partner?"
        answer: "Es gibt zwei Möglichkeiten:
1. Über die Seite **Partner finden** wählen Sie einen passenden Partner aus und kontaktieren ihn über die angegebenen Kontaktdaten.
2. Wenn Sie nicht sicher sind, welcher Partner am besten passt, senden Sie eine Anfrage mit einer kurzen Projektbeschreibung an partner@kimai.org. Ihre Anfrage wird dann an relevante Partner weitergeleitet, damit interessierte Kimai-Partner sich bei Ihnen melden."
