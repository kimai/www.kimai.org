press:
    -
        question: "What is Kimai?"
        answer: "Kimai is an open-source platform designed to track and analyze time data, making it a great fit for businesses of all sizes. We help you keep an eye on time and money."
    -
        question: "Where can I get the Kimai logo?"
        answer: "You can download Kimai’s logo at the [Trademark](/en/trademark-policy.html) page."
    -
        question: "How does Kimai work as a business?"
        answer: |
            Kimai is an independent open-source project. Revenue comes from Kimai Cloud and optional paid plugins.
            Founded in Germany in 2018 with no external investment, Kimai is now used by more than 5,000 companies worldwide.
            As part of the open-source ecosystem, Kimai also reinvests in other projects - for example the PHP Foundation, Tabler, and Doctrine.
    -
        question: "Who's behind the project?"
        answer: "Kimai is built and maintained by a single founder, [Kevin Papst](https://www.kevinpapst.de)."
