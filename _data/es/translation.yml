feature:
    mobile-ready:
        name: "Preparado para dispositivos móviles"
        description: "El diseño es completamente receptivo, hecho para uso en escritorio y dispositivos móviles. Cada usuario puede configurar las columnas de datos que se deben mostrar, por ejemplo, para evitar el desplazamiento horizontal en dispositivos pequeños."
    plugins:
        name: "Complementos"
        description: "Kimai fue construido para ser extensible y las características se pueden agregar con complementos. Los desarrolladores que deseen crearlos pueden utilizar muchos puntos de extensión."
    multi-user:
        name: "Usuarios múltiples"
        description: "Kimai puede ser utilizado por tantos usuarios como desees: cada instalación admite usuarios ilimitados con diferentes roles (ver permisos)."
    multi-language:
        name: "Multilingüe"
        description: "Kimai se puede localizar en cualquier idioma y ya está traducido a más de 30 idiomas."
    teams:
        name: "Equipos"
        description: "Los equipos conecta a los usuarios en grupos lógicos, como departamentos. Limita el acceso a los datos asignando clientes y proyectos a tus equipos."
    customers:
        name: "Clientes"
        description: "Administra a tus clientes y establece dirección, contactos, país, moneda, visibilidad (para archivar) y muchos otros campos."
    projects:
        name: "Proyectos"
        description: "Administra proyectos para cada cliente con número de orden, presupuesto y visibilidad (para archivar)."
    activities:
        name: "Actividades"
        description: "Las actividades se utilizan para asignar la unidad de trabajo a las entradas de los partes de horas. Gestione las actividades de cada proyecto con número de orden, presupuesto y visibilidad (para archivarlas) o cree otras globales para evitar duplicados."
    invoices:
        name: "Facturación"
        description: "Plantillas de factura configurables, opciones de agrupación de entradas, números de factura configurables y múltiples formatos como PDF y DOCX."
    export:
        name: "Exportar datos"
        description: "Los datos de las hojas de horas pueden exportarse y compartirse en formato XLSX, PDF, CSV y HTML. Los registros exportados pueden bloquearse y protegerse contra cambios posteriores."
    expenses:
        name: "Gastos"
        description: "Compra el complemento y lleva un registro de gastos basados en cliente, proyecto y actividad, para su categorización e inclusión en tus facturas."
    saml:
        name: "SAML"
        description: "Inicia sesión y registre usuarios con SAML a través de su proveedor de identidad SSO existente, como Google Workspace, Authentik o Azure Active Directory."
    api:
        name: "API JSON"
        description: "Cuenta con una amplia API JSON para leer y escribir datos, por lo que las aplicaciones externas y las herramientas personalizadas pueden comunicarse con Kimai."
    ldap:
        name: "LDAP"
        description: "Conecta Kimai con el servidor de directorio de tu empresa (LDAP o Active Directory) y utiliza tu infraestructura de autenticación existente."
    statistics:
        name: "Estadísticas"
        description: "Tu panel de control mostrará varias estadísticas sobre los tiempos registrados y la cantidad de datos recopilados. ¡Y siempre podemos agregar más gráficos!"
    docker:
        name: "Docker"
        description: "Tenemos imágenes de Docker para desarrollo y múltiples variaciones de configuraciones de Docker-Compose para uso en producción."
    migrate-v1:
        name: "Migración"
        description: "Los datos de Kimai v1 se pueden importar para una migración sin problemas de tu seguimiento de tiempo."
    active-entries:
        name: "Cantidad de registros activos"
        description: "Puedes registrar tantas veces como desees en paralelo, pero también puedes configurar el límite permitido de registros activos hasta 1."
    am-pm-format:
        name: "Formato AM/PM"
        description: "Kimai utiliza una versión localizada del formato de 24 horas. Pero si estás acostumbrado al formato AM/PM, puedes configurarlo."
    time-clock:
        name: "Reloj de tiempo"
        description: "¿No quieres que tus usuarios registren registros arbitrarios de hoja de tiempo? Cambia al modo de reloj de tiempo, que solo permite registros de 'entrada' y 'salida'."
    duration-only:
        name: "Solo duración"
        description: "Si las leyes locales requieren que muestres solo duraciones en lugar de fecha y hora de inicio y finalización, puedes activar ese modo globalmente."
    rates:
        name: "Cálculo de tarifas"
        description: "Las tarifas se pueden calcular en función de montos por hora y fijos, configurables para clientes, proyectos, actividades y cada registro de hoja de tiempo de manera individual."
    timesheet-filter:
        name: "Filtro de hoja de tiempo"
        description: "Puedes filtrar todos los registros de tiempo por usuario, cliente, proyecto, actividad y fecha."
    permissions:
        name: "Permisos"
        description: "Estructura de permisos personalizable. Asigna roles diferentes a tus usuarios, por ejemplo, los usuarios pueden registrar tiempos, los líderes de equipo pueden imprimir facturas y configurar proyectos/actividades, los administradores pueden configurar usuarios y clientes."
    user-profile:
        name: "Perfil de usuario"
        description: "Estadísticas personales y configuraciones por usuario para tarifa por hora, tema de Kimai, contraseña y avatar."
    password-reset:
        name: "Restablecimiento de contraseña"
        description: "¿Olvidaste tu contraseña? Kimai te ayuda a restablecerla por correo electrónico."
    2fa:
        description: 'Kimai admite la autenticación de dos factores con tokens TOTP: ¡protege tus cuentas de usuario hoy!'
        name: Autenticación de dos factores (2FA)
    auth:
        description: 'Kimai admite proveedores de identidad externos e inicio de sesión mediante LDAP y SAML a través de varios proveedores (como Google Workspace, Azure AD o Authentik). La autenticación de dos factores mediante tokens TOTP es posible de forma opcional.'
        name: Autenticación y Seguridad
    reporting:
        description: 'Análisis de tiempos registrados por usuarios, clientes, proyectos, actividades, etiquetas, periodos de tiempo y más.'
        name: Informes y análisis
    dark-mode:
        name: Modo oscuro
        description: Porque todas las aplicaciones necesitan un modo oscuro que ayude a reducir la fatiga visual por la noche o en entornos oscuros.
    customer-portal:
        description: Comparta estadísticas de clientes y proyectos y partes de horas con cualquiera mediante una URL secreta, opcionalmente protegida por contraseña.
        name: Portal del cliente
    no-limits:
        description: "¿Su software SaaS siempre incluye límites? Kimai no: no hay límites. Solo pagas por la cantidad de usuarios activos. Yo no te limito y no cobro por usuarios inactivos. Puede crear una cantidad ilimitada de usuarios, clientes, proyectos, actividades, hojas de tiempo y más."
        name: Sin límites
    security:
        points:
            security_6: Pruebas de código automatizadas con una cobertura de código superior al 90%
            security_4: Integración continua con miles de pruebas
            security_1: Hashing seguro de contraseñas con Argon2 o Sodium
            security_5: Revisiones de código en profundidad
            security_2: Roles de usuario configurables que restringen el acceso
            security_3: Protección CSRF y XSS
        name: Seguridad en Kimai
        description: Kimai implementa las mejores prácticas en el diseño de aplicaciones para prevenir ataques comunes. Los controles de seguridad automatizados son fundamentales para cualquier flujo de trabajo de desarrollo de software a fin de reducir el tiempo que transcurre desde la creación hasta la detección de defectos. Estos análisis se ejecutan en cada cambio de código, en todo momento.
    privacy:
        name: La privacidad es lo primero
        description: 'Respeto tu privacidad y la de tus usuarios. No, no se trata de otra aburrida introducción a una política de privacidad: así es como dirijo este negocio. No vendo datos. Cumplo el GDPR y responderé a cualquier pregunta sobre los subprocesadores implicados.'
    security-cloud:
        name: Seguridad en la plataforma
        points:
            security_1: Todas las conexiones están protegidas mediante TLS (SSL)
            security_2: Mejores prácticas de seguridad, firewalls y prevención de ataques de fuerza bruta
            security_6: El código se ejecuta en entornos de dominio estrictamente restringidos
            security_3: Separación clara, cada cliente tiene sus propias bases de datos
            security_4: Los servidores están alojados dentro de la UE
            security_5: Los servicios críticos no son accesibles al exterior
        description: El software es tan seguro como el sistema en el que se ejecuta. Adopto un enfoque de defensa en profundidad con la infraestructura de servidores y redes. Los clientes de la plataforma alojada están protegidos mediante varias capas de protección.
    electronic-invoicing:
        name: E-Invoices
        description: Create e-invoices in both XML and PDF/A formats, compliant with EN 16931, XRechnung 3.0, Zugferd/Factur-X, and using CII and UBL syntax
    eu-hosting:
        description: Independent and European 🇪🇺 – built in Austria 🇦🇹 and hosted in Germany 🇩🇪
        name: EU Hosting
