about:
    name: 'O Kimai'
    subtitle: To, co zaczęło się jako projekt hobbystyczny, stało się teraz wiodącą otwartoźródłową aplikacją do śledzenia czasu na świecie. Pozwólmy sobie na krótki przegląd historii.
    description: 'Dowiedz się o historii narzędzia do śledzenia czasu Kimai i jego twórcy.'
    joy:
        title: Radość z pracy
        content: Rozwój Kimai to idealne połączenie mojej ukochanej profesji, z jej nieskończonymi możliwościami edukacji, i potrzeby zarabiania pieniędzy na utrzymanie mojej rodziny. Dzięki Kimai mogę spędzać więcej czasu z moją żoną i dzieckiem, co prawdopodobnie jest najlepszą motywacją, jaką można sobie wyobrazić.
    technology:
        title: Technologia
        content: Jako programista uwielbiam testować nowe technologie. A jeśli to poprawia sposób, w jaki współdziałasz z Kimai, uznałbym to za sytuację typu win-win. Interfejs użytkownika i doświadczenie użytkownika są dla mnie kluczowe, ponieważ oprogramowanie musi być łatwe w użyciu. Bezpieczeństwo jest domyślnym wymogiem, a oprogramowanie open source stanowi ważny czynnik sukcesu dla wielu firm.
    collaboration:
        title: Współpraca
        content: Klienci doceniają wygodę, która wiąże się z darmowym wsparciem, a wymiana jest nieodłączną częścią mojej pracy. Uwielbiam zaangażowanie społeczności na GitHub, współpracę i pracę w metodyce Agile. Stałe doskonalenie oparte na waszej opinii sprawia, że ta podróż jest niezwykłym doświadczeniem.
    kevin: Kimai i Cloud są rozwijane i prowadzone przez Kevina, niezależnego programistę z Wiednia.
