feature:
    mobile-ready:
        name: "Gotowy do urządzeń mobilnych"
        description: "Układ jest w pełni responsywny, stworzony zarówno do użytku na komputerach stacjonarnych, jak i mobilnych. Każdy użytkownik może skonfigurować widoczność kolumn danych, które powinny być wyświetlane, np. aby uniknąć poziomego przewijania na małych urządzeniach."
    plugins:
        name: "Wtyczki"
        description: "Kimai został zbudowany z myślą o możliwości rozszerzania, a funkcje można dodawać za pomocą wtyczek. Deweloperzy, którzy chcą je tworzyć, mogą korzystać z wielu punktów rozszerzenia."
    multi-user:
        name: "Wielu użytkowników"
        description: "Kimai może być używany przez tyle użytkowników, ile chcesz: każda instalacja obsługuje nieograniczoną liczbę użytkowników o różnych rolach (patrz uprawnienia)."
    multi-language:
        name: "Wielojęzyczność"
        description: "Kimai może być lokalizowany na dowolny język i jest już przetłumaczony na ponad 30 języków."
    teams:
        name: "Zespoły"
        description: "Można tworzyć zespoły, aby grupować użytkowników w logiczne grupy, takie jak działy lub grupy rówieśnicze związane z projektem. Klientów i projekty można przypisywać do tych zespołów, co ograniczy widoczność i dostęp innych użytkowników."
    customers:
        name: "Klienci"
        description: "Zarządzaj klientami i ustaw adresy, kontakty, kraj, walutę, widoczność (dla archiwizacji) i wiele innych pól."
    projects:
        name: "Projekty"
        description: "Zarządzaj projektami dla każdego klienta z numerem zamówienia, budżetem i widocznością (dla archiwizacji)."
    activities:
        name: "Działania"
        description: "Działania służą do przypisywania jednostki pracy do wpisów na arkuszu czasu. Zarządzaj działaniami dla każdego projektu z numerem zamówienia, budżetem i widocznością (dla archiwizacji). Działania mogą być globalne, nie trzeba już duplikować, jeśli wiele projektów dzieli tę samą jednostkę roboczą."
    invoices:
        name: "Fakturowanie"
        description: "Różne szablony faktur, opcje grupowania pozycji, konfigurowalne numery faktur, a także możesz dodać własne szablony w formacie plików PDF, DOCX, HTML, XLSX i ODS."
    export:
        name: "Eksport danych"
        description: "Dane z arkusza czasu można eksportować do innych programów lub udostępniać różnym działom w formatach XLSX (Excel), PDF, CSV i HTML. Eksportowane rekordy można dodatkowo zablokować i zabezpieczyć przed dalszymi zmianami."
    expenses:
        name: "Wydatki"
        description: "Kup wtyczkę i śledź wydatki na podstawie klienta, projektu i działania — do kategoryzacji i uwzględnienia w fakturach."
    saml:
        name: "SAML"
        description: "Zaloguj się i zarejestruj użytkowników za pomocą SAML (single sign-on aka SSO) i ponownie użyj swojego istniejącego dostawcy tożsamości, takiego jak Google Workspace, Authentik lub Azure Active Directory."
    api:
        name: "Interfejs JSON"
        description: "Posiada interfejs JSON API, dzięki czemu zewnętrzne aplikacje mogą komunikować się z twoim ulubionym narzędziem do śledzenia czasu!"
    ldap:
        name: "LDAP"
        description: "Połącz Kimai z serwerem katalogowym twojej firmy (LDAP lub Active Directory) i użyj istniejącej infrastruktury uwierzytelniania."
    statistics:
        name: "Statystyki"
        description: "Twojemu pulpitowi zostaną wyświetlone różne statystyki dotyczące zarejestrowanych czasów i ilości zebranych danych. A zawsze możemy dodać więcej wykresów!"
    docker:
        name: "Docker"
        description: "Mamy obrazy Docker do celów rozwojowych i wiele różnych konfiguracji Docker-Compose do użytku produkcyjnego."
    migrate-v1:
        name: "Migracja"
        description: "Dane z Kimai v1 mogą być importowane, aby dokonać płynnej migracji twojego narzędzia do śledzenia czasu."
    active-entries:
        name: "Liczba aktywnych rekordów"
        description: "Zarejestruj tyle razy, ile chcesz równocześnie, lub ogranicz to do jednego."
    am-pm-format:
        name: "Format AM/PM"
        description: "Kimai korzysta z zlokalizowanej wersji formatu 24-godzinnego. Ale jeśli jesteś przyzwyczajony do formatu AM/PM, możesz to skonfigurować."
    time-clock:
        name: "Zegar czasu"
        description: "Nie chcesz, żeby Twoi użytkownicy logowali dowolne wpisy na arkuszu czasu? Przełącz się na tryb zegara czasu, który pozwala tylko na wpisy „punch in” i „punch out”. Nie trzeba już ręcznie wprowadzać godzin rozpoczęcia i zakończenia."
    duration-only:
        name: "Tylko czas trwania"
        description: "Jeśli lokalne przepisy wymagają, aby wyświetlać tylko czas trwania, zamiast daty i godziny rozpoczęcia i zakończenia, możesz to aktywować globalnie."
    rates:
        name: "Obliczanie stawek"
        description: "Stawki mogą być obliczane na podstawie kwoty godzinowej i stałej, konfigurowalne dla klientów, projektów, działań oraz dla każdego wpisu na arkuszu czasu indywidualnie."
    timesheet-filter:
        name: "Filtr arkusza czasu"
        description: "Możesz filtrować wszystkie wpisy czasowe według użytkownika, klienta, projektu, działania i daty."
    permissions:
        name: "Uprawnienia"
        description: "Dostosowalna struktura uprawnień. Przypisz różne role użytkownikom, np. użytkownicy mogą rejestrować czasy, liderzy zespołów mogą drukować faktury i konfigurować projekty/działy, administratorzy mogą konfigurować użytkowników i klientów."
    user-profile:
        name: "Profil użytkownika"
        description: "Osobiste statystyki i ustawienia użytkownika dotyczące stawki godzinowej, motywu Kimai, hasła i awatara."
    user-registration:
        name: "Rejestracja użytkownika"
        description: "Kimai obsługuje samorejestrację użytkowników z aktywacją e-mailową."
    password-reset:
        name: "Resetowanie hasła"
        description: "Zapomniałeś hasła? Kimai pomaga Ci zresetować je za pomocą wiadomości e-mail."
    2fa:
        name: "Autoryzacja dwuskładnikowa (2FA)"
        description: 'Kimai obsługuje autoryzację dwuskładnikową za pomocą tokenów TOTP: zabezpiecz swoje konta użytkowników już dziś!'
    auth:
        description: Kimai obsługuje zewnętrznych dostawców tożsamości oraz logowanie za pomocą LDAP i SAML w wielu dostawcach (takich jak Google Workspace, Azure AD lub Authentik). Ponadto można włączyć autoryzację dwuskładnikową za pomocą tokenów TOTP.
        name: Autoryzacja i Bezpieczeństwo
    reporting:
        description: Analiza zarejestrowanych czasów, klientów, projektów i działań. Ocena według użytkowników, klientów, projektów, działań, tagów, okresów czasu i wiele więcej.
        name: Raporty i analizy
    dark-mode:
        name: Dark mode
        description: Because every app needs a dark-mode, which helps to reduce eye strain in the evening or in dark environments.
    customer-portal:
        description: Share client and project statistics and timesheets with anyone using a secret URL, optionally password protected.
        name: Customer Portal
    security-cloud:
        points:
            security_1: All connections secured via TLS (SSL)
            security_2: Best-practice security, firewalls and brute-force prevention
            security_6: Code runs in tightly restricted domain environments
            security_3: No multi-tenancy, each customer has their own database
            security_4: Servers are hosted in a data center in the EU
            security_5: Critical services are not accessible to the outside world
        name: Security in the platform
        description: Software is only as secure as the system it runs on. I take a defense-in-depth approach with server and network infrastructure. Customers on the hosted platform are secured through multiple layers of protection.
    no-limits:
        description: "Your SaaS software always includes limits? Not Kimai: there are no limits. You only pay for the amount of active users. I don't limit you, and I do not charge for inactive users. You can create an unlimited amount of users, customers, projects, activities, timesheets and more."
        name: Knows no limits
    security:
        points:
            security_5: In-depth code reviews
            security_6: Automated code test with a code coverage above 90%
            security_4: Continuous integration with thousands of checks
            security_1: Secure password hashing with Argon2 or Sodium
            security_3: CSRF and XSS protection
            security_2: Granular user-roles restricting access
        description: Kimai implements best-practices in application design to prevent common attacks. Automated security controls are critical to any software development workflow to reduce the amount of time from defect creation to defect detection. These scans run on every code change, every time.
        name: Security in Kimai
    privacy:
        name: Privacy comes first
        description: I respect your and your users privacy and data. No, this is not yet another boring introduction into a Privacy policy - that's how I run this business. I don't sell data. I follow the GDPR and will answer any question about involved sub-processors.
developer:
    kevinpapst:
        intro: 'Opiekun projektu i główny deweloper od 2007 roku. Chce uczynić Kimai najlepszym na świecie otwartoźródłowym narzędziem do śledzenia czasu. Można go wynająć na potrzeby wsparcia, instalacji i tworzenia niestandardowych wtyczek.'
full-documentation: Pełna dokumentacja po angielsku
contact-developer: Jeśli masz jakiekolwiek pytania, skorzystaj z poniższych informacji kontaktowych, aby skontaktować się bezpośrednio z deweloperem.
homepage:
    title: Śledzenie czasu dla zespołów pracujących nad projektami
    intro: Nasza otwartoźródłowa platforma została zaprojektowana do śledzenia i analizowania danych dotyczących czasu w Twojej firmie, co sprawia, że jest idealna dla firm o różnych rozmiarach. Kimai pomaga Ci kontrolować czas i pieniądze.
section-teaser:
    report:
        title: Raporty
        description: Raporty do oceny użytkowników i projektów.
    timesheet:
        title: Śledzenie czasu
        description: Łatwe wprowadzanie pracy i przejrzysta kontrola.
    work-contract:
        title: Rachunki czasu pracy
        description: Debet i nadgodziny, comiesięczne zestawienia.
    dashboard:
        description: Pulpit z konfigurowalnymi widżetami.
        title: Pulpit
    absence:
        title: Absencje
        description: Urlopy, dni wolne, choroby i nieobecności.
per-year: na rok
history:
    year-2020: "Kimai jest oferowany jako subskrypcja w modelu SaaS, z trzema planami: darmowym i dwoma płatnymi."
    early-days-title: Jak to wszystko się zaczęło
    year-2009: Torsten, pierwotny deweloper, planuje zamknąć Kimai. Kevin wkracza do akcji i zostaje opiekunem projektu.
    year-2019: Tworzone są pierwsze wtyczki, aby zweryfikować dostępność na rynku i zainteresowanie płatnym oprogramowaniem open source.
    early-days-subtitle: Kimai ma długą historię i istnieje od 2006 roku. Oto krótka historia, jak to wszystko się zaczęło.
    year-2023: Ciężka praca w końcu przynosi efekty, a Kimai jest teraz moją 100% pracą na pełny etat. Dziękuję!
    year-2014: Ostatnia wersja Kimai 1 jest wydana, rozwój ustepuje i nie ma już zbyt dużo aktywności.
    year-2006: Pierwsza wersja Kimai zostaje wydana i stopniowo zdobywa rosnące grono użytkowników i deweloperów.
    intro: To, co zaczęło się jako projekt hobbystyczny, stało się teraz wiodącą otwartoźródłową aplikacją do śledzenia czasu na świecie. Pozwólmy sobie na krótki przegląd historii.
    year-2018: Rewizja Kimai znajduje swoje miejsce w społeczności, migracje danych działają.
    current: |
        Kimai to aplikacja do śledzenia czasu o długiej historii. Pierwsza wersja została wydana już w 2006 roku. Dlaczego to wspominam? Ponieważ widziałem, jak wiele usług przyszło i odeszło od tego czasu - uwierz mi, kiedy mówię: jestem tutaj, aby zostać. Przez wiele lat nie utrzymywałem się z Kimai, to frajda sprawiała, że byłem motywowany do ulepszania Kimai. Wierzę, że frajda jest jednym z głównych powodów sukcesu Kimai.

        Buduję Kimai z jednym celem: śledzić twoje godziny pracy. Kimai obsługuje nieograniczoną liczbę użytkowników i wpisów w arkuszu czasu, dzięki czemu możesz zarządzać wszystkimi swoimi zespołami/działami w jednej łatwej w obsłudze instalacji. Kimai jest oparty na technologii internetowej, więc potrzebujesz tylko serwera webowego z obsługą PHP. Ma responsywny design, więc możesz śledzić czas nawet na urządzeniu mobilnym, gdy jesteś w ruchu. Kimai jest tłumaczony na wiele języków, a brakujące tłumaczenia można łatwo dodać, korzystając z otwartego standardu tłumaczeń Xliff.

        O, i czy wspomniałem, że możesz tworzyć faktury na podstawie swoich arkuszy czasu w przeglądarce internetowej? Kimai można łatwo rozszerzyć na wiele sposobów. Jest oparty na najpopularniejszych i najnowocześniejszych frameworkach i ma aktywną społeczność, która tworzy wiele wtyczek rozszerzających podstawowe funkcje Kimai.

        Mogę napisać o Kimai jeszcze wiele więcej, o funkcjach i korzyściach, które może przynieść ci - niezależnie od tego, czy jesteś freelancerem, małą firmą czy firmą z setkami pracowników - ale uważam, że dając ci możliwość wypróbowania go na własną rękę, jest jeszcze lepszy niż tysiąc słów ode mnie.
    past: |
        Kimai ma długą historię i był znacznie wyprzedzony swoim czasem, gdy Torsten Höltge i jego zespół zaczęli go rozwijać w 2006 roku. Miał responsywny design (dzięki dużej ilości magii JavaScriptu) zanim to słowo oficjalnie pojawiło się w branży.

        Był bliski zakończenia projektu z powodów osobistych, kiedy Kevin objął funkcję opiekuna w 2009 roku. Wspierany przez innych wolontariuszy z otwartego źródła, utrzymywał go przy życiu i rozwijał przez kilka lat.

        W międzyczasie społeczność PHP dokonała ogromnych postępów, a Kimai czuło się zostawione z powodu swojej technicznej historii - zbudowane wokół wielu indywidualnych skryptów PHP, które musiały być publicznie dostępne. Miał również poważne wady, takie jak ograniczona możliwość rozszerzania i problematyczna struktura bazy danych. Po wielu latach rozwoju kod źródłowy stał się trudny do utrzymania, a logika była rozproszona między skryptami, klasami a warstwą frontendową.

        Dlatego pomysł przepisania Kimai za pomocą nowoczesnych frameworków krążył przez długi czas, również na skutek żądań społeczności, ale nie było czasu, by te pomysły wprowadzić. Pod koniec 2017 roku został wydany Symfony 4.0 wraz z przyjaznym stosunkiem frontendowym. To było wtedy, kiedy skorzystałem z okazji i rozpocząłem rozwijanie kolejnego etapu ewolucji: narodziło się Kimai (v2).

        Oryginalne Kimai zostało wydane po raz pierwszy w 2006 roku i było używane przez wiele osób na całym świecie. Jestem z tego dumny i z ogromnej społeczności. Teraz, po 5 latach, większość użytkowników przeniosła się do nowej wersji Kimai, a liczba użytkowników rośnie każdego dnia. Dlatego chciałbym podziękować wszystkim, którzy przyczynili się do Kimai.
