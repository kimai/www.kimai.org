industries:
    name: Indústria
    agency:
        features:
            introduction: Nem todas as ferramentas de controle de tempo são iguais. As melhores soluções para agências oferecem um conjunto especializado de recursos para agilizar os seus fluxos de trabalho.
            title: Recursos do Kimai mais usados por agências
        testimonials:
            tag: Agência
            introduction: No Kimai, desenvolvemos a nossa plataforma de controle de tempo para atender às necessidades de agências, equipes e profissionais autônomos. A nossa interface intuitiva e os seus recursos poderosos ajudam agências como a sua a trabalhar de forma mais inteligente e lucrativa. Agora você pode "ouvir" as opiniões dos usuários reais.
            title: O que as agências dizem sobre o controle de tempo
        about:
            title: Primeiros passos para um melhor controle de tempo
            introduction: |
                Você já deu os seus primeiros passos e temos certeza de que pode fazer uma escolha bem informada. O que mais considerar para escolher o melhor software de controle de tempo? Alguns fornecedores oferecem versões gratuitas, que podem ter limitações, enquanto outros oferecem demonstrações gratuitas, períodos de teste ou opções de preço com base no tamanho do negócio ou no número de usuários.

                No Kimai, oferecemos um período de teste gratuito para que você possa explorar a nossa solução antes de decidir se precisa de mais usuários, recursos ou plug-ins. Experimente gratuitamente hoje e tenha um dia de trabalho mais organizado!
        title: Controle de tempo para agências
        cta:
            title: Ready to start tracking time in your agency?
        name: Agências
        introduction: |
            Você dirige uma agência — seja de marketing, RP, design, consultoria, RH ou arquitetura? Então sabe o quanto o controle de tempo é importante para o seu negócio. Registrar as horas dos funcionários e o tempo dedicado aos projetos dos clientes é essencial para faturar com precisão, entender a lucratividade e gerenciar a sua equipe em crescimento.

            Mas gerenciar o controle de tempo com planilhas e ferramentas desconectadas pode rapidamente virar uma bagunça, especialmente conforme a sua agência cresce. É aí que uma solução dedicada de controle de tempo pode fazer toda a diferença.

            Vamos explorar por que agências bem-sucedidas confiam em softwares de controle de tempo e quais são os recursos essenciais a procurar. Usaremos o Kimai como exemplo de uma solução intuitiva pensada para agências.
        intro: Libere o potencial de lucratividade em agências em crescimento com um sistema escalável de controle de tempo
        subtitle: A chave para a lucratividade
    lawyer:
        about:
            title: Primeiros passos para um melhor controle de tempo no seu escritório
            introduction: |
                Sabemos que testar um software novo na área jurídica pode parecer assustador. Por isso oferecemos um período de teste gratuito e sem compromisso, um processo de integração simples, um conjunto flexível de recursos que cresce com o seu escritório ou a sua equipe, e suporte dedicado.

                Acreditamos que mesmo durante um período de teste gratuito é possível encontrar uma forma de parar de brigar com planilhas. Experimente o Kimai hoje e tenha um dia bem organizado!
        features:
            title: Recursos do Kimai preferidos por escritórios de advocacia
            introduction: O Kimai foi pensado especificamente para profissionais do direito. Criamos uma ferramenta de controle de tempo que fala a sua língua – simples, confiável, em conformidade com a LGPD/GDPR e focada em tornar o seu dia de trabalho mais leve.
        testimonials:
            introduction: No Kimai, profissionais do direito e consultores sempre foram o nosso foco. Agora você pode conferir a experiência real dos nossos usuários.
            title: Opiniões sobre controle de tempo dos nossos clientes
        title: Controle de tempo para advogados
        intro: Esqueça as planilhas complexas e foque em entregar serviços jurídicos excepcionais com soluções modernas de controle de tempo
        subtitle: Foque nas horas faturáveis, não em planilhas complicadas
        name: Advogados
        introduction: |
            No mundo acelerado dos serviços jurídicos, o tempo é o seu ativo mais valioso. Escritórios de advocacia, advogados independentes e equipes jurídicas precisam de uma solução de controle de tempo adaptada às demandas específicas da sua profissão. No Kimai, entendemos que o seu foco deve estar em entregar serviços jurídicos excepcionais — e não em lutar com planilhas complicadas.

            Registrar horas manualmente, manter planilhas intermináveis e lidar com processos de exportação complexos toma um tempo valioso que poderia ser dedicado à sua assessoria jurídica. Descubra como um controle de tempo eficiente pode ajudar você a focar no que realmente importa.
        cta:
            title: Ready to revolutionize time tracking in your practice?
    software-developers:
        features:
            title: Recursos do Kimai usados por engenheiros de software
            introduction: Descubra o conjunto perfeito de recursos adaptado às suas tarefas e objetivos. E se a sua equipe de TI precisar não só de um controle de tempo simples, mas de uma solução robusta com diferentes opções de integração e recursos avançados de faturamento e análise?
        title: Controle de tempo para desenvolvedores de software
        about:
            introduction: |
                Escolher o controle de tempo certo geralmente começa pela decisão entre uma versão gratuita ou uma demonstração. O preço também é um fator importante, então busque opções que cresçam com a sua equipe.

                No Kimai, oferecemos um período de teste gratuito para você explorar a nossa solução antes de decidir se precisa de recursos ou plug-ins adicionais. Com preços a partir de apenas € 0,99 por usuário em alguns setores, é uma opção acessível. Experimente gratuitamente hoje e traga mais organização para o seu dia de trabalho!
            title: Primeiros passos para um melhor controle de tempo
        subtitle: Maximize a sua produtividade
        cta:
            title: |
                Pronto para experimentar uma nova forma
                de controlar o tempo na sua equipe de TI?
        testimonials:
            title: Profissionais de TI falam sobre controle de tempo
            introduction: No Kimai, desenvolvemos a nossa plataforma de controle de tempo pensando nas necessidades de desenvolvedores individuais, equipes de desenvolvimento e departamentos de TI. A nossa abordagem é focada em construir soluções de código aberto para equipes técnicas de todos os tamanhos e em diferentes setores. Você pode conferir o tipo de feedback que recebemos dos nossos usuários da área de tecnologia.
        name: Desenvolvedores de software
        intro: Maximize a produtividade da equipe e alcance o equilíbrio entre trabalho e vida pessoal com um controle de tempo inteligente
        introduction: |
            Conhecemos bem essa dor — horas extras intermináveis, prazos estressantes, bugs que consomem horas e a constante luta para que gerentes de projeto e clientes valorizem o esforço real por trás do seu código. É um ciclo vicioso que pode rapidamente levar ao burnout e prejudicar o seu equilíbrio entre trabalho e vida pessoal. Esse é um desafio comum para desenvolvedores, programadores, engenheiros e outros profissionais da área de tecnologia.

            Mas existe uma forma de quebrar esse ciclo e retomar o controle do seu tempo e das suas tarefas. Com as ferramentas certas, você pode maximizar a sua produtividade e obter insights valiosos sobre os seus projetos. Seja você um programador autônomo, parte de uma startup ou responsável por um departamento de TI inteiro, encontrar uma solução escalável com os recursos certos é essencial. Vamos explorar o Kimai — um software de controle de tempo intuitivo e poderoso — como exemplo.
    consultants:
        features:
            title: Recursos do Kimai mais usados por consultores
            introduction: Seja você um profissional autônomo ou parte de um grande departamento de consultoria, o Kimai oferece ferramentas para escalar conforme o seu negócio cresce.
        about:
            title: Primeiros passos para um melhor controle de tempo na consultoria
            introduction: |
                Para aproveitar ao máximo o seu software de controle de tempo, comece explorando todos os recursos por meio de uma demonstração ou de um período de teste gratuito. Como consultor, você provavelmente vai querer avaliar com cuidado as opções de preço e pensar com antecedência nos recursos que poderá precisar conforme o seu negócio crescer.

                No Kimai, entendemos essa jornada. Por isso oferecemos um período de teste gratuito que permite experimentar a nossa solução antes de decidir quais recursos ou plug-ins adicionais funcionam melhor para você. O nosso aplicativo tudo-em-um cresce junto com o seu negócio — você pode adicionar extensões facilmente sempre que precisar. Experimente gratuitamente hoje e tenha um dia bem organizado!
        subtitle: Maximize as horas faturáveis e a eficiência
        name: Consultores
        title: Controle de tempo para consultores
        testimonials:
            introduction: No Kimai, construímos a nossa plataforma para atender tanto consultores individuais quanto grandes equipes. Como solução tudo-em-um, o Kimai conta com a confiança de empresas de todos os tamanhos em vários setores. Confira o que os nossos usuários da área de consultoria têm a dizer.
            title: Insights sobre controle de tempo por profissionais de consultoria
        intro: Aumente a lucratividade e entregue mais valor aos clientes com um controle de tempo estratégico para a excelência em consultoria
        introduction: |
            No dinâmico cenário atual da consultoria — seja consultoria de gestão, assessoria financeira, serviços de TI, ciência de dados, consultoria jurídica, serviços psicológicos ou consultoria de RH — uma verdade permanece constante: o tempo é o seu ativo mais valioso. O controle preciso do tempo não se trata apenas de registrar horas. Trata-se de maximizar a lucratividade e entregar valor aos seus clientes.

            Sejamos sinceros — gerenciar projetos de consultoria não é fácil. Os membros da sua equipe podem estar trabalhando em Nova York, Londres e Singapura ao mesmo tempo. É muita coisa para acompanhar! Além disso, você precisa saber exatamente quem trabalhou em quê para faturar corretamente os seus clientes. Sem um bom controle de tempo, as coisas podem ficar confusas rapidamente. Você precisa controlar os custos dos projetos, manter-se em conformidade com as regulamentações e garantir que o tempo da sua equipe seja bem aproveitado.

            Por isso, as ferramentas tudo-em-um de controle de tempo tornaram-se indispensáveis para consultores. Elas transformam todo esse possível caos em dados claros e organizados que ajudam o seu negócio a prosperar. Vamos explorar como uma solução completa como o Kimai pode transformar a sua consultoria.
        cta:
            title: |
                Pronto para experimentar uma nova forma
                de controlar o tempo na sua consultoria?
    freelancers:
        name: Profissionais autônomos
        testimonials:
            introduction: "Não confie só na nossa palavra. Veja o que outros profissionais autônomos dizem:"
            title: O que outros profissionais contam sobre controlar o tempo com o Kimai
        features:
            title: 'Features loved by freelancers '
            introduction: O Kimai foi pensado para ajudar solopreneurs a otimizar o seu fluxo de trabalho. Seja gerenciando vários clientes ou lidando com diferentes projetos, o Kimai oferece as ferramentas necessárias para se manter organizado e lucrativo.
        introduction: |
            Quando ser autônomo é um capítulo novo na sua vida, você precisa assumir novos papéis e enfrentar novos desafios. Um deles é a gestão do tempo e o equilíbrio entre as horas trabalhadas e a lucratividade dos seus projetos. Equilibrar vários projetos exige análise, tanto para você quanto para os seus clientes.

            Mas existem ferramentas que ajudam profissionais autônomos, prestadores de serviço, nômades digitais e solopreneurs a registrar as horas faturáveis, faturar para os clientes sem dor de cabeça, gerenciar tarifas por hora e despesas, entre outros.

            Isso permite que você se concentre no que ama — e receba o que realmente merece. Vamos ver como fazer isso com o Kimai como ferramenta de controle de tempo para profissionais autônomos.
