industries:
    name: Industrie
    agency:
        features:
            introduction: Non tutti gli strumenti di monitoraggio del tempo sono uguali. Le migliori soluzioni per le agenzie offrono una serie di funzionalità specializzate per ottimizzare i flussi di lavoro.
            title: Funzionalità Kimai più utilizzate dalle agenzie
        testimonials:
            tag: Agenzia
            introduction: In Kimai, abbiamo progettato la nostra piattaforma di monitoraggio del tempo per rispondere alle esigenze di agenzie, team e freelance. La nostra interfaccia intuitiva e le potenti funzionalità integrate aiutano le realtà come la tua a lavorare in modo più intelligente e redditizio. Da oggi, puoi anche "ascoltare" le recensioni dei nostri utenti reali.
            title: Cosa dicono le agenzie sul monitoraggio del tempo
        about:
            title: Primi passi per un migliore monitoraggio del tempo
            introduction: |
                Hai già mosso i primi passi e siamo certi che sarai in grado di fare una scelta informata. Cos'altro dovresti considerare per scegliere il miglior software di monitoraggio del tempo? Alcuni fornitori offrono versioni gratuite, che potrebbero però presentare delle limitazioni, mentre altri mettono a disposizione demo gratuite, periodi di prova o opzioni di prezzo basate sulle dimensioni dell'azienda o sul numero di utenti.

                In Kimai, offriamo una prova gratuita per permetterti di esplorare la nostra soluzione prima di decidere se siano necessari utenti aggiuntivi, funzionalità extra o plugin. Provalo gratuitamente oggi stesso e regala al tuo team una giornata di lavoro più organizzata!
        title: Monitoraggio del tempo per le agenzie
        cta:
            title: Pronti a iniziare a monitorare il tempo nella vostra agenzia?
        name: Agenzie
        introduction: |
            Stai gestendo un'agenzia - se si tratta di marketing, PR, design, consulenza, HR o architettura? Allora sai quanto sia importante il monitoraggio del tempo per i tuoi affari. Monitorare le ore dei dipendenti e il tempo del progetto del cliente è essenziale per la fatturazione con precisione, la comprensione della redditività e la gestione del vostro team in crescita.

            Gestire il monitoraggio del tempo tramite fogli di calcolo e strumenti scollegati tra loro può però diventare rapidamente un caos, soprattutto man mano che la tua agenzia cresce. È qui che una soluzione dedicata al monitoraggio del tempo può fare la differenza.

            Scopriamo perché le agenzie di successo si affidano a software specifici per il monitoraggio del tempo e quali sono le funzionalità essenziali da ricercare. Utilizzeremo Kimai come esempio di soluzione intuitiva, progettata proprio pensando alle esigenze delle agenzie.
        intro: Sblocca il potenziale di redditività nelle agenzie in rapida crescita con il sistema di monitoraggio del tempo scalabile
        subtitle: La chiave della redditività
    lawyer:
        about:
            title: First steps for a better time tracking in your law practice
            introduction: |
                We understand that trying new software in law business can feel daunting. That's why we offer a free, no-obligation trial, easy onboarding, flexible set of features that grow with your practice or team, and dedicated support.

                We believe that even during a free trial you can try a way to stop wrestling with timesheets. Try Kimai for today and have a nice organized day!
        features:
            title: Kimai features loved by law firms
            introduction: Kimai is designed specifically with legal professionals in mind. We've created a time tracking tool that speaks your language – simple, reliable, GDPR compliant, and focused on making your workday smoother.
        testimonials:
            introduction: At Kimai, legal professionals and consultants have always been our focus. Now you can read about the real experience of our users.
            title: Insights on time tracking from our customers
        title: Time Tracking for Lawyer
        intro: Ditch complex timesheets and focus on delivering exceptional legal services with modern time tracking solutions
        subtitle: Focus on billable hours, not complicated timesheets
        name: Lawyers
        introduction: |
            In the fast-paced world of legal services, time is your most valuable asset. Law firms, independent attorneys, and legal teams need a time tracking solution tailored to the unique demands of their profession. At Kimai, we understand that your focus should be on delivering exceptional legal services — not on battling complex timesheets.

            Manual hour logging, endless spreadsheets, and complicated export processes take valuable time away from providing expert legal counsel. Discover how efficient time tracking can help you focus on what truly matters.
        cta:
            title: Ready to revolutionize time tracking in your practice?
    software-developers:
        features:
            title: Kimai features used by software engineers
            introduction: Discover the perfect set of features tailored to your tasks and goals. What if your IT team needs not just a simple time tracker but a robust solution with different integration options and advanced invoicing and analytics features?
        title: Time Tracking For Software Developers
        about:
            introduction: |
                Choosing the right time tracker often starts with deciding between a free version or a demo. Pricing is also a key factor, so look for options that scale with your team’s growth.

                At Kimai, we offer a free trial so you can explore our solution before deciding if additional features or plugins are needed. With pricing starting at just €0.99 per user for some industries, it’s an affordable choice. Try it for free today and bring more organization to your workday!
            title: First steps for a better time tracking
        subtitle: Maximize Your Productivity
        cta:
            title: |
                Ready to try a new way
                to track time in your IT team?
        testimonials:
            title: IT pros speak about time tracking
            introduction: At Kimai, we designed our time tracking platform with the needs of individual developers, dev teams, and IT departments in mind. Our approach focuses on building open-source solutions for tech teams of all sizes and across various sectors. You can see what kind of feedback we receive from our users from the tech.
        name: Software Developers
        intro: Maximize team productivity and achieve work-life balance with smart time tracking
        introduction: |
            We understand the pain all too well -  endless overtime, stressful deadlines, time-consuming bugs, and the constant struggle to make project managers and clients appreciate the true effort behind your code. It's a vicious cycle that can quickly lead to burnout and disrupt your work-life balance. This is a common challenge faced by software developers, programmers, engineers, and other tech professionals.

            But there's a way to break free from this cycle and regain control over your time and tasks. By using the right tools, you can maximize your productivity and gain valuable insights into your projects. Whether you're a freelance programmer, part of a startup team, or managing an entire IT department, finding a scalable solution with the right features is essential. Let’s explore Kimai - a user-friendly and powerful time tracking software - as an example.
    consultants:
        features:
            title: Funzionalità Kimai più utilizzate dai consulenti
            introduction: Che tu sia un libero professionista o faccia parte di un grande dipartimento di consulenza, Kimai offre strumenti che ti aiutano a crescere insieme alla tua attività.
        about:
            title: First steps for better time tracking in consulting
            introduction: |
                To get the most out of your time tracking software, start with exploring all the features through a demo or free trial. As a consultant, you will probably want to carefully consider the pricing options and think ahead about what features you might need as your business expands.

                At Kimai, we understand this journey. That's why we offer a free trial that lets you test-drive our solution before deciding which additional features or plugins would work best for you. Our all-in-one app grows with your business - you can easily add extensions whenever needed. Try it for free today and have a nice organized day!
        subtitle: Massimizza le ore fatturabili e l'efficienza
        name: Consulenti
        title: Monitoraggio del tempo per i consulenti
        testimonials:
            introduction: At Kimai, we’ve built our platform to cater to the needs of individual consultants and large teams alike. As an all-in-one solution, Kimai is trusted by companies of all sizes across various sectors. Here’s what our users in the consulting field have to say.
            title: Approfondimenti sul monitoraggio del tempo da parte di professionisti della consulenza
        intro: Aumenta la redditività e il valore offerto al cliente attraverso un monitoraggio strategico del tempo per l'eccellenza nella consulenza
        introduction: |
            Nell'odierno e dinamico panorama della consulenza, che tu ti occupi di consulenza direzionale, consulenza finanziaria, servizi IT, data science, consulenza legale, servizi psicologici o consulenza HR - una verità rimane costante: il tempo è il tuo asset più prezioso. Un accurato monitoraggio del tempo non riguarda solo la registrazione delle ore. Riguarda la massimizzazione della redditività e l'erogazione di valore ai tuoi clienti.

            Siamo onesti - gestire progetti di consulenza non è facile. I membri del tuo team potrebbero lavorare da New York, Londra e Singapore contemporaneamente. È molto di cui tenere traccia! Inoltre, devi sapere esattamente chi ha lavorato su cosa per fatturare ai tuoi clienti correttamente. Senza un adeguato monitoraggio del tempo, le cose possono diventare caotiche velocemente. Hai bisogno di controllare i costi di progetto, restare conforme alle normative e assicurarti che il tempo del tuo team sia utilizzato saggiamente.

            Ecco perché gli strumenti di time tracking "all-in-one" sono diventati un must-have per i consulenti. Trasformano tutto questo potenziale caos in dati chiari e organizzati che aiutano il tuo business a prosperare. Esploriamo come una soluzione completa come Kimai può trasformare la tua attività di consulenza.
        cta:
            title: |
                Ready to try a new way
                to track time in your practice?
    freelancers:
        name: Freelancer
        testimonials:
            introduction: "Don't just take our word for it. Here's what other freelancers say:"
            title: What other professionals share about time tracking with Kimai
        features:
            title: 'Features loved by freelancers '
            introduction: Kimai is designed to help solopreneurs streamline their workflow. Whether you're juggling multiple clients or managing a variety of projects, Kimai provides the tools you need to stay organised and profitable.
        introduction: |
            When freelancing is a new chapter in your life, you have to try out new roles and face new challenges. One of these is time management and balancing the hours you work with the profitability of your projects. Balancing multiple projects requires analysis, both for you and your clients.

            But there are tools out there to help freelancers, contractors, digital nomads and solopreneurs track their billable hours, bill clients without pulling your hair out, manage your hourly rates and expenses, etc.

            It lets you focus on what you love - and get paid what you really deserve. Let's see how with Kimai as a time tracking tool for freelancers.
        cta:
            title: Ready to get the most of your time as a freelancer?
        title: Time tracking for successful freelancers
        about:
            title: First steps to better time management
            introduction: |
                Are you ready to experience the benefits of Kimai? We offer a free trial so you can explore all the features before you decide which time tracking software is best for you as an independent professional.

                Sign up today, start tracking your time with literally one click and have a more organised day!
        intro: Maximise your income as a solopreneur
    universities:
        cta:
            title: Pronti a trasformare la gestione del tempo nella vostra istituzione?
        subtitle: ' '
        testimonials:
            introduction: |
                At Kimai, we've designed our time tracking platform to meet the needs of agencies, teams, and freelancers.
                Our intuitive interface and powerful features help agencies like yours work smarter and more profitably.
                You can now “listen” to the reviews of the real users.
            title: What our customers say
        name: Universities
        introduction: |
            Managing time in higher education brings unique challenges, including lecture and class scheduling, research project tracking, student and faculty time allocation, and time consuming administrative tasks.

            Effective time tracking solutions can help streamline these processes, allowing educators and researchers to focus on their core responsibilities.
        features:
            title: Features for institution-wide time management
            introduction: |
                Our time tracking solution has been refined through collaboration with multiple universities. Real user feedback drives our development, ensuring features that truly serve academic needs.

                Just to name a few of the academic institutes using Kimai: `Universität Hamburg`, `Universität Bonn`, `Universität Wien`, `Universität Stuttgart`, `Universität Frankfurt`, `University of Fribourg`, `TU Dresden` and the `University of Moscow`.
        about:
            title: Start your journey to better time management
            introduction: |
                We understand that implementing a new time-tracking system in an academic setting requires careful consideration.
                That’s why we offer a free trial period and demo sessions.
                Try Kimai for free now and have a more organized day!
        intro: Transform your institution's efficiency with powerful time tracking
        title: Time tracking for the academic sector
