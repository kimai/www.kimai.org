feature:
    mobile-ready:
        name: "Pronto per i dispositivi mobili"
        description: "La disposizione è completamente flessibile, realizzata per l'uso desktop e mobile. Ogni utente può configurare le colonne di dati che devono essere visualizzate, ad esempio per impedire lo scorrimento orizzontale su dispositivi di piccole dimensioni."
    plugins:
        name: "Plugin"
        description: "Kimai è stato creato per essere estendibile e le funzionalità possono essere aggiunte con i plugin. Gli sviluppatori che desiderano crearli possono usare molti punti di estensione."
    multi-user:
        name: "Multiutente"
        description: "Kimai può essere usato da tutti gli utenti che desideri: ogni installazione supporta un numero illimitato di utenti con ruoli diversi (vedi autorizzazioni)."
    multi-language:
        name: "Multilingua"
        description: "Kimai può essere localizzato in qualsiasi lingua ed è già tradotto in più di 30 lingue."
    teams:
        name: "Team"
        description: "I team collegano gli utenti in gruppi logici, come i reparti. Limita l'accesso ai dati assegnando clienti e progetti ai tuoi team."
    customers:
        name: "Clienti"
        description: "Gestisci i tuoi clienti e imposta indirizzo, contatti, paese, valuta, visibilità (per l'archiviazione) e molti altri campi."
    projects:
        name: "Progetti"
        description: "Gestisci i progetti per ogni cliente con numero d'ordine, budget e visibilità (per l'archiviazione)."
    activities:
        name: "Attività"
        description: "Le attività vengono usate per assegnare l'unità di lavoro alle voci del foglio di presenza. Gestisci le attività per ogni progetto con numero d'ordine, budget e visibilità (per l'archiviazione) oppure creane di globali per evitare duplicati."
    invoices:
        name: "Fatturazione"
        description: "Modelli di fattura configurabili, opzioni per il raggruppamento delle voci, numeri di fattura configurabili e formati multipli come PDF e DOCX."
    export:
        name: "Esporta dati"
        description: "I dati dei fogli di presenza possono essere esportati e condivisi in formato XLSX (Excel), PDF, CSV e HTML. Le registrazioni esportate possono essere bloccate e protette da ulteriori modifiche."
    expenses:
        name: "Spese"
        description: "Acquista il plugin e tieni traccia delle spese in base a cliente, progetto e attività, per la categorizzazione e l'inclusione nelle tue fatture."
    saml:
        name: "SAML"
        description: "Accedi e registra gli utenti con SAML tramite il tuo provider di identità SSO esistente, come Google Workspace, Authentik o Azure Active Directory."
    api:
        name: "JSON API"
        description: "Dotato di un'ampia API JSON per la lettura e la scrittura di dati, in modo che le app esterne e gli strumenti personalizzati possano comunicare con Kimai."
    ldap:
        name: "LDAP"
        description: "Connetti Kimai con il tuo server di directory aziendale (LDAP o Active Directory) e usa la tua infrastruttura di autenticazione esistente."
    statistics:
        name: "Statistiche"
        description: "Il pannello di controllo ti mostrerà diverse statistiche sui tempi registrati e la quantità di dati raccolti. E possiamo sempre aggiungere altri grafici!"
    docker:
        name: "Docker"
        description: "Disponiamo di immagini Docker per lo sviluppo e diverse varianti delle impostazioni di Docker-Compose per l'uso in produzione."
    migrate-v1:
        name: "Migrazione"
        description: "I dati da Kimai v1 possono essere importati, per una migrazione senza interruzioni del tuo time-tracker."
    active-entries:
        name: "Quantità di registrazioni attive"
        description: "Registra tutte le volte che vuoi in parallelo o limitalo a una."
    am-pm-format:
        name: "Formato AM/PM"
        description: "Kimai usa la versione localizzata del formato 24 ore. Ma se sei abituato al formato AM/PM, puoi configurarlo ugualmente."
    time-clock:
        name: "Time-clock"
        description: "Non vuoi che i tuoi utenti compilino il foglio presenze con registrazioni arbitrarie? Passa alla modalità time-clock, che consente solo registrazioni di \"timbratura in entrata\" e \"timbratura in uscita\"."
    duration-only:
        name: "Solo durata"
        description: "Se le leggi locali richiedono di mostrare solo le durate anziché la data e l'ora di inizio e di fine, puoi attivare tale modalità a livello globale."
    rates:
        name: "Calcolo della tariffa"
        description: "Le tariffe possono essere calcolate in base a importi orari e fissi, configurabili per clienti, progetti, attività e per ogni singola registrazione del foglio di presenza."
    timesheet-filter:
        name: "Filtro fogli di presenza"
        description: "Puoi filtrare tutti le registrazioni temporali per utente, cliente, progetto, attività e data."
    permissions:
        name: "Autorizzazioni"
        description: "Struttura delle autorizzazioni personalizzabile. Assegna diversi ruoli al tuo utente, ad esempio gli utenti possono registrare gli orari, i responsabili team possono stampare fatture e configurare progetti/attività, gli amministratori possono configurare utenti e clienti."
    user-profile:
        name: "Profilo utente"
        description: "Statistiche personali e impostazioni per utente di tariffa oraria, tema Kimai, password e avatar."
    user-registration:
        name: "Registrazione utente"
        description: "Kimai supporta l'autoregistrazione dell'utente con attivazione via e-mail."
    password-reset:
        name: "Reimposta password"
        description: "Hai dimenticato la password? Kimai ti aiuta a reimpostarla via e-mail."
    2fa:
        name: Autenticazione a due fattori (2FA)
        description: 'Kimai supporta l''autenticazione a due fattori con i token TOTP: proteggi i tuoi account utente oggi stesso!'
    auth:
        description: Kimai supporta provider di identità esterni e accesso tramite LDAP e SAML su più provider (come Google Workspace, Azure AD o Authentik). Facoltativamente è possibile l'autenticazione a due fattori tramite token TOTP.
        name: Autenticazione e sicurezza
    reporting:
        description: Analisi dei tempi registrati da utenti, clienti, progetti, attività, tag, periodi di tempo e altro ancora.
        name: Rapporti e analisi
    dark-mode:
        name: Modalità scura
        description: Perché ogni app necessita di una modalità scura, che aiuta a ridurre l'affaticamento degli occhi di sera o in ambienti bui.
    customer-portal:
        description: Condividi statistiche e schede attività sui clienti e sui progetti con chiunque utilizzando un URL segreto, eventualmente protetto da password.
        name: Portale clienti
    no-limits:
        description: "Il tuo software SaaS include sempre dei limiti? Non Kimai: non ci sono limiti. Paghi solo per la quantità di utenti attivi. Non ti pongo limiti e non faccio pagare gli utenti inattivi. Puoi creare un numero illimitato di utenti, clienti, progetti, attività, fogli di presenza e altro ancora."
        name: Non conosce limiti
    privacy:
        name: La privacy viene prima di tutto
        description: "Rispetto la tua privacy e quella dei tuoi utenti e i tuoi dati. No, questa non è l'ennesima noiosa introduzione a una politica sulla privacy: è così che gestisco questa attività. Non vendo dati. Rispetto il GDPR e risponderò a qualsiasi domanda sui sub-processori coinvolti."
    security:
        description: Kimai implementa le migliori pratiche nella progettazione delle applicazioni per prevenire attacchi comuni. I controlli di sicurezza automatizzati sono fondamentali per qualsiasi flusso di lavoro di sviluppo software per ridurre il tempo che intercorre dalla creazione al rilevamento del difetto. Queste scansioni vengono eseguite ad ogni modifica del codice, ogni volta.
        name: Sicurezza in Kimai
        points:
            security_6: Test del codice automatizzato con una copertura del codice superiore al 90%
            security_4: Integrazione continua con migliaia di controlli
            security_1: Hashing sicuro della password con Argon2 o Sodium
            security_5: Revisioni approfondite del codice
            security_2: Ruoli utente granulari che limitano l'accesso
            security_3: Protezione CSRF e XSS
    security-cloud:
        points:
            security_2: Sicurezza ottimale, firewall e prevenzione della forza bruta
            security_1: Tutte le connessioni protette tramite TLS (SSL)
            security_6: Il codice viene eseguito in ambienti di dominio strettamente limitati
            security_3: Nessuna dato condiviso, ogni cliente ha il proprio database
            security_4: I server sono ospitati in un data center nell'UE
            security_5: I servizi critici non sono accessibili al mondo esterno
        description: Il software è sicuro tanto quanto il sistema su cui viene eseguito. Adotto un approccio di difesa approfondita con server e infrastruttura di rete. I clienti sulla piattaforma ospitata sono protetti tramite più livelli di protezione.
        name: Sicurezza nella piattaforma
install:
    alert-vps: In questa fase non è possibile installare Kimai scaricando un file ZIP e caricando i file sul tuo server web. Devi avere accesso SSH al tuo server. Questo non significa necessariamente che hai bisogno di un VPS. Alcuni host condivisi ti danno accesso SSH, attraverso il quale dovresti essere in grado di installare Composer e Kimai senza problemi.
    ssh: Questo metodo installa Kimai direttamente sul tuo server.
    cloud: Non è necessario installare Kimai, puoi iniziare a usarlo subito.
    docker: Usa la nostra immagine Docker per installare e aggiornare facilmente il contenitore di Kimai.
    kubernetes: Puoi distribuire Kimai su Kubernetes usando le nostre Helm-Charts.
    caddy-docker: Utilizzo di Docker-Compose e Caddy come proxy inverso con supporto SSL.
